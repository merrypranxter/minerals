chemical_profile:
  ideal_formula: "(Ca,Na)2-3Al3(Al,Si)2Si13O36·12H2O"
  simplified_formula: "(Ca,Na)5(Al5Si31O72)·24H2O"
  essential_elements: [Ca, Na, Al, Si, O, H]
  trace_elements_common: [K, Sr, Ba]
  structural_units:
    - "heulandite-type zeolite framework (HEU topology)"
    - "channels and cavities with Ca/Na and water"
  atomic_structure_notes: "Zeolite with HEU topology — large elliptical channels parallel to c-axis. Different channel geometry from stilbite framework despite similar composition and habit. Water fills channels and can be reversibly lost."
  chemistry_notes: "Very similar to stilbite in appearance, composition, and occurrence. Distinguished by crystal shape: heulandite forms coffin-shaped (tabular with steep termination) crystals. Ca-dominant is most common (heulandite-Ca); Na, Sr, K varieties also recognized."

crystallography:
  crystal_system: monoclinic
  crystal_class: "prismatic"
  space_group: "Cm"
  unit_cell_notes: "a ≈ 17.71 Å, b ≈ 17.82 Å, c ≈ 7.42 Å, β ≈ 116.4°"
  twinning: "Twins on {001}."
  crystallography_notes: "Forms coffin-shaped (tabular with slanted termination faces) crystals — one of the most diagnostic crystal habits in mineralogy. Also globular and spherulitic. The coffin shape arises from the combination of {010} pinacoid and slanted termination faces."

