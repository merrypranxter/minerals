cultural_and_historical:
  historical_uses:
    - "Named from Greek 'stilbein' (to glitter) by A.G. Werner, 1797."
    - "Zeolites historically used as water softeners, ion exchangers."
    - "Stilbite itself is primarily a collector mineral."
  folklore_notes: "No cultural symbolism; modern collector appreciation."

