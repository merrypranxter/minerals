chemical_profile:
  ideal_formula: "NaCa4(Si27Al9O72)·28H2O"
  simplified_formula: "(Ca,Na)9(Al9Si27O72)·28H2O"
  essential_elements: [Ca, Na, Al, Si, O, H]
  trace_elements_common: [K, Ba, Mg]
  structural_units:
    - "4-4-1 chain zeolite framework"
    - "large channels with Ca/Na and water"
  atomic_structure_notes: "Zeolite with the stilbite framework (STI topology). Large open channels accommodate Ca, Na, and water molecules. Water can be reversibly lost and reabsorbed. The bow-tie or sheaf-of-wheat aggregate habit is characteristic."
  chemistry_notes: "One of the most common and widespread zeolites. Forms from hydrothermal alteration of volcanic rock (especially basalt vesicles). Ca-dominant (stilbite-Ca) is more common; Na-dominant (stilbite-Na) less so."

crystallography:
  crystal_system: monoclinic
  crystal_class: "prismatic"
  space_group: "C2/m"
  unit_cell_notes: "a ≈ 13.61 Å, b ≈ 18.24 Å, c ≈ 11.27 Å, β ≈ 127.9°"
  twinning: "Penetration twins on {001} creating characteristic cross-like or sheaf shapes."
  crystallography_notes: "Characteristic habit: tabular crystals twinned to form bow-tie or sheaf-of-wheat bundles. Also single tabular crystals and spherulitic aggregates. The bow-tie aggregate is one of the most recognizable crystal forms in the zeolite family."

physical_properties:
  mohs_hardness: "3.5–4"
  specific_gravity: "2.09–2.20"
  luster: [vitreous, pearly on cleavage]
  streak: white
  transparency: [transparent, translucent]
  cleavage:
    - "perfect {010}"
  fracture: [uneven]
  tenacity: brittle
  physical_notes: "Light (low SG). Pearly luster on cleavage. Often forms large, aesthetically pleasing bow-tie aggregates on matrix."

