  visual_notes: "Stilbite's bow-tie or sheaf-of-wheat twinned aggregates are one of zeolite mineralogy's signature forms. Cream, peach, or pale-salmon bow-ties on dark basalt are immediately recognizable. The Pune, India specimens set the global standard for zeolite aesthetics."

