chemical_profile:
  ideal_formula: "CuSO4·5H2O"
  simplified_formula: "CuSO4·5H2O"
  essential_elements: [Cu, S, O, H]
  trace_elements_common: [Fe, Zn, Mn]
  structural_units:
    - "sulfate (SO4)²⁻ tetrahedra"
    - "Cu²⁺ in octahedral coordination with 4 H₂O and 2 O (from SO₄)"
    - "5 water molecules total per formula unit"
  atomic_structure_notes: "Triclinic structure. Four of the five water molecules coordinate directly to Cu²⁺; the fifth water molecule bridges sulfate tetrahedra via hydrogen bonds. This distinctive bridging water is why the mineral is 'pentahydrate.' Cu²⁺ is in a Jahn-Teller distorted octahedral environment."
  chemistry_notes: "Chalcanthite is one of the most water-sensitive collector minerals. It dissolves rapidly in water and absorbs/releases water with humidity changes. Most 'chalcanthite' sold commercially is synthetic (laboratory CuSO₄·5H₂O) — natural specimens are rarer and typically smaller."

crystallography:
  crystal_system: triclinic
  crystal_class: "pinacoidal"
  space_group: "P1̄"
  unit_cell_notes: "a ≈ 6.12 Å, b ≈ 10.72 Å, c ≈ 5.97 Å, α ≈ 82.3°, β ≈ 107.4°, γ ≈ 102.6°"
  twinning: "Penetration twins on {100}."
  crystallography_notes: "Forms thick tabular to prismatic crystals with complex faces. Also occurs as stalactites, crusts, efflorescences, and fibrous masses. Most natural specimens are small; large natural chalcanthite crystals are uncommon."

physical_properties:
  mohs_hardness: "2.5"
  specific_gravity: "2.12–2.30"
  luster: [vitreous]
