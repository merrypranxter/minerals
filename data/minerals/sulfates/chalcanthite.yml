cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Used since antiquity as a fungicide, herbicide, and for copper plating."
    - "Known as 'blue vitriol' or 'copper vitriol' in alchemical and early chemistry literature."
    - "Used in Bordeaux mixture (copper sulfate + lime) for fungal disease control in vineyards (from 1880s)."
    - "Electroplating and copper refining."
    - "Used as an algicide in water treatment."
    - "Widely used in chemistry education and crystal-growing kits."
    - "Mining use: controlled precipitation of copper from acid mine drainage."
  cultural_associations:
    - "Iconic chemistry classroom crystal-growing mineral."
    - "The blue of chemistry labs and crystal kits."
  symbolism:
    - copper chemistry
    - vivid blue
    - transformation
    - industrial alchemy
  folklore_notes: "Chalcanthite ('blue vitriol') has a long history in alchemy and early chemistry, where sulfates were called 'vitriols.' It appears in alchemical texts and was used extensively in 19th-century agriculture. Today it's best known as a chemistry education crystal-growing specimen."

