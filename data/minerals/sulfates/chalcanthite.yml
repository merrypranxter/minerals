practical_notes:
  toxicity: "Copper-bearing mineral. WATER SOLUBLE — dissolves in water. Do not ingest (toxic copper sulfate). Do not breathe dust. Keep away from children. Wash hands after handling."
  handling_notes: "Handle with dry hands only. Do not expose to water, humidity, or moisture. Specimens will absorb moisture and eventually dissolve or dehydrate and crack in extreme conditions."
  care_notes: "Store in airtight container with silica gel desiccant. Never expose to water. Keep away from humid environments. If stored too dry, may dehydrate to chalcocyanite (anhydrous CuSO₄, white powder)."
  treatments_or_synthetics:
    - "Large commercial 'chalcanthite' crystals are almost always synthetic — laboratory-grown CuSO₄·5H₂O."
    - "These are genuine mineral composition but not natural geological specimens."
    - "Natural specimens are from mine efflorescences and are typically smaller and less perfectly formed."
  common_confusions:
    - "Synthetic vs. natural (synthetic is the dominant market product; verify with dealer)"
    - "Linarite (also vivid blue, but not water-soluble, different crystal habit)"
    - "Azurite (does not dissolve in water; different crystal habit)"
  market_notes: "Synthetic chalcanthite crystals widely available in science/education market. Natural specimens available from specialty mineral dealers at premium over synthetic. The distinction should always be disclosed."

