  fracture: [conchoidal]
  tenacity: brittle
  physical_notes: "Water soluble. Hygroscopic — absorbs moisture from the air. Dehydrates in very dry conditions. Has a metallic/astringent taste (do NOT taste — toxic copper compound). Very low hardness."

