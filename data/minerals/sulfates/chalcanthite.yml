  visual_notes: "Chalcanthite produces one of the purest, most saturated blues in the mineral kingdom — a vivid cerulean blue that needs no enhancement. Natural specimens as stalactites or crusts in copper mines are ephemeral and dramatic. Commercially, large synthetic crystals are widely sold — they are genuine CuSO₄·5H₂O but not natural mineral specimens."

