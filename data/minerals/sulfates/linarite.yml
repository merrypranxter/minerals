chemical_profile:
  ideal_formula: "PbCu(SO4)(OH)2"
  simplified_formula: "PbCu(SO4)(OH)2"
  essential_elements: [Pb, Cu, S, O, H]
  trace_elements_common: [Ca, Ba]
  structural_units:
    - "sulfate (SO4)²⁻ tetrahedra"
    - "Cu²⁺ octahedral coordination"
    - "Pb²⁺ in large coordination sites"
    - "hydroxyl groups (OH)⁻"
  atomic_structure_notes: "Monoclinic structure. Both Cu²⁺ and Pb²⁺ are essential; linarite is one of the few minerals requiring both copper and lead in the same structure. The vivid azure-blue color comes from Cu²⁺ in hydroxysulfate coordination."
  chemistry_notes: "Linarite forms in oxidized ore deposits where both galena (Pb) and chalcopyrite or other Cu-bearing minerals occur together. It is one of the deepest, most saturated blues in the mineral kingdom — an intense azure that rivals azurite and far exceeds most other sulfates."

crystallography:
  crystal_system: monoclinic
  crystal_class: "prismatic"
  space_group: "P21/m"
  unit_cell_notes: "a ≈ 9.69 Å, b ≈ 5.65 Å, c ≈ 4.69 Å, β ≈ 102.7°"
  twinning: "Not commonly reported."
  crystallography_notes: "Forms elongated prismatic crystals, often striated along prism faces. Crystals are typically small (1–10 mm) and deep blue. Also occurs as crusts, aggregates, and reniform masses."

physical_properties:
  mohs_hardness: "2.5"
  specific_gravity: "5.30–5.40"
  luster: [adamantine, vitreous]
  streak: "pale blue"
  transparency: [transparent, translucent]
  cleavage:
