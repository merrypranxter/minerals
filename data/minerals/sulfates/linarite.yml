practical_notes:
  toxicity: "LEAD AND COPPER-BEARING MINERAL. Do not generate dust. Wash hands thoroughly after handling. Avoid ingestion. Keep away from children. Handle as a display specimen only."
  handling_notes: "Fragile. Handle by matrix. Avoid crushing or breaking (creates toxic dust). Do not use ultrasonic cleaners."
  care_notes: "Do not clean with acid. Minimal intervention — light dusting. Store in padded container with hazard label."
  treatments_or_synthetics:
    - "No synthetic linarite on the collector market."
  common_confusions:
    - "Azurite (Cu-carbonate; effervesces in acid; different crystal system)"
    - "Chalcanthite (water-soluble; less intense blue; different crystal habit)"
    - "Shattuckite (darker blue; different chemistry)"
    - "Cavansite (different habit, vanadium not lead-copper)"
  market_notes: "Sought-after collector mineral. Fine crystals from Arizona and Namibia are priced highly. The intense blue drives demand."

