  visual_notes: "Linarite is a concentrated intense azure blue — perhaps the deepest, most saturated natural blue among lead-copper sulfate minerals. Small crystals but maximum color impact. The combination of adamantine luster and deep indigo-blue makes specimens look like sapphire fragments."

