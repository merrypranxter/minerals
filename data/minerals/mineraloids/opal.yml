practical_notes:
  toxicity: "Non-toxic. Crystalline silica hazard not applicable to amorphous opal."
  handling_notes: "Fragile and dehydration-sensitive. Avoid extreme temperature changes, direct sunlight, low humidity, and heat. Do not leave in dry display cases without moisture control for extended periods."
  care_notes: "Store in a cloth pouch with a damp cotton ball for humidity maintenance. Avoid ultrasonic cleaners, steam, and harsh chemicals. Clean with barely damp soft cloth. Avoid acids. Opal doublets and triplets need extra care around glue lines."
  treatments_or_synthetics:
    - "Opal doublets — thin slice of precious opal cemented to ironstone or black potch base"
    - "Opal triplets — opal doublet with glass or quartz dome cover"
    - "Impregnation with smoke or plastic to darken background (common in boulder opal)"
    - "Synthetic precious opal (Gilson opal, Kyocera opal) — uniform play-of-color; lizard-skin pattern under magnification distinguishes"
    - "Glass and plastic simulants common in costume jewelry"
  common_confusions:
    - "Labradorite (feldspar — schiller is reflection, not diffraction; different structure)"
    - "Glass opal (uniform bubble patterns under magnification)"
    - "Synthetic opal (Gilson — columnar 'lizard skin' pattern at magnification)"
    - "Rainbow moonstone (labradorite variety — blue adularescence, not full spectral fire)"
  market_notes: "Precious opal is highly variable in value. Black opal from Lightning Ridge is among the most expensive gemstones per carat at top quality. Crystal and white opals more accessible. Boulder opal more affordable. Ethiopian (Welo) opal has disrupted markets since 2008 discovery. Doublets and triplets are legitimate but must be disclosed. Synthetic opal mass-market."

