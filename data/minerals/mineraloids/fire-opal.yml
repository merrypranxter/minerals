    - volcanic color anchor
  vibe_notes: "Fire opal is concentrated solar energy in amorphous silica — orange-red volcanic glass that holds the color of fire without being consumed by it. It has none of the spectral mystery of black opal; instead it confronts you with pure warm chromatic intensity."

practical_notes:
  toxicity: "Non-toxic."
  handling_notes: "More stable than Australian hydrophane opal due to lower water content, but still sensitive to dehydration. Avoid heat, prolonged direct sunlight, and dry conditions. Handle transparent faceted gems normally but avoid hard impacts."
  care_notes: "Clean with damp soft cloth. Avoid ultrasonic cleaners and steam. Avoid extreme heat and dryness. Store in consistent humidity."
  treatments_or_synthetics:
    - "Sugar-acid treatment: darkening background of common fire opal (rare)"
    - "Synthetic opal: fire opal simulants in glass and synthetic resin"
    - "Imitation: amber, orange glass, carnelian sometimes confused"
  common_confusions:
    - "Amber (organic; lower SG; inclusions)"
    - "Carnelian (chalcedony — harder; different RI)"
    - "Orange sapphire (corundum — much harder)"
    - "Hessonite garnet (harder; different RI; inclusions)"
    - "Orange glass (heavy; bubble inclusions; higher RI)"
  market_notes: "Transparent faceted fire opal is distinctly priced by clarity, color saturation, and whether play-of-color is present. Red fire opal commands premiums. Mexican (Querétaro) material is most valued. Play-of-color fire opals are very rare and exceptionally valuable. Cabochon material widely available at moderate prices."

