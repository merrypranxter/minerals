chemical_profile:
  ideal_formula: "C10H16O (approximate succinic acid resin)"
  simplified_formula: "C10H16O (approximate)"
  essential_elements: [C, H, O]
  trace_elements_common: [S, N, Fe]
  structural_units:
    - "Complex polymerized terpenoid resin (mostly labdanoid diterpene polymers)"
    - "Succinic acid (diagnostic for Baltic amber / succinite): 3–8%"
  atomic_structure_notes: "Not a mineral — no crystalline structure. Amber is fossilized, polymerized tree resin, largely polyisoprene and terpenoid polymers, cross-linked over millions of years. The polymerization and cross-linking distinguish amber from copal (younger, incompletely polymerized resin)."
  chemistry_notes: "Composition varies by botanical origin and age. Baltic amber (succinite) contains 3–8% succinic acid — a diagnostic marker. Dominican and Burmese amber have different chemical profiles. Amber burns with a pleasant aromatic smell (organic material). Can be dissolved in organic solvents (ether, chloroform), unlike most minerals. Age range: several million years (copal) to over 100 million years (Burmese amber)."

crystallography:
  crystal_system: amorphous
  crystal_class: ""
  space_group: ""
  unit_cell_notes: ""
  twinning: ""
  crystallography_notes: "Completely amorphous — organic polymer without crystalline structure. Sometimes confused with crystalline minerals due to apparent glassy fracture, but X-ray diffraction shows no crystal pattern."

physical_properties:
  mohs_hardness: "2–2.5"
  specific_gravity: "1.05–1.096"
  luster: [resinous]
  streak: "white (soft enough to produce streak but organic)"
  transparency: [transparent, translucent, opaque]
  cleavage: [none]
  fracture: [conchoidal, irregular]
  tenacity: brittle
  physical_notes: "Extremely low SG (1.05–1.096) — barely denser than water. Floats in saturated salt water (the traditional test to distinguish from glass and copal). Warm to the touch (poor thermal conductor, unlike stone). Burns with aromatic resinous smell. Becomes electrostatically charged when rubbed (earliest-known demonstration of electricity — Greek 'elektron' = amber). Softens at 150–180°C."

appearance:
  baseline_colors:
    - yellow
    - golden-yellow
    - orange
    - honey
  color_profiles:
    - name: Baltic Golden / Honey Amber
      colors: [golden-yellow, amber-yellow, honey, orange-amber]
      cause: "Oxidation and polymerization of original resin; iron oxide traces may deepen color."
      conditions: "Most common Baltic amber color; Eocene-age (40–50 Ma) resin from extinct Pinaceae forest."
      variety_name: baltic-amber
    - name: Butterscotch / Opaque Amber
      colors: [creamy-yellow, pale-orange, butterscotch]
      cause: "Micro-bubbles of water and air trapped during resin flow; scattering makes amber opaque."
      conditions: "Common variety of Baltic amber; some prized for uniform appearance."
      variety_name: null
    - name: Dominican Blue / Green Amber
      colors: [blue, blue-green when viewed in reflected light; golden in transmitted light]
      cause: "Fluorescent compounds (polycyclic aromatic hydrocarbons from combustion in ancient forest fires) producing strong blue fluorescence that dominates reflected light view."
      conditions: "Dominican Republic amber — Miocene age (~15–40 Ma)."
      variety_name: dominican-amber
    - name: Red / Cherry Amber
      colors: [deep-red, cherry-red, ox-blood]
      cause: "Prolonged oxidation of surface or ancient oxidized material."
      conditions: "Old or heat-treated Baltic amber; some natural red specimens."
      variety_name: null
    - name: Burmese Amber (Burmite)
      colors: [deep-orange, red-orange, dark-brown]
      cause: "Age (100+ Ma — oldest significant amber) and specific resin chemistry of ancient Araucarian trees."
      conditions: "Myanmar (Burma) — Cretaceous; scientifically very important for inclusions."
      variety_name: burmese-amber
  habits:
    - massive nodular
    - irregular droplets and flows
    - stalactitic (resin drips)
    - rounded pebbles (beach/alluvial)
  textures:
    - smooth glassy interior
    - weathered rough crust
    - resinous
    - translucent to opaque
  macro_patterns:
    - inclusions (bubbles, insects, plant matter)
    - flow patterns and layering
    - transparent zones alternating with cloudy
  common_forms:
    - rounded beach pebbles
    - irregular nodular masses
    - cabochons and carved forms
    - beads
    - raw resin nodules
  visual_notes: "Amber's most famous feature is inclusion preservation — ancient insects, spiders, plant fragments, feathers, and even vertebrate hair and skin have been preserved in extraordinary detail. The warm resinous golden color and organic warmth are unmatched by any mineral. Dominican blue amber appears an iridescent blue-green in reflected light — among the most extraordinary natural optical effects."

optical_and_special_effects:
  fluorescence: "Significant fluorescence under UV — blue-white fluorescence common in Baltic amber; Dominican amber shows intense blue fluorescence (responsible for its blue color in daylight)"
  phosphorescence: "Weak in some specimens"
  chatoyancy: ""
  asterism: ""
  iridescence: "Dominican blue amber shows strong blue-green iridescence from fluorescence; some amber shows interference colors in reflected light"
  pleochroism: "None (amorphous)"
  optical_notes: "RI approximately 1.539–1.545. Isotropic (amorphous). Characteristically warm resinous luster. Inclusions clearly visible in transparent material; can be magnified for extraordinary detail."

formation_and_occurrence:
  genesis:
    - organic (fossilized tree resin)
    - sedimentary (reworked beach/alluvial accumulation)
  geologic_environments:
    - Eocene lignite and clay deposits (Baltic — Sambia)
    - Miocene lacustrine sediments (Dominican Republic)
    - Cretaceous sedimentary sequences (Myanmar/Burmite)
    - coastal cliffs and beaches (reworked from primary deposits)
    - alluvial gravels
  host_rocks:
    - lignite (brown coal)
    - glauconitic marine sands (Baltic — 'blue earth')
    - marine sediments (Dominican)
    - fluvial sediments
  associated_minerals:
    - glauconite (Baltic)
    - pyrite
    - plant fossils
    - lignite
  locality_scope: worldwide but deposit-concentrated
  notable_localities:
    - "Sambia (Kaliningrad) Peninsula, Russia/Baltic — world's largest amber deposit (Baltic amber)"
    - "Poland, Lithuania, Latvia, Estonia, Denmark (Baltic coast)"
    - "La Toca and Palo Quemado, La Vega, Dominican Republic (Dominican amber)"
    - "Hukawng Valley, Kachin State, Myanmar (Burmite — scientifically critical Cretaceous)"
    - "New Jersey, USA (Cretaceous; limited)"
    - "Sicily, Italy (simetite — rare Miocene amber)"
    - "Lebanon (Cretaceous — some of oldest known)"
  occurrence_notes: "Baltic amber (succinite) from the Sambia deposit represents the world's largest amber source, derived from ancient Eocene forests (~40–50 million years ago). The amber was transported and reworked by glacial and wave action — hence rounded beach pebbles along Baltic coasts. Burmese amber (Burmite) at 98–100 Ma is critical for paleontology — it preserves Cretaceous organisms including dinosaur-era feathers."

cultural_and_historical:
  birthstone_status: []
  zodiac_associations:
