  historical_uses:
    - "Jewelry and ornament since the Neolithic (>8000 years of use)"
    - "Baltic trade — 'Amber Road' trading network from Baltic to Mediterranean"
    - "Perfume and incense (burning amber produces aromatic smoke)"
    - "Medicine (powdered succinic acid in folk medicine)"
    - "Electrical experiments — first material in which static electricity was systematically studied"
    - "Paleontological research — fossil inclusions in amber (paleoentomology, paleoecology)"
    - "Varnish and lacquer (amber dissolved in turpentine)"
  cultural_associations:
    - "The original 'electricity' substance — Greek 'elektron' = amber (electrostatic charge)"
    - "'Amber Road' ancient trade network linking Baltic to Mediterranean and Near East"
    - "Lithuanian amber tradition — 'Lithuanian gold'"
    - "Homer's Odyssey mentions amber necklaces as luxury gifts"
    - "Ancient Egyptian and Mycenaean graves contain Baltic amber"
    - "Viking amber jewelry and amulets"
    - "Chinese and Japanese use of amber in Buddhist prayer beads and carvings"
    - "Jurassic Park (1993) — Cretaceous DNA-from-amber concept (scientifically inaccurate but iconic)"
  symbolism:
    - preserved time
    - solar energy fossilized
    - memory and the past
    - ancient warmth
    - trapped life
  folklore_notes: "Amber has been traded over long distances for at least 13,000 years — Baltic amber has been found in Egyptian and Mycenaean archaeological sites thousands of kilometers from its origin. The Greek myth explained amber as the tears of the Heliades (sisters of Phaëton) who were transformed into poplar trees and wept amber tears of grief. Romans so prized amber that it was more valuable than human slaves by some accounts. Thales of Miletus (~600 BCE) first documented amber's static electricity — planting the etymological seed of 'electricity.' The Amber Room of St. Petersburg (created 1701–1713) remains one of history's greatest lost treasures."

