practical_notes:
  toxicity: "Non-toxic in solid form. Burning amber produces smoke — avoid inhalation. Not a mineral dust hazard."
  handling_notes: "Soft (Mohs 2–2.5) — scratched by fingernail with effort. Warm to touch. Avoid solvents (acetone, chloroform, ether — dissolve amber). Avoid prolonged heat exposure (softens above 150°C). Charged by rubbing."
  care_notes: "Wipe with soft cloth; avoid harsh chemicals and solvents. Store away from direct sunlight (UV oxidizes surface). Do not expose to alcohol (perfumes, hand sanitizers). Keep away from heat sources. Polish with a soft cloth and a tiny bit of olive oil if surface becomes dull."
  treatments_or_synthetics:
    - "Pressed/reconstituted amber — fragments fused under heat and pressure; identified by flow structures and bubble alignment"
    - "Copal — young resin (centuries to a few million years old) sold as amber; softer, different RI, dissolves in ether"
    - "Plastic simulants (celluloid, Bakelite) — common and widespread; hot needle test (plastic smells acrid, amber smells resinous)"
    - "Glass simulants — heavier, no UV fluorescence, cold to touch"
    - "Inclusions faked in reconstituted amber or plastic"
  common_confusions:
    - "Copal (young resin — dissolves in ether; sticky surface; similar appearance)"
    - "Plastic (higher SG; cold to touch; acrid smell when heated; no UV fluorescence)"
    - "Glass (much heavier; cold to touch; no fluorescence; no inclusions)"
    - "Pressed amber (flow structures in inclusions; bubble alignment)"
    - "Citrine quartz (much harder; different SG; no fluorescence)"
  market_notes: "Natural Baltic amber remains the dominant market. Dominican amber more expensive due to fluorescence and rarity. Burmese amber scientifically priceless but ethically controversial (conflict-zone sourcing). Insect and vertebrate inclusions command extreme premiums depending on species. Pressed/reconstituted amber widespread in low-end market."

