practical_notes:
  toxicity: "LEAD AND MOLYBDENUM-BEARING MINERAL. Moderate hazard. Avoid generating dust. Wash hands after handling. Keep away from children. Do not ingest."
  handling_notes: "Crystals are very soft and fragile. Handle by matrix only. Thin tabular crystals are extremely delicate — they can shatter with minimal force."
  care_notes: "Do not clean with acid. Minimal intervention — light dry brush only. Store in padded tray with crystals protected."
  treatments_or_synthetics:
    - "No synthetic wulfenite on the collector market."
    - "Confirm locality when purchasing, as value is highly locality-dependent."
  common_confusions:
    - "Crocoite (orange-red prismatic crystals; chromate; different habit — much more elongated)"
    - "Vanadinite (hexagonal; different crystal habit; arsenate)"
    - "Mimetite (acicular to prismatic; different habit)"
  market_notes: "Highly prized collector mineral. Red Cloud and Rowley Mine specimens command top prices. Pricing strongly dependent on color intensity (orange-red > yellow), crystal size, and condition."

