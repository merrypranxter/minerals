chemical_profile:
  ideal_formula: "PbMoO4"
  simplified_formula: "PbMoO4"
  essential_elements: [Pb, Mo, O]
  trace_elements_common: [Ca, W, Cr, V, As]
  structural_units:
    - "molybdate (MoO4)²⁻ tetrahedra"
    - "Pb²⁺ in 8-coordination (square antiprismatic)"
  atomic_structure_notes: "Scheelite-type tetragonal structure. Pb²⁺ sits in an 8-coordinated site. MoO₄²⁻ is the chromophore for the yellow-orange color — charge transfer within the MoO₄²⁻ unit and nearby Pb²⁺ → intense absorption in UV/violet, leaving yellow-orange transmission."
  chemistry_notes: "A lead molybdate requiring both lead (galena source) and molybdenum (typically from molybdenite alteration) in the same oxidized ore deposit. Color ranges from orange-red to yellow depending on Mo/W ratio and other trace substitutions. W substitution produces powellite (CaWO₄); Ca substitution changes the system."

crystallography:
  crystal_system: tetragonal
  crystal_class: "ditetragonal dipyramidal"
  space_group: "I41/a"
  unit_cell_notes: "a ≈ 5.435 Å, c ≈ 12.11 Å"
  twinning: "Contact twins on {001}."
  crystallography_notes: "One of mineralogy's most photogenic habits: characteristic thin square tabular crystals — like little orange-yellow square tiles or wafers. Also thicker square tablets, pyramidal, and massive. The ultra-thin tabular habit can make crystals nearly translucent."

physical_properties:
  mohs_hardness: "2.75–3"
  specific_gravity: "6.5–7.0"
  luster: [adamantine, resinous, waxy]
  streak: "white to pale yellow"
  transparency: [transparent, translucent]
  cleavage:
    - "good {101}"
    - "poor {001}"
  fracture: [conchoidal, uneven, subconchoidal]
  tenacity: brittle
  physical_notes: "Extremely dense for a transparent-to-translucent mineral. Thin tabular crystals weigh more than expected. Adamantine luster can be exceptional. Very soft — easily scratched."

