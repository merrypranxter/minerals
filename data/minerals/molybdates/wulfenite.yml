  visual_notes: "Wulfenite's iconic presentation is a group of flat square orange-to-red tiles on dark gossan matrix — like tiny stained-glass windows. The ultra-thin translucent orange tablets from Arizona localities (Los Lamentos, Red Cloud, Rowley Mine) are among the most photographed mineral specimens in the world. Maximum orange per gram."

