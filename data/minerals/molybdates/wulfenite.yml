  historical_uses:
    - "Named after Franz Xavier von Wulfen (1728–1805), Austrian mineralogist."
    - "Named by F.S. Beudant, 1832."
    - "Secondary molybdenum ore, though rarely of economic importance."
    - "No significant historical industrial use; collector mineral."
  cultural_associations:
    - "One of the most photographed mineral specimens in the collector world."
