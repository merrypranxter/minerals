chemical_profile:
  ideal_formula: "Cu2Cl(OH)3"
  simplified_formula: "Cu2Cl(OH)3"
  essential_elements: [Cu, Cl, O, H]
  trace_elements_common: [Fe, Mn, Ni]
  structural_units:
    - "Cu²⁺ in octahedral coordination with Cl⁻ and OH⁻"
    - "chloride (Cl⁻) anions"
    - "hydroxyl groups (OH)⁻"
  atomic_structure_notes: "Orthorhombic structure. Cu²⁺ occupies two distinct octahedral sites. This structure is distinct from the three polymorphs: botallackite, clinoatacamite, and paratacamite — all share the Cu₂Cl(OH)₃ formula but differ in crystal structure."
  chemistry_notes: "Atacamite is the orthorhombic polymorph of Cu₂Cl(OH)₃. The other polymorphs (clinoatacamite = monoclinic, paratacamite = trigonal, botallackite = monoclinic different structure) are sometimes confused with it. Named for the Atacama Desert of Chile — hyperarid conditions where chloride minerals persist stably."

crystallography:
  crystal_system: orthorhombic
  crystal_class: "dipyramidal"
  space_group: "Pnma"
  unit_cell_notes: "a ≈ 6.030 Å, b ≈ 9.137 Å, c ≈ 6.854 Å"
  twinning: "Contact and penetration twins on {110} reported."
  crystallography_notes: "Forms slender prismatic to tabular crystals, often striated. Also massive, granular, and acicular. Crystals are typically small, bright green, and lustrous."

