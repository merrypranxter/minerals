  vibe_notes: "Atacamite is a mineral that could only exist in the driest place on Earth. That geological specificity — needing both copper and chloride without enough water to dissolve — gives it a geological drama that exceeds its visual spectacle."

practical_notes:
  toxicity: "Copper-bearing mineral. Avoid dust. Wash hands after handling. Do not ingest."
  handling_notes: "Crystals are fragile. Handle by matrix. Slightly soluble in water over time — do not store in humid conditions."
  care_notes: "Keep dry. Avoid water. Light dry dusting. The chloride content makes some specimens slightly soluble under humid conditions."
  treatments_or_synthetics:
    - "No synthetic atacamite on the collector market."
    - "Note: clinoatacamite (monoclinic polymorph) is commonly mislabeled as atacamite — same composition, different structure."
  common_confusions:
    - "Malachite (different luster, botryoidal habit common, effervesces in acid)"
    - "Clinoatacamite (monoclinic polymorph; same color and formula — requires XRD to distinguish)"
    - "Brochantite (similar green; different composition — sulfate)"
    - "Paratacamite (trigonal polymorph; same issue as clinoatacamite)"
  market_notes: "Available from specialty dealers. Chile and Cornwall provide most market specimens. Pricing modest."

