chemical_profile:
  ideal_formula: "K(AlSi2O6)"
  simplified_formula: "KAlSi2O6"
  essential_elements: [K, Al, Si, O]
  trace_elements_common: [Na, Ca]
  structural_units:
    - "framework of AlO4 and SiO4 tetrahedra (tetragonal to cubic transformation)"
    - "K⁺ in large 12-coordinated cavities"
  atomic_structure_notes: "High-leucite (>600°C): cubic structure with K in disordered large cavities. Low-leucite (room temperature): pseudocubic tetragonal — the cubic external habit is preserved but internal symmetry lowers to tetragonal. This transformation creates characteristic polysynthetic twinning."
  chemistry_notes: "K-rich feldspathoid. Defines K-rich silica-undersaturated volcanic systems (leucitites, kamafugites). Rare outside volcanic rocks. Historically important in volcanology."

crystallography:
  crystal_system: "tetragonal (pseudo-cubic)"
  crystal_class: "pseudo-isometric (high-T cubic, room-T tetragonal)"
  space_group: "Ia3̄d (high-T); I41/a (low-T)"
  unit_cell_notes: "a ≈ 13.057 Å (low-T tetragonal)"
  twinning: "Polysynthetic twinning on {110} produces striations on trapezoidal faces."
  crystallography_notes: "Characteristic trapezohedron habit — 24-faced crystals with a perfectly rounded, icositetrahedral outline. The trapezohedron form is highly diagnostic. Crystals are typically gray-white, translucent, and distinctive in hand specimen."

