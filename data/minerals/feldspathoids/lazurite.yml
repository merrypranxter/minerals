  vibe_notes: "Lazurite — through lapis lazuli — is arguably the single most culturally significant mineral in human history after gold. Its deep blue has been synonymous with divinity, royalty, and cosmic depth for six thousand years. Every painting of the Virgin Mary in blue, every pharaoh's blue headdress, every Byzantine mosaic vault contains its color."

practical_notes:
  toxicity: "Non-toxic under normal handling. The rock lapis lazuli contains pyrite — generates H₂S if acid-cleaned."
  handling_notes: "Handle normally. Avoid acids — the calcite component of lapis effervesces in acid."
  care_notes: "Clean with water and mild soap. Do not use ultrasonic cleaners (may damage calcite or pyrite inclusions in lapis). Store away from hard minerals."
  treatments_or_synthetics:
    - "Dyed jasper ('Swiss lapis') — bright blue but lacks pyrite; check with acid (jasper won't effervesce)."
    - "Dyed chalcedony or sodalite sometimes sold as lapis."
    - "Synthetic lapis lazuli (gilson) available; very uniform blue, no natural texture."
    - "Bleaching and redyeing of low-grade lapis to enhance color."
  common_confusions:
    - "Sodalite (lighter blue, no pyrite, lower density)"
    - "Dumortierite (harder, violet-blue, no pyrite)"
    - "Dyed jasper or chalcedony"
    - "Azurite (different texture, effervesces in acid)"
    - "Blue spinel (harder, very different luster)"
  market_notes: "High-quality lapis lazuli from Afghanistan commands premium prices. Chilean and Russian material is less prized. Always ask about origin and treatment. Synthetic and simulant materials are widespread."

