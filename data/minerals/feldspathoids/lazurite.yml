  locality_scope: limited
  notable_localities:
    - "Sar-e-Sang (Koksha Valley), Badakhshan, Afghanistan (finest in the world; mined >6000 years)"
    - "Lake Baikal region, Russia (including Siberian lapis)"
    - "Ovalle, Coquimbo, Chile"
    - "Colorado, USA (rare)"
    - "Flinders Ranges, South Australia"
    - "Vesuvius, Italy (rare crystals)"
    - "Baffin Island, Canada"
  occurrence_notes: "Lazurite (and lapis lazuli rock) forms in marble/skarn settings where alkaline fluids interact with calcium-rich rocks. Afghanistan's Sar-e-Sang deposit is the oldest continuously mined mineral locality in the world, with records dating to 6th millennium BCE."

cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Ground to produce ultramarine pigment — the most prized blue paint pigment in medieval and Renaissance art."
    - "Used in ancient Egypt for amulets, jewelry, and ground pigment (Egyptian blue not lazurite; but lapis was imported)."
    - "Sumerian and Mesopotamian jewelry and inlay (3000+ BCE)."
    - "Roman use in jewelry and decorative objects."
    - "Persian and Islamic art (illuminated manuscripts, tilework glaze)."
    - "Tutankhamun's funeral mask contains lapis lazuli inlays."
    - "Replaced by synthetic ultramarine (1828) in pigment use; the synthetic has identical S₃⁻ chromophore."
  cultural_associations:
    - "The blue of the Virgin Mary's robe in medieval European painting (ultramarine from lapis)."
    - "Sacred in ancient Egypt: associated with the night sky, lapis was the 'sky in stone'."
    - "Sumerian mythology: lapis lazuli thrones, beards of gods depicted in lapis."
    - "Valued more highly than gold in some historical periods."
  symbolism:
    - royalty
    - divinity
    - celestial blue
    - ancient wealth
    - truth
    - wisdom
    - eternity
  folklore_notes: "Lapis lazuli (of which lazurite is the primary mineral) carries one of the richest cultural histories of any mineral. Prized across ancient Egypt, Mesopotamia, Persia, Greece, Rome, and medieval Europe. The word 'ultramarine' means 'beyond the sea' — reflecting how lapis was transported from Afghanistan to European artists. The Sar-e-Sang mines have been worked continuously for perhaps 7,000 years."

