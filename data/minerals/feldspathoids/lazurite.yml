chemical_profile:
  ideal_formula: "(Na,Ca)8(AlSiO4)6(SO4,S,Cl)2"
  simplified_formula: "Na8Al6Si6O24(SO4,S,Cl)"
  essential_elements: [Na, Al, Si, O, S]
  trace_elements_common: [Ca, K, Cl, Fe]
  structural_units:
    - "sodalite cage framework with S₃⁻ trisulfide radical anion"
    - "alternating AlO4 and SiO4 tetrahedra"
  atomic_structure_notes: "Lazurite shares the sodalite cage framework but the enclosed anion is predominantly S₃⁻ (trisulfide radical), which is the chromophore responsible for the intense deep blue. Sulfate (SO₄²⁻) is also present. This is the key chemical distinction from sodalite (Cl) and hackmanite (S₂⁻)."
  chemistry_notes: "Lazurite is the principal blue mineral of lapis lazuli rock. The S₃⁻ radical anion is the chromophore producing the intense blue. Composition is variable; end-member definition is complex. The blue is one of the most historically significant mineral colors in human civilization."

crystallography:
  crystal_system: isometric
  crystal_class: "hextetrahedral"
  space_group: "P4̄3n"
  unit_cell_notes: "a ≈ 9.08 Å; Z = 1"
  twinning: "Not commonly reported."
  crystallography_notes: "Crystals rare and typically poorly formed. Occurs mainly as massive granular aggregates in metamorphic rock (lapis lazuli). Discrete dodecahedral crystals do occur but are uncommon."

physical_properties:
  mohs_hardness: "5–6"
  specific_gravity: "2.38–2.45"
  luster: [vitreous, greasy]
  streak: light-blue
  transparency: [opaque, translucent]
  cleavage:
    - "imperfect {110}"
  fracture: [uneven, conchoidal]
  tenacity: brittle
  physical_notes: "SG notably higher than sodalite due to calcium and sulfate content. The lapis lazuli rock (lazurite + pyrite + calcite ± other minerals) has a higher bulk density than pure lazurite."

