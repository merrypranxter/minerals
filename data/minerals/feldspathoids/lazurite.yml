    - granular
    - disseminated in lapis rock
    - dodecahedral crystals (rare)
  textures:
    - granular
    - mottled with pyrite and calcite
    - even color patches
  macro_patterns:
    - deep blue with gold pyrite flecks (in lapis)
    - blue patches on white calcite
    - uniform deep blue masses
  common_forms:
    - component of lapis lazuli rock (with pyrite, calcite, diopside)
    - massive granular specimens
    - rarely as discrete crystals
  visual_notes: "Pure lazurite: intense, saturated ultramarine blue without equal among natural minerals of comparable hardness. In lapis lazuli rock: the deep blue matrix hosting brilliant gold pyrite flecks and white calcite patches — one of the most visually iconic combinations in all of mineralogy and human art."

