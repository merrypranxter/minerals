chemical_profile:
  ideal_formula: "Na8(Al6Si6O24)Cl2"
  simplified_formula: "Na8Al6Si6O24Cl2"
  essential_elements: [Na, Al, Si, O, Cl]
  trace_elements_common: [K, Ca, S, Fe]
  structural_units:
    - "truncated octahedral sodalite cage (β-cage)"
    - "linked AlO4 and SiO4 tetrahedra in alternating framework"
    - "Cl⁻ anion enclosed in sodalite cage"
  atomic_structure_notes: "Tectosilicate with the classic sodalite framework. The β-cage (sodalite cage) encloses a Cl⁻ anion and Na⁺ cations. The alternating Al and Si tetrahedra form a three-dimensional framework. When S replaces Cl, the mineral becomes hackmanite (tenebrescent) or lazurite (deep blue lapis component)."
  chemistry_notes: "The sodalite group includes sodalite, hackmanite, nosean, hauyne, lazurite, and tugtupite, all sharing the sodalite cage framework but with different enclosed anions and compositions."

crystallography:
  crystal_system: isometric
  crystal_class: "hextetrahedral"
  space_group: "P4̄3n"
  unit_cell_notes: "a ≈ 8.88 Å; Z = 1"
  twinning: "Penetration twins on {111} occasionally reported."
  crystallography_notes: "Typically forms dodecahedral or massive granular aggregates. Well-formed dodecahedral crystals are uncommon but occur in nepheline syenite. More commonly massive or disseminated."

physical_properties:
  mohs_hardness: "5.5–6"
  specific_gravity: "2.14–2.30"
  luster: [vitreous, greasy]
  streak: white
  transparency: [translucent, opaque]
  cleavage:
    - "poor/imperfect {110} dodecahedral"
  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "Notably lighter than most blue stones. SG around 2.2 distinguishes it from lapis lazuli (denser due to pyrite and calcite) and blue kyanite. Slightly greasy luster on massive pieces."

