cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Ornamental carvings and decorative objects (19th century onward)"
    - "Jewelry cabochons and beads"
    - "Interior stone cladding and architectural use"
  cultural_associations:
    - "Sometimes called 'poor man's lapis lazuli' though mineralogically distinct."
    - "Associated with mental clarity and communication in crystal-healing communities."
  symbolism:
