  vibe_notes: "Sodalite is the calm, intellectual blue. Less dramatic than lapis, less sparkly than azurite, but consistent and reliable. A mineral for quiet study, cool logic, and northern skies."

practical_notes:
  toxicity: "Non-toxic under normal handling."
  handling_notes: "Durable enough for normal handling and jewelry use. Softer than quartz; will scratch if used in rings without care."
  care_notes: "Clean with water and mild soap. Avoid ultrasonic cleaners for included or veined specimens. Store separately from harder minerals."
  treatments_or_synthetics:
    - "Dyed howlite or magnesite is sometimes sold as 'sodalite' — verify by density and UV response."
    - "No common treatments on genuine sodalite."
  common_confusions:
    - "Lapis lazuli (denser, contains pyrite flecks, deeper blue)"
    - "Blue lazurite (component of lapis; different chemistry)"
    - "Dumortierite (harder, different luster)"
    - "Blue calcite (softer, effervesces in acid)"
    - "Dyed howlite or magnesite (very common fakes)"
  market_notes: "Widely available and affordable. Common in jewelry, beads, carvings, and tumbled stones. Large ornamental pieces from Canada are well-known."

