    - clarity
    - calm
    - communication
    - blue serenity
  folklore_notes: "Sodalite became popular in decorative arts after large deposits were discovered in Ontario, Canada in the 19th century. The blue-white mottled material is one of the most immediately recognizable ornamental stones."

