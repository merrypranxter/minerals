      variety_name: null
    - name: white-veined
      colors: [white, cream, pale-gray]
      cause: "White veining from albite, calcite, or other inclusions; zones of purer sodalite."
      conditions: "Most ornamental specimens show blue with white veining — a characteristic texture."
      variety_name: null
    - name: colorless-gray
      colors: [colorless, pale-gray, white]
      cause: "No chromophore impurities."
      conditions: "Some localities; less desirable for ornamental use."
      variety_name: null
    - name: hackmanite-violet
      colors: [pink, lavender, violet, colorless]
      cause: "S₂⁻ radical anion (disulfide) in sodalite cages; tenebrescent response from photosensitive color centers."
      conditions: "Hackmanite variety; see hackmanite.yml."
      variety_name: hackmanite
  habits:
    - massive
    - granular
    - dodecahedral crystals
    - disseminated
  textures:
