    - mottled blue-white
    - granular
  macro_patterns:
    - blue-white mottled
    - veined
    - irregular patches
  common_forms:
    - cabochons and tumbled stones
    - carved ornamental objects
    - rough massive specimens
    - dodecahedral crystals (rare)
  visual_notes: "Classic ornamental sodalite has a distinctive medium-to-royal-blue base with irregular white veining or patches of albite/other feldspathoids — recognizable at a glance. Less dramatic than lapis lazuli but cleaner and more uniform blue."

optical_and_special_effects:
  fluorescence:
    shortwave_uv: "variable; orange fluorescence in some specimens"
    longwave_uv: "variable; weak to moderate orange or none"
    fluorescence_color: orange
  tenebrescence: false
  phosphorescence: "none typical"
  special_effects: []
  optical_notes: "Hackmanite (the sulfur-bearing variety) shows tenebrescence; standard blue sodalite typically does not. Orange fluorescence under UV is common in sodalite from some nepheline syenite complexes."

