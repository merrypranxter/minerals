chemical_profile:
  ideal_formula: "(Na,Ca)4-8(Al6Si6O24)(SO4,S)1-2"
  simplified_formula: "Na6Ca2(Al6Si6O24)(SO4)2"
  essential_elements: [Na, Ca, Al, Si, O, S]
  trace_elements_common: [K, Fe, Mg]
  structural_units:
    - "sodalite cage framework"
    - "SO4²⁻ sulfate anion in cage"
    - "Ca²⁺ and Na⁺ in cage sites"
  atomic_structure_notes: "Same sodalite framework as sodalite and hackmanite, but with sulfate (SO₄²⁻) as the enclosed anion rather than Cl⁻. Ca²⁺ substitutes for Na⁺. This sulfate-sodalite is isostructural with nosean and lazurite."
  chemistry_notes: "Distinguished from nosean (Na-dominant, SO₄) by higher Ca content. The brilliant blue color is among the most vivid of any silicate mineral — comparable to lazurite."

crystallography:
  crystal_system: isometric
  crystal_class: "hextetrahedral"
  space_group: "P4̄3n"
  unit_cell_notes: "a ≈ 9.11 Å"
  twinning: "Not commonly reported."
  crystallography_notes: "Forms dodecahedral crystals (12-sided), often well-formed. Also massive. The dodecahedral habit with brilliant blue color is distinctive in phonolites."

physical_properties:
  mohs_hardness: "5.5–6"
  specific_gravity: "2.44–2.50"
  luster: [vitreous, greasy]
  streak: "white to pale blue"
  transparency: [translucent, opaque]
  cleavage:
