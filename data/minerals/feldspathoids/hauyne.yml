  visual_notes: "Hauyne produces some of the most brilliant blues of any volcanic mineral — small dodecahedral crystals of electric blue embedded in dark phonolite or leucitite. Concentrated specimens of loose crystals are especially vivid. A relatively obscure mineral outside collector circles but remarkable for its color."

