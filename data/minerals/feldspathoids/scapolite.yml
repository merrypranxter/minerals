  visual_notes: "Scapolite is more interesting as a gem material than as a hand specimen — most rock scapolite is gray or white. Gem-quality yellow, purple, and pink scapolite is attractive but obscure. Cat's eye scapolite exists and is an unusual phenomenon for a silicate tectosilicate."

