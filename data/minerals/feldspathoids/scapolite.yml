  mindat_id: 3571
  other_ids:
    series_note: "Complete series: marialite (Na-Cl end) to meionite (Ca-CO3/SO4 end)"

chemical_profile:
  ideal_formula: "(Na,Ca)4(Al,Si)12O24(Cl,CO3,SO4)"
  simplified_formula: "(Na,Ca)4Al3(Al,Si)9O24(Cl,CO3,SO4)"
  essential_elements: [Na, Ca, Al, Si, O, Cl]
  trace_elements_common: [K, Fe, Mn]
  structural_units:
    - "framework of AlO4 and SiO4 tetrahedra"
    - "large channels accommodating Na/Ca and Cl/CO3/SO4"
  atomic_structure_notes: "Tetragonal framework silicate with large structural channels. The channels accommodate either Na+Cl (marialite end) or Ca+CO₃/SO₄ (meionite end). Structurally distinct from feldspars but similar in composition."
  chemistry_notes: "The scapolite series runs from marialite (NaCl end-member) through meionite (CaCO₃ end-member). Most natural scapolite is intermediate. Rare gemmy specimens occur in yellow-orange, purple, pink, and colorless forms."

crystallography:
  crystal_system: tetragonal
  crystal_class: "ditetragonal dipyramidal"
  space_group: "I4/m"
  unit_cell_notes: "a ≈ 12.08 Å, c ≈ 7.57 Å (varies with composition)"
  twinning: "Rare."
  crystallography_notes: "Forms prismatic tetragonal crystals with square to rectangular cross-sections. Prism faces often striated vertically. Also massive, granular."

physical_properties:
  mohs_hardness: "5.5–6"
  specific_gravity: "2.50–2.78"
  luster: [vitreous, resinous on cleavage]
  streak: white
  transparency: [transparent, translucent, opaque]
  cleavage:
    - "good {100}"
    - "good {110}"
  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "Two good cleavage directions at 90°. SG increases with Ca (meionite) content. Transparent gem-quality material is relatively rare."

