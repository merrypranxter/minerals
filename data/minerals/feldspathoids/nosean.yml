    - "Na⁺ in cage coordination sites"
  atomic_structure_notes: "Sodalite framework with sulfate anion enclosed. Na-dominant, SO₄ end-member of the sodalite group (vs. hauyne which has more Ca). The enclosed sulfate (SO₄²⁻) distinguishes it from sodalite (Cl⁻) and lazurite (S₃⁻/SO₄)."
  chemistry_notes: "Sulfate-bearing sodalite with Na dominance. Common in phonolites and trachytes of the Cenozoic volcanic provinces. Often gray or smoky in color — less vividly blue than hauyne."

