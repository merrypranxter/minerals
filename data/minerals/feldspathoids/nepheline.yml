  occurrence_notes: "Rock-forming mineral in silica-undersaturated alkaline igneous rocks. The Kola Peninsula, Russia hosts some of the world's largest nepheline deposits, used industrially as a substitute for feldspar in glass and ceramics."

cultural_and_historical:
  historical_uses:
