  visual_notes: "Nepheline is not visually spectacular — it is a gray or white rock-forming mineral known primarily by its greasy luster and geological role. In certain nepheline syenite rocks, it creates a pale bluish-gray groundmass. Not a primary collector specimen mineral but essential context for the feldspathoid suite."

