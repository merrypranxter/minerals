chemical_profile:
  ideal_formula: "Na3K(Al4Si4O16)"
  simplified_formula: "NaAlSiO4"
  essential_elements: [Na, K, Al, Si, O]
  trace_elements_common: [Ca, Fe, Mg, Ti]
  structural_units:
    - "AlO4 and SiO4 tetrahedra in 6-membered rings"
    - "open channels accommodating Na and K"
  atomic_structure_notes: "Tectosilicate (framework) with stuffed tridymite structure. Large channels in the framework accommodate Na⁺ and K⁺ cations. The Si:Al ratio is 1:1 — strictly ordered Al-Si alternation. This strict ordering prevents coexistence with quartz (which would react with excess Al)."
  chemistry_notes: "The most abundant feldspathoid mineral. Defines the 'nepheline' norm in igneous petrology. Cannot coexist with quartz (SiO₂) in the same rock. When crushed and treated with acid, it becomes 'greasy' looking (Greek 'nephele' = cloud). Used industrially as a glass and ceramic raw material."

crystallography:
  crystal_system: hexagonal
  crystal_class: "ditrigonal pyramidal"
  space_group: "P63"
  unit_cell_notes: "a ≈ 9.997 Å, c ≈ 8.385 Å"
  twinning: "Uncommon."
  crystallography_notes: "Forms short prismatic hexagonal crystals. More commonly massive, granular, or as irregular grains in rock. Well-formed crystals are less common."

physical_properties:
  mohs_hardness: "5.5–6"
  specific_gravity: "2.55–2.66"
  luster: [vitreous, greasy]
  streak: white
  transparency: [translucent, opaque]
  cleavage:
    - "poor {1010}"
    - "poor {0001}"
  fracture: [subconchoidal, uneven]
  tenacity: brittle
  physical_notes: "Greasy luster on weathered surfaces (diagnostic). Often colorless or gray. HCl test: dissolves and leaves gelatinous silica — helpful identification test."

