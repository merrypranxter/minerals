chemical_profile:
  ideal_formula: "Na8(Al6Si6O24)(Cl,S)2"
  simplified_formula: "Na8Al6Si6O24(Cl,S)2"
  essential_elements: [Na, Al, Si, O, Cl, S]
  trace_elements_common: [K, Ca, Fe]
  structural_units:
    - "sodalite cage framework"
    - "S₂⁻ radical anion (disulfide) in cage — creates tenebrescent color centers"
  atomic_structure_notes: "Same sodalite cage framework as sodalite, but sulfur substitutes for chlorine. The S₂⁻ (disulfide) anion creates photosensitive color centers (F-centers) that produce tenebrescence. Distinct from lazurite where S₃⁻ (trisulfide) creates the intense blue."
  chemistry_notes: "Hackmanite is a sulfur-bearing sodalite variety. The defining chemical feature is the presence of S₂⁻ radicals in the sodalite cages, which creates the photochromic (tenebrescent) behavior. Composition transitions continuously to sodalite as Cl dominates."

crystallography:
  crystal_system: isometric
  crystal_class: "hextetrahedral"
  space_group: "P4̄3n"
  unit_cell_notes: "Same as sodalite; a ≈ 8.88–8.92 Å"
  twinning: "Penetration twins possible."
  crystallography_notes: "Crystal habit identical to sodalite — dodecahedral to massive. Tenebrescent hackmanite more commonly found as massive granular material."

physical_properties:
  mohs_hardness: "5.5–6"
  specific_gravity: "2.14–2.30"
  luster: [vitreous, greasy]
  streak: white
  transparency: [translucent, opaque]
  cleavage:
    - "poor {110} dodecahedral"
  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "Physically identical to sodalite. Distinguished by optical/tenebrescent behavior and UV fluorescence."

appearance:
  baseline_colors:
    - white
    - cream
    - pale-pink
    - lavender
    - violet
    - colorless
  color_profiles:
    - name: freshly-UV-activated
      colors: [pink, lavender, violet, mauve]
      cause: "S₂⁻ radical anion color centers activated by UV radiation."
      conditions: "After exposure to shortwave UV light. Color is most intense immediately after UV exposure."
      variety_name: null
    - name: bleached-daylight
      colors: [white, cream, pale-gray, colorless]
      cause: "Photochromic bleaching; visible light (especially sunlight) destroys excited color centers."
      conditions: "After prolonged exposure to sunlight or strong visible light."
      variety_name: null
    - name: dark-colored-variety
      colors: [gray-violet, purple-gray, lilac]
      cause: "Higher sulfur content or different impurity balance."
      conditions: "Some hackmanite specimens retain color even in daylight — usually weaker tenebrescence."
      variety_name: null
  habits:
    - massive
    - granular
    - dodecahedral crystals (rare)
  textures:
    - waxy to greasy
    - mottled
  macro_patterns:
    - pale violet masses
    - white with lavender patches
  common_forms:
    - massive ornamental material (Canada, Greenland, Afghanistan)
    - rough collector specimens
  visual_notes: "In darkness or after UV activation: soft lavender to pink-violet masses. In daylight: washes to pale cream or white. The dramatic color shift under UV is the defining visual experience — placing fresh hackmanite under a shortwave UV lamp and watching it bloom pink is unmistakable."

optical_and_special_effects:
  fluorescence:
    shortwave_uv: "strong orange to orange-red fluorescence"
    longwave_uv: "weak to moderate orange fluorescence"
    fluorescence_color: orange
  tenebrescence: true
  tenebrescence_notes: "Hackmanite is the defining tenebrescent mineral. Exposed to shortwave UV, it develops a pink to violet color (color center activation). Exposed to white/visible light, the color bleaches back. This cycle is reversible indefinitely. The initial pink activation under SW UV is immediate; bleaching in sunlight takes minutes to hours depending on specimen."
  phosphorescence: "Brief orange-white afterglow possible immediately after UV removal."
  special_effects:
    - tenebrescence
    - reversible photochromism
    - UV orange fluorescence
  optical_notes: "Tenebrescence (reversible photochromism) in hackmanite is caused by photosensitive S₂⁻ color centers. UV photons promote electrons into excited states; visible light photons collapse the centers. One of only a handful of minerals showing this dramatic reversible color change."

formation_and_occurrence:
  genesis:
    - igneous (nepheline syenite, phonolite)
    - metasomatic
