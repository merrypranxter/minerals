  locality_scope: limited
  notable_localities:
    - "Ilímaussaq intrusive complex, Greenland (finest tenebrescent specimens)"
    - "Bancroft and Haliburton, Ontario, Canada"
    - "Mont-Saint-Hilaire, Quebec, Canada"
    - "Laacher See, Eifel, Germany"
