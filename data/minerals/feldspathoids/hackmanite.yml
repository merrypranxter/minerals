practical_notes:
  toxicity: "Non-toxic under normal handling."
  handling_notes: "Handle normally. Avoid prolonged direct sun if you wish to preserve activated pink color for display — it will bleach."
  care_notes: "Store away from strong light to preserve color. Reactivate with shortwave UV lamp (with eye protection) for demonstrations. Clean gently with water."
  treatments_or_synthetics:
    - "No known synthetic hackmanite on the collector market."
    - "Some material sold as 'tenebrescent sodalite' may have variable sulfur content and variable tenebrescence."
  common_confusions:
    - "Standard sodalite (non-tenebrescent; test under shortwave UV to distinguish)"
    - "Scapolite (similar physical properties; no tenebrescence)"
    - "Rose quartz (similar color; much harder)"
  market_notes: "Available from specialty mineral dealers. Greenlandic and Canadian material most prized. Prices vary widely based on intensity of tenebrescence."

