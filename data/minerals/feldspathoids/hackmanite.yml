  occurrence_notes: "Hackmanite is found in the same geological settings as sodalite — alkaline nepheline syenite intrusions — but the tenebrescent variety requires higher sulfur activity during crystallization. Best tenebrescent specimens come from Greenland and Canada."

cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Described as a mineral variety in late 19th / early 20th century."
    - "Named after Victor Axel Hackman (1866–1941), Finnish geologist."
    - "Collected primarily as a scientific curiosity and UV-response demonstration mineral."
  cultural_associations:
    - "Beloved by UV fluorescence enthusiasts and mineral show demonstrators."
    - "Demonstration mineral for photochromism in educational settings."
  symbolism:
    - transformation
    - hidden light
    - reversibility
    - UV revelation
  folklore_notes: "Hackmanite has no deep historical folklore — it is a modern mineralogical curiosity, beloved for its dramatic scientific behavior. The experience of activating hackmanite with UV light — watching a pale white stone bloom into lavender — is one of the most memorable demonstrations in mineralogy."

