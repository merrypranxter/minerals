    - crusts on granite or pegmatite
  visual_notes: "Autunite produces one of the most vivid yellows in the mineral kingdom — an intense, almost neon lemon-yellow that practically glows even in visible light, and becomes spectacularly fluorescent under UV. The flat square tabular crystals with pearly cleavage and vivid yellow are instantly recognizable."

optical_and_special_effects:
  fluorescence:
    shortwave_uv: "intense yellow-green fluorescence — among the most spectacular UV responses of any mineral"
    longwave_uv: "strong yellow-green fluorescence"
    fluorescence_color: yellow-green
  tenebrescence: false
  phosphorescence: "strong yellow-green phosphorescence — glows in the dark after UV exposure"
  special_effects:
    - exceptional-UV-fluorescence
    - phosphorescence
    - radioactivity
  optical_notes: "The strong yellow-green fluorescence under both SW and LW UV is one of the most useful identification characteristics and is caused by the uranyl ion (UO₂²⁺) — same chromophore as the visible yellow color. Autunite is strongly radioactive."

