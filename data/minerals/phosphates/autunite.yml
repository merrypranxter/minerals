cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Described as a new mineral in 1852 by A. Dufrénoy."
    - "Named after Autun, France (type locality)."
    - "Historical source of uranium — uranium was extracted from secondary uranium minerals before pitchblende processing became dominant."
    - "Marie Curie worked with pitchblende (uraninite), but autunite and similar minerals were part of the broader uranium mineral study of the late 19th/early 20th centuries."
  cultural_associations:
    - "Part of the historical story of radioactivity discovery — Becquerel used uranium minerals (possibly autunite-group) in his 1896 experiments with phosphorescence."
    - "The discovery of radioactivity by Henri Becquerel used uranium salts/minerals."
  symbolism:
    - radioactive glow
    - hidden energy
    - uranium mineral
    - fluorescent revelation
  folklore_notes: "Autunite's cultural significance is entirely scientific. It was one of the minerals central to the discovery and study of radioactivity in the late 19th century. The vivid yellow-green glow under UV makes it a demonstration piece for uranium mineral fluorescence."

