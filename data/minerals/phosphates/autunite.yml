  vibe_notes: "Autunite radiates — literally and visually. The lemon-yellow visible color becomes blinding neon yellow-green under UV, and the whole time it's quietly emitting radiation. It's a mineral that demands respect and proper handling while also being undeniably beautiful."

practical_notes:
  toxicity: "RADIOACTIVE MINERAL — URANIUM CONTENT. Moderate radioactivity (higher than background). Avoid ingesting or inhaling dust. Wash hands after handling. Store in sealed container away from inhabited spaces. Keep away from children. Consult national regulations for ownership and transport of radioactive minerals."
  handling_notes: "For display and collection only. Limit handling time. Do not keep in bedroom, office, or area with prolonged human occupancy. Sealed storage recommended."
  care_notes: "Do not clean with water (water can dissolve or alter the hydrated structure). Store in sealed container. Meta-autunite forms when the mineral dehydrates in dry storage conditions."
  treatments_or_synthetics:
    - "No synthetic autunite on the collector market."
  common_confusions:
    - "Torbernite (copper-uranium phosphate; similar flat green crystals — torbernite is green, autunite is yellow)"
    - "Meta-autunite (dehydrated form of autunite; similar appearance)"
    - "Carnotite (yellow uranium vanadate; powdery habit, different)"
  market_notes: "Available from specialty mineral dealers with appropriate labeling. Prices vary. Always purchase with clear radioactivity disclosure and locality information."

