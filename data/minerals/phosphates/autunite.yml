chemical_profile:
  ideal_formula: "Ca(UO2)2(PO4)2·10-12H2O"
  simplified_formula: "Ca(UO2)2(PO4)2·10-12H2O"
  essential_elements: [Ca, U, P, O, H]
  trace_elements_common: [Ba, Mg, Fe]
  structural_units:
    - "uranyl ion (UO2)²⁺ — linear O=U=O unit"
    - "phosphate (PO4)³⁻ tetrahedra"
    - "Ca²⁺ between sheets"
    - "structural water layers"
  atomic_structure_notes: "Sheet structure with alternating UO₂-PO₄ layers and interlayer Ca²⁺ and H₂O. The uranyl ion (UO₂²⁺) is the chromophore for both the bright yellow-green color and the intense UV fluorescence. Autunite is prone to losing water (meta-autunite) under dry conditions, with structural change."
  chemistry_notes: "A uranyl calcium phosphate — one of the most common and visually striking secondary uranium minerals. The autunite group contains numerous members with different interlayer cations. Meta-autunite-I (fewer water molecules) forms when autunite dehydrates; this transition can damage crystals."

crystallography:
  crystal_system: tetragonal
  crystal_class: "ditetragonal dipyramidal"
  space_group: "P4/nnc"
  unit_cell_notes: "a ≈ 6.990 Å, c ≈ 20.69 Å"
  twinning: "Not commonly reported."
  crystallography_notes: "Forms flat square to rectangular tabular crystals, often in fan-shaped or book-like aggregates. The {001} cleavage is perfect and makes crystals into thin flat plates. Crystals and micas-like foliated masses are characteristic."

physical_properties:
  mohs_hardness: "2–2.5"
  specific_gravity: "3.05–3.20"
  luster: [vitreous, pearly on cleavage]
  streak: yellow
  transparency: [transparent, translucent]
  cleavage:
    - "perfect {001}"
    - "good {100}"
  fracture: [uneven]
  tenacity: brittle
  physical_notes: "Very soft. Perfect basal cleavage yields thin flexible (but not elastic) cleavage plates. High SG for a phosphate reflects uranium content."

