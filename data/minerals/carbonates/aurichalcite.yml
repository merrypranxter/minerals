cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "No significant historical industrial use."
    - "Named from Greek 'aurichalcum' (gold-copper alloy; brass) — a classical reference to its mix of copper and zinc, the metals that compose brass."
    - "Primarily a collector mineral."
  cultural_associations:
    - "The name connects to 'orichalcum' — the mythical metal of Atlantis in Plato's dialogues (likely referring to brass or a gold-copper alloy)."
  symbolism:
    - pastel copper-zinc
    - gentle aqua
    - soft mineral elegance
  folklore_notes: "The etymological connection to 'orichalcum' (the famed metal of Atlantis) gives aurichalcite a faint mythological resonance, even though the mineral itself has no actual ancient cultural use."

