chemical_profile:
  ideal_formula: "(Zn,Cu)5(CO3)2(OH)6"
  simplified_formula: "(Zn,Cu)5(CO3)2(OH)6"
  essential_elements: [Zn, Cu, C, O, H]
  trace_elements_common: [Ca, Pb]
  structural_units:
    - "carbonate groups (CO3)²⁻"
    - "hydroxyl groups (OH)⁻"
    - "Zn/Cu in mixed octahedral and tetrahedral coordination"
  atomic_structure_notes: "Monoclinic structure with alternating Zn/Cu-rich layers. The ratio of Zn to Cu varies; pure end-members are not commonly found in nature. Cu imparts blue-green color; Zn-dominant varieties may be paler."
  chemistry_notes: "A mixed zinc-copper hydroxide carbonate. Forms in oxidized zones where both zinc and copper sulfides are present together. The pale blue-green color reflects the mixed Cu/Zn character — less intensely blue than azurite, less green than malachite."

crystallography:
  crystal_system: monoclinic
  crystal_class: "prismatic"
  space_group: "C2/m"
  unit_cell_notes: "a ≈ 13.82 Å, b ≈ 9.33 Å, c ≈ 5.30 Å, β ≈ 94.5°"
  twinning: "Not commonly reported."
  crystallography_notes: "Forms extremely thin, elongated to acicular lath-like crystals, often in fanned aggregates or silky fibrous masses. Crystals are typically <2 mm and delicate. The lath habit and silky luster on tufted aggregates are characteristic."

