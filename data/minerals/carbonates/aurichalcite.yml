  vibe_notes: "Aurichalcite is the softest thing in a copper-zinc oxidation zone — a pale, airy, fibrous counterpoint to the intensity of azurite and malachite. It looks like frozen sea foam or the world's most delicate turquoise velvet."

practical_notes:
  toxicity: "Copper and zinc-bearing mineral. Avoid generating dust. Wash hands after handling. Do not ingest."
  handling_notes: "Extremely delicate and fragile. Handle only by the matrix. Do not touch the crystal aggregates. Do not use ultrasonic cleaners. Vibration may break specimens."
  care_notes: "Minimal intervention. Light dusting only. Do not expose to water or acids. Store in padded individual box away from vibration."
  treatments_or_synthetics:
    - "No synthetic aurichalcite on the collector market."
  common_confusions:
    - "Rosasite (also acicular blue-green, similar habit — key test: locality and associated minerals)"
    - "Hemimorphite (different crystal habit, vitreous luster)"
    - "Chrysocolla (amorphous, waxy luster, different habit)"
    - "Shattuckite (blue, different crystal habit)"
  market_notes: "Available from specialty mineral dealers. Fine specimens with good color and well-formed tufts on quality matrix are prized collectors' items. Bisbee and Mapimí material is especially sought after."

