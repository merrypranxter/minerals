  visual_notes: "Aurichalcite creates delicate, airy blue-green tufts — like pale aquamarine cotton balls or sea-foam crusts on dark matrix. The color is softer and less saturated than malachite or azurite, but the texture is uniquely silky and fragile-beautiful. Often associated with the more intense colors of azurite and malachite, providing a pastel counterpoint."

