  vibe_notes: "Cerussite is deceptively beautiful for a white mineral — the extreme adamantine luster and bizarre geometric twinning make it one of the most architecturally interesting specimens in any collection. Pick one up and you'll immediately notice the shocking weight."

practical_notes:
  toxicity: "LEAD MINERAL — moderate to high hazard. Avoid generating dust. Wash hands thoroughly after handling. Do not ingest. Keep away from children. Do not use in jewelry that contacts skin if not polished/sealed."
  handling_notes: "Handle normally as a display specimen. Avoid breaking (creates lead dust). Do not grind or polish without appropriate respiratory protection."
  care_notes: "Do not clean with acid — dissolves in HCl. Water cleaning is acceptable. Store in labeled container; restrict access for children."
  treatments_or_synthetics:
    - "No synthetic cerussite on the collector market."
    - "No known treatments."
  common_confusions:
    - "Anglesite (also heavy, also colorless; streak and acid test differ — anglesite less reactive to HCl)"
    - "Aragonite (much lower SG; effervesces in cold HCl like cerussite but much lighter)"
    - "Baryte (similar SG; different crystal habit, non-reactive to HCl)"
  market_notes: "Prized collector mineral. Complex twinned specimens and large transparent crystals are highly valued. Tsumeb and Touissit specimens are especially prized."

