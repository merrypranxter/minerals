  fluorescence:
    shortwave_uv: "yellow, cream, or orange — variable"
    longwave_uv: "variable; often weak"
    fluorescence_color: variable
  tenebrescence: false
  phosphorescence: "sometimes brief yellowish"
  special_effects:
