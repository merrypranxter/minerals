chemical_profile:
  ideal_formula: "PbCO3"
  simplified_formula: "PbCO3"
  essential_elements: [Pb, C, O]
  trace_elements_common: [Sr, Ba, Ca]
  structural_units:
    - "carbonate groups (CO3)²⁻"
    - "Pb²⁺ in 9-coordination (aragonite-type structure)"
  atomic_structure_notes: "Aragonite-type structure with Pb²⁺ substituting for Ca²⁺. The large Pb²⁺ ion (much larger than Ca²⁺) makes cerussite isomorphous with aragonite and strontianite rather than calcite."
  chemistry_notes: "Cerussite is the oxidized, weathered form of galena (PbS). In oxidized ore deposits, galena reacts with CO₂-bearing groundwater to form cerussite. The high lead content gives cerussite its exceptional specific gravity (~6.55) — very heavy for a carbonate mineral."

crystallography:
  crystal_system: orthorhombic
  crystal_class: "dipyramidal"
  space_group: "Pmcn"
  unit_cell_notes: "a ≈ 5.180 Å, b ≈ 8.492 Å, c ≈ 6.153 Å"
  twinning: "Polysynthetic twinning extremely common, producing characteristic V-shaped twin pairs, cyclic rosettes (3- or 6-fold), and reticulated networks. One of the most twinned minerals."
  crystallography_notes: "Forms prismatic, tabular, or acicular crystals. Twinning is extremely common and complex — star-shaped sixling twins (cyclic), V-twins, and lattice-like reticulated networks are characteristic. The extreme adamantine luster and complex twinning are diagnostic."

physical_properties:
  mohs_hardness: "3–3.5"
  specific_gravity: "6.46–6.57"
  luster: [adamantine, resinous, vitreous]
  streak: white
  transparency: [transparent, translucent, opaque]
  cleavage:
    - "good {110}"
    - "poor {021}"
  fracture: [conchoidal]
  tenacity: brittle
  physical_notes: "Exceptionally heavy — one of the densest of the common carbonate minerals. Adamantine luster is strong. Colorless to gray crystals with intense internal light scattering. Notable for complex twinning. Effervesces in dilute HCl."

