    - rosette-like cyclic twin groups
    - massive white aggregates
  visual_notes: "Cerussite's defining characteristic is its extraordinary combination of brilliant adamantine luster (nearly diamond-like), unusual crystal forms from complex twinning, and exceptional density. Star-shaped cyclic twins are among the most geometrically spectacular crystal arrangements in mineralogy. Despite being colorless or white, the intense luster makes specimens visually electric."

