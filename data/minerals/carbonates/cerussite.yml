cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Important lead ore historically — 'white lead ore'."
    - "Lead white pigment (2PbCO₃·Pb(OH)₂ = lead carbonate hydroxide) historically derived from related lead compounds — though this is not pure cerussite."
    - "Named from Latin 'cerussa' (white lead) by Wilhelm Haidinger, 1845."
    - "Source of lead in smelting operations."
  cultural_associations:
    - "Lead white pigment was the dominant white in European oil painting for centuries."
    - "CAUTION: Historical lead white paints are toxic."
  symbolism:
