chemical_profile:
  ideal_formula: "MnCO3"
  simplified_formula: "MnCO3"
  essential_elements: [Mn, C, O]
  trace_elements_common: [Fe, Ca, Mg, Zn, Co]
  structural_units:
    - "CO3 planar triangular groups"
    - "MnO6 octahedra (Jahn-Teller distorted)"
  atomic_structure_notes: "Isostructural with calcite (trigonal, R-3c). Mn2+ occupies the Ca2+ site; the Jahn-Teller distortion of Mn2+ is mild compared to Cu2+. Forms continuous solid solutions toward calcite (manganoan calcite / kutnahorite) and siderite."
  chemistry_notes: "The pink-to-red color is intrinsic to Mn2+ in the carbonate structure. Fe substitution darkens toward brown; Ca substitution dilutes the pink toward pale cream. Pure endmember is vivid raspberry-red; natural specimens with Fe/Ca show orange, peach, or pale-pink banding."

crystallography:
  crystal_system: trigonal
  crystal_class: "hexagonal scalenohedral (3 2/m)"
  space_group: "R-3c"
  unit_cell_notes: "a ≈ 4.78 Å, c ≈ 15.67 Å"
  twinning: "Contact twins on {01-12} occasionally reported"
  crystallography_notes: "Crystals typically rhombohedral with curved faces (saddle-shaped or cobbled appearance), or curved scalenohedral. Massive and banded (layered) forms are classic; stalactitic, botryoidal, and cleavage rhombs also occur. Crystal faces often display striated or curved surfaces."

physical_properties:
  mohs_hardness: "3.5–4"
  specific_gravity: "3.50–3.70"
  luster: [vitreous, pearly, resinous]
  streak: white
  transparency: [transparent, translucent, opaque]
  cleavage:
    - "perfect rhombohedral {10-14} — three directions"
  fracture: [uneven, conchoidal]
  tenacity: brittle
  physical_notes: "Similar hardness and cleavage to calcite but denser (higher SG due to Mn). Reacts with warm dilute HCl but less vigorously than calcite in cold acid. Rhombohedral cleavage and characteristic pink color are definitive for hand-specimen ID."

appearance:
  baseline_colors:
    - pink
    - rose-red
    - raspberry-red
  color_profiles:
    - name: Raspberry / Crystal Rhodochrosite
      colors: [raspberry-red, deep-pink, vivid-rose, scarlet-pink]
      cause: "High Mn content with minimal Fe/Ca dilution; Mn2+ d-d transition."
      conditions: "Well-crystallized specimens from Sweet Home Mine and Catamarca; transparent gem-quality material."
      variety_name: raspberry-rhodochrosite
    - name: Inca Rose (Banded Stalactitic)
      colors: [pale-pink, rose-pink, white, cream, orange-pink]
      cause: "Alternating layers with varying Mn/Ca/Fe ratios; banding reflects changing fluid chemistry."
      conditions: "Stalactitic or stalagmitic forms from Argentina; polished slabs show concentric pink-white banding."
      variety_name: inca-rose
    - name: Orange-Brown Rhodochrosite
      colors: [orange-pink, peach, salmon, brown-pink]
      cause: "Higher Fe substitution (toward siderite) diluting and warming the pink."
      conditions: "Common in many hydrothermal deposits."
      variety_name: null
  habits:
    - rhombohedral (curved faces)
    - scalenohedral
    - massive
    - stalactitic
    - botryoidal
    - granular
    - cleavage rhombs
  textures:
    - curved glassy faces
    - banded (stalactitic)
    - concentric layers
    - sugary massive
  macro_patterns:
    - concentric pink-white banding (stalactitic)
    - rhombic cleavage geometry
    - layered color zones
  common_forms:
    - curved rhombohedral crystals on matrix
    - banded stalactitic slabs (Inca Rose)
    - massive granular aggregates
  visual_notes: "The banded 'Inca Rose' stalactitic form from Argentina — polished to reveal concentric pink-and-white rings — is one of the most recognized ornamental stone patterns in the gem world. Crystallized raspberry-red specimens from Colorado are among the most sought-after collector mineral specimens globally."

