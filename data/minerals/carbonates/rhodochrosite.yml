  vibe_notes: "Rhodochrosite lives between pink and red — the color of living tissue, roses, and sunsets. The Inca Rose banding reads as geological diary — each layer a year of cave drip. The Sweet Home crystals are raspberry-red architectural perfection."

practical_notes:
  toxicity: "Low toxicity; manganese in dust form (prolonged occupational inhalation) is a known neurotoxin (manganism). Normal specimen handling is safe. Do not sand or grind without dust protection."
  handling_notes: "Soft and brittle with perfect cleavage — handle crystals carefully. Banded ornamental material is durable when polished but avoid impact. Curved crystal faces on fine specimens are irreplaceable."
  care_notes: "Avoid acids (dissolves). Avoid scratching (easily scratched by quartz, glass). Clean with dry or barely damp soft cloth. Avoid ultrasonic cleaners. Store separately from harder minerals."
  treatments_or_synthetics:
    - "Stabilized/resin-filled banded material for lapidary use"
    - "Synthetic rhodochrosite produced but rarely seen commercially"
  common_confusions:
    - "Rhodonite (MnSiO3 — silicate, harder, pink with black veining)"
    - "Rose quartz (much harder; no banding pattern)"
    - "Thulite (zoisite variety — harder; metamorphic)"
    - "Mangano-calcite (paler pink; lower SG; may fluoresce more strongly)"
    - "Pink fluorite (cubic; different cleavage)"
  market_notes: "Fine transparent crystals (Sweet Home, Colorado) command significant collector prices. Inca Rose banded slabs and cabochons are mainstream gem market. National gemstone of Argentina gives it strong cultural market. Moderate to premium pricing depending on quality."

