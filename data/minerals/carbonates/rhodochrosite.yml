  locality_scope: worldwide but deposit-linked
  notable_localities:
    - "Sweet Home Mine, Park County, Colorado, USA (world's finest transparent red crystals)"
    - "Catamarca Province, Argentina (Inca Rose stalactitic material)"
    - "San Luis, Argentina (additional Inca Rose deposits)"
    - "N'Chwaning Mine, Northern Cape, South Africa (vivid pink crystals)"
    - "Hotazel, Northern Cape, South Africa"
    - "Alma district, Colorado, USA (historic polymetallic veins)"
    - "Capillitas mine, Catamarca, Argentina"
    - "Szklary, Poland (historic locality)"
  occurrence_notes: "Requires Mn-rich hydrothermal fluids. Common in the oxidized portions and high-temperature veins of silver-lead-zinc polymetallic sulfide deposits. The stalactitic/stalagmitic 'Inca Rose' variety forms in open cavities within mines. Argentina is the largest source of ornamental material; Colorado Sweet Home Mine produces the finest gem crystals."

cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Ornamental stone (Inca Rose carvings and cabs)"
    - "Manganese ore (low grade; not primary source)"
    - "Used by Inca and pre-Columbian Andean cultures in ornaments"
    - "Gem and lapidary use (faceted gems from transparent material, cabochons from banded)"
  cultural_associations:
    - "'Inca Rose' — traditional association with Argentine national identity"
    - "National gemstone of Argentina since 2002"
    - "Colorado state mineral of Colorado, USA"
    - "Inca mythology linked the stone to petrified tears of ancient rulers — origin of 'Rosa del Inca'"
  symbolism:
    - love and compassion
    - self-worth and healing
    - rose-heart energy
    - Argentine Andean identity
  folklore_notes: "Argentine tradition holds that rhodochrosite (Inca Rose) was formed from the blood of ancient Inca kings and queens crystallized over time — giving the stone its name 'Rosa del Inca' (Rose of the Inca). Argentina declared it the national gemstone in 2002. The Sweet Home Mine in Colorado produced specimens that broke world records for collector rhodochrosite."

