  locality_scope: worldwide
  notable_localities:
    - "Helgustaðir, Reyðarfjörður, Iceland (optical Iceland spar — historical source)"
    - "Elmwood Mine, Smith County, Tennessee, USA (spectacular dogtooth clusters)"
    - "Tsumeb, Namibia (diverse crystal habits)"
    - "Guanajuato, Mexico (scalenohedral and rhombohedral clusters)"
    - "Sweetwater Mine, Reynolds County, Missouri, USA"
    - "Carrara, Tuscany, Italy (Carrara marble)"
