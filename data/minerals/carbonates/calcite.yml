  occurrence_notes: "Among the most abundant carbonate minerals; constitutes limestone (a major sedimentary rock type), marble, and chalk. Present in virtually every geological environment. The second most common mineral in Earth's crust after quartz and feldspar. Biogenic calcite builds shells, coral reefs, and deep-sea ooze."

cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Building stone (limestone, marble) since antiquity"
    - "Iceland spar used in Nicol prisms for polarized light research"
    - "Marble carving (Greek and Roman sculpture, Italian Renaissance)"
    - "Agricultural lime (soil amendment)"
    - "Cement and concrete (Portland cement)"
    - "Chalk for writing"
    - "Acid neutralization (water treatment, mine drainage)"
    - "Glass making (limestone flux)"
    - "Steel manufacturing flux"
    - "Statuettes and carvings (alabaster calcite)"
  cultural_associations:
    - "White marble as the material of classical civilization (Parthenon, Michelangelo's David)"
    - "Calcite veining in marble symbolic of Roman luxury and imperial power"
    - "Iceland spar possibly used by Vikings as a 'solar stone' sunstone for navigation"
    - "Cave calcite (stalactites) central to underground spiritual sites globally"
  symbolism:
    - clarity
    - structure
    - foundation
    - purity
    - amplification
  folklore_notes: "Iceland spar's double refraction fascinated early scientists — it was central to Huygens' (1690) wave theory of light and was used in early polarimetry. Some researchers have proposed Viking navigators used Iceland spar to locate the sun in cloudy Arctic skies, though evidence remains debated. Calcite is the mineral of civilization — every major stone-building culture from Egypt to Rome to the Aztecs used it."

