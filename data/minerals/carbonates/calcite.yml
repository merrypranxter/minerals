  vibe_notes: "Calcite is the mineral that built civilization's monuments and floors its caves with crystal cathedrals. It reacts with acid — a rare dramatic chemistry demonstration in geology. The most morphologically diverse mineral on Earth; no two habits look alike."

practical_notes:
  toxicity: "Non-toxic; major component of antacids (calcium carbonate). Chalk dust inhalation in quantity warrants caution but calcite is not a hazardous mineral."
  handling_notes: "Soft (Mohs 3) — scratched by a fingernail with effort; easily scratched by a coin. Handle crystal specimens carefully to protect terminations. Cleavage fragments have sharp edges."
  care_notes: "Avoid acids — even mild acids (vinegar, fruit juices) will dissolve calcite surfaces. Do not soak in water for extended periods. Clean with dry or barely-damp cloth. Do not store with harder minerals that will scratch."
  treatments_or_synthetics:
    - "Dyed calcite slabs common in the ornamental stone market (blue, green, purple)"
    - "Synthetic calcium carbonate (precipitated) used industrially"
    - "Heat treatment converts some calcite colors (fluorescence tests sometimes useful)"
  common_confusions:
    - "Quartz (harder — cannot be scratched by coin; does not effervesce in HCl)"
    - "Dolomite (does not effervesce in cold dilute HCl; effervesces only in warm/powdered)"
    - "Aragonite (CaCO3 polymorph — slightly harder, denser; acicular habit more common)"
    - "Gypsum (softer; can be scratched by fingernail easily; no effervescence)"
    - "Fluorite (cubic cleavage; harder)"
  market_notes: "Abundant and affordable. Collector specimens of complex crystal forms (dogtooth, rhombohedral) command moderate prices. Iceland spar optical grade historically important but now mostly synthetic alternatives used. Mangano-calcite popular in metaphysical market. Marble is a major commercial stone market."

