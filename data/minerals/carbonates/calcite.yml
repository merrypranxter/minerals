chemical_profile:
  ideal_formula: "CaCO3"
  simplified_formula: "CaCO3"
  essential_elements: [Ca, C, O]
  trace_elements_common: [Mn, Fe, Mg, Zn, Co, Sr, Ba, Pb]
  structural_units:
    - "CO3 triangular planar groups"
    - "CaO6 octahedra (distorted)"
  atomic_structure_notes: "Trigonal structure with alternating layers of Ca2+ cations and planar CO3 groups perpendicular to the c-axis. The CO3 triangles are oriented oppositely in alternate layers, creating the rhombohedral lattice."
  chemistry_notes: "Most stable polymorph of CaCO3 at surface conditions. Mn substitution produces pink mangano-calcite; Co produces cobaltoan calcite (pink-purple). Fe and Mg substitutions common in sedimentary and metamorphic settings. Complete solid solution to rhodochrosite (MnCO3) via kutnahorite."

crystallography:
  crystal_system: trigonal
  crystal_class: "hexagonal scalenohedral (3 2/m)"
  space_group: "R-3c"
  unit_cell_notes: "a ≈ 4.99 Å, c ≈ 17.06 Å; Z = 6"
  twinning: "Extremely common; {0001} and {01-12} twin laws produce butterfly, contact, lamellar, and penetration twins."
  crystallography_notes: "Displays over 300 known crystal forms — the most morphologically diverse common mineral. Scalenohedral (dogtooth), rhombohedral (nailhead), prismatic, tabular, and acicular habits all well-documented. Perfect rhombohedral cleavage in three directions is diagnostic."

physical_properties:
  mohs_hardness: 3
  specific_gravity: "2.71"
  luster: [vitreous, pearly, earthy]
  streak: white
  transparency: [transparent, translucent, opaque]
  cleavage:
    - "perfect rhombohedral {10-14} — three directions forming a rhombohedron"
  fracture: [conchoidal, subconchoidal]
  tenacity: brittle
  physical_notes: "Defines Mohs hardness 3. Perfect cleavage in three directions at ~75° (not 90°, unlike halite). Reacts visibly with dilute HCl (fizzes vigorously) — the definitive field test for calcite. Iceland spar exhibits extreme birefringence (double refraction) that visibly doubles images seen through the crystal."

