      conditions: "Bituminous limestone environments."
      variety_name: null
  habits:
    - scalenohedral (dogtooth)
    - rhombohedral (nailhead)
    - prismatic
    - acicular
    - tabular
    - massive
    - granular
    - stalactitic
    - botryoidal
    - oolitic
    - fibrous (satin spar)
  textures:
    - glassy (single crystals)
    - pearly on cleavage faces
    - fibrous silky (satin spar)
    - granular (marble, limestone)
    - chalky
  macro_patterns:
    - rhombohedral cleavage rhombs
    - dogtooth scalenohedral clusters
    - banded travertine / onyx marble
    - stalactitic concentric banding
  common_forms:
    - rhombic cleavage fragments
    - dogtooth crystal clusters
    - nail-head tabular crystals
    - stalactites and stalagmites
    - massive marble and limestone
    - travertine banded slabs
  visual_notes: "Calcite's extraordinary morphological diversity makes it among the most recognizable minerals despite no single defining habit. Clear Iceland spar shows remarkable double refraction — images appear doubled. Dogtooth clusters are among the most architecturally beautiful mineral specimens."

optical_and_special_effects:
  fluorescence: "Highly variable — many specimens fluoresce red, pink, orange, yellow, or blue under UV; mangano-calcite often fluoresces vivid pink-red under SW UV"
  phosphorescence: "Some specimens phosphoresce after UV; triboluminescent when cleaved"
  chatoyancy: "Fibrous satin-spar calcite shows cat's eye effect"
  asterism: ""
  iridescence: "Rare iridescence from thin-film interference in some specimens"
  pleochroism: "None (trigonal/uniaxial)"
  optical_notes: "Uniaxial negative. Extreme birefringence (Δn ≈ 0.172) — highest of any common mineral. nω = 1.658, nε = 1.486. Clear Iceland spar crystals display striking double refraction visible to the naked eye."

