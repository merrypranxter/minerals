  locality_scope: widespread but deposit-linked
  notable_localities:
    - "Tsumeb, Namibia (world-class crystals)"
    - "Chessy-les-Mines (Chessy), Lyon, France (type locality for 'chessylite' historic name)"
    - "Bisbee, Cochise County, Arizona, USA (Bisbee Blue — famous specimens)"
    - "Shimen, Hunan, China (large nodular masses)"
    - "Touissit, Morocco"
    - "Broken Hill, New South Wales, Australia"
    - "Siziwang Banner, Inner Mongolia, China (recent fine crystals)"
  occurrence_notes: "Strictly secondary, forming by oxidation of primary copper sulfides (chalcopyrite, chalcocite, bornite) in the presence of CO2-bearing groundwater. Typically found above the water table in the gossanous oxidized cap of copper deposits. Thermodynamically unstable — converts progressively to malachite with increasing moisture over time."

cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Pigment (azurite ground to blue pigment — used in Egyptian, Greek, and medieval European painting)"
    - "Substitute for lapis lazuli in medieval manuscripts and panel paintings"
    - "Copper ore (minor; too small quantities)"
    - "Ornamental use in beads and carvings (ancient Egypt, pre-Columbian Americas)"
    - "Blue pigment known as 'mountain blue' (German: Bergblau) in European painting through 17th century"
  cultural_associations:
    - "Used alongside lapis lazuli in Egyptian manuscripts and decorations"
    - "Medieval European painters used azurite for blue skies until replaced by smalt and then ultramarine"
    - "The blue in many Renaissance paintings (Vermeer, Van Eyck workshops) is partly azurite that has greened to malachite over centuries"
    - "Aztec and other Mesoamerican cultures used copper minerals as pigments and ornaments"
  symbolism:
    - heaven
    - insight
    - the sky above Egypt
    - depth and mystery
    - copper-fire blue
  folklore_notes: "In medieval Europe, azurite was called 'azzurrum' and was ground to produce blue paint; it was one of the few ways to achieve true blue before synthetic pigments. Many old paintings now show greenish skies where azurite has converted to malachite due to moisture exposure over centuries. Ancient Egyptians used azurite in ornaments and burial goods alongside lapis lazuli."

