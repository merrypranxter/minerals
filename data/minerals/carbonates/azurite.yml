  vibe_notes: "Azurite is blue fire from copper chemistry — secondary, unstable, perpetually converting to malachite. The medieval painters who ground it to pigment knew it would fade and green. That fragility is part of its identity."

practical_notes:
  toxicity: "Copper-bearing mineral — avoid ingesting powder or dust. Fine dust from cutting or grinding is hazardous. Handle finished specimens normally; wash hands after."
  handling_notes: "Relatively brittle with perfect cleavage — handle crystals gently. Soft matrix specimens may be delicate. Avoid water immersion as it may accelerate conversion to malachite."
  care_notes: "Keep dry; avoid acids (acetic acid in vinegar will dissolve). Do not use ultrasonic cleaners. Dust gently with a soft brush. Avoid high humidity storage."
  treatments_or_synthetics:
    - "Some azurite specimens stabilized with resin before cutting"
    - "Synthetic azurite exists but rarely in gem market"
    - "Azurmalachite may be resin-stabilized for lapidary use"
  common_confusions:
    - "Lapis lazuli (aggregate rock with pyrite; different chemistry; lazurite is the blue mineral)"
    - "Blue chrysocolla (softer, earthy, amorphous)"
    - "Shattuckite (blue copper silicate hydroxide; different structure)"
    - "Cavansite (blue vanadium silicate; different SG and habit)"
  market_notes: "Premium collector mineral. Fine crystallized specimens from Tsumeb and Bisbee are highly prized. Azurmalachite nodules popular as cabochon material. Earthy specimens affordable; excellent crystals can be expensive. Copper mine source-linked."

