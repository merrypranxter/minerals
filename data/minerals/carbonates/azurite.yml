chemical_profile:
  ideal_formula: "Cu3(CO3)2(OH)2"
  simplified_formula: "Cu3(CO3)2(OH)2"
  essential_elements: [Cu, C, O, H]
  trace_elements_common: []
  structural_units:
    - "CO3 planar triangular groups"
    - "CuO4 square planar and CuO6 octahedral units (Jahn-Teller distorted)"
  atomic_structure_notes: "Monoclinic structure with strongly distorted copper coordination due to Jahn-Teller effect on Cu2+. Two crystallographically distinct Cu sites, each with different geometry. Copper hydroxycarbonate."
  chemistry_notes: "Secondary copper mineral forming in oxidized zones of copper deposits. Chemical partner to malachite Cu2(CO3)(OH)2 — azurite forms where CO2 activity is higher, malachite where H2O activity is higher. Azurite converts to malachite (pseudomorphic replacement) under moist surface conditions over geologic time."

crystallography:
  crystal_system: monoclinic
  crystal_class: "2/m prismatic"
  space_group: "P21/c"
  unit_cell_notes: "a ≈ 5.01 Å, b ≈ 5.85 Å, c ≈ 10.35 Å, β ≈ 92.4°"
  twinning: "Uncommon"
  crystallography_notes: "Forms tabular, prismatic, or equant crystals with excellent terminations. Also found as radiating aggregates, rosettes, nodular masses, and earthy crusts. Crystal faces often show deep azure-blue color with vitreous to adamantine luster."

physical_properties:
  mohs_hardness: "3.5–4"
  specific_gravity: "3.77–3.89"
  luster: [vitreous, adamantine]
  streak: light-blue
  transparency: [transparent, translucent, opaque]
  cleavage:
    - "perfect {011}"
    - "fair {100}"
  fracture: [conchoidal, irregular]
  tenacity: brittle
  physical_notes: "Notably heavy for a non-metallic mineral (SG ~3.8). Perfect cleavage produces clean faces. Individual crystals can be transparent and brilliantly blue. Earthy azurite is much less lustrous."

