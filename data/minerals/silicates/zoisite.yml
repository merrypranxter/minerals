  locality_scope: worldwide
  notable_localities:
    - "Merelani Hills, Arusha, Tanzania (tanzanite)"
    - "Lofoten, Norway (thulite)"
    - "Longido, Tanzania (anyolite)"
    - "Saualpe, Carinthia, Austria"
    - "Valle d'Aosta, Italy"
    - "Pakistan (gem quality)"
  occurrence_notes: "Zoisite forms in metamorphic and metasomatic settings. Tanzanite occurs only at the Merelani Hills deposit — one of the world's most famous single-locality gemstone deposits."

cultural_and_historical:
  historical_uses:
    - "Named after Sigmund Zois (1747–1819), Slovenian nobleman and mineral collector, by Abraham Werner."
    - "Tanzanite discovered in 1967 by Maasai herder and brought to prominence by Tiffany & Co."
    - "Tiffany & Co. named the blue variety 'tanzanite' in 1968 and launched it as a luxury gemstone."
    - "Anyolite used as ornamental carving stone."
  cultural_associations:
    - "Tanzanite became the December birthstone addition in 2002 (American Gem Trade Association)."
    - "Strongly associated with Tanzania and African gemstone heritage."
  symbolism:
    - transformation
    - blue wisdom
    - African gem
    - rare discovery

interpretive_vibe:
  mood_keywords:
    - trichroic-transformation
    - Africa-blue
    - metamorphic-beauty
    - Tiffany-jewel
  palette_keywords:
    - blue-violet
