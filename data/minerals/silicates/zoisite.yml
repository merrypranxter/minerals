chemical_profile:
  ideal_formula: "Ca2Al3(SiO4)(Si2O7)O(OH)"
  simplified_formula: "Ca2Al3Si3O12(OH)"
  essential_elements: [Ca, Al, Si, O, H]
  trace_elements_common: [Fe, Mn, V, Cr]
  structural_units:
    - "isolated SiO4 tetrahedra"
    - "Si2O7 diorthosilicate groups (sorosilicate)"
    - "Al in octahedral coordination"
    - "OH groups"
  atomic_structure_notes: "Sorosilicate (group silicate) in the epidote group. Zoisite is the orthorhombic polymorph; clinozoisite is the monoclinic polymorph with same composition. The zoisite structure has two distinct Al octahedral sites (M1 and M3); V³⁺ in M1 produces tanzanite-blue."
  chemistry_notes: "Zoisite forms a range of varieties: tanzanite (V/vanadium-rich blue), thulite (Mn-rich pink), and the decorative ruby-in-zoisite (anyolite). The parent species zoisite is typically gray, green, or white in massive form."

crystallography:
  crystal_system: orthorhombic
  crystal_class: "dipyramidal"
  space_group: "Pnma"
  unit_cell_notes: "a ≈ 16.22 Å, b ≈ 5.55 Å, c ≈ 10.04 Å"
  twinning: "Rare."
  crystallography_notes: "Typically forms prismatic to tabular crystals with striated prism faces. Also massive, granular. Tanzanite variety shows distinctive blue-violet-purple trichroism."

physical_properties:
  mohs_hardness: "6–7"
  specific_gravity: "3.10–3.38"
  luster: [vitreous, pearly on cleavage]
  streak: white
  transparency: [transparent, translucent, opaque]
  cleavage:
    - "perfect {010}"
  fracture: [uneven, conchoidal]
  tenacity: brittle
  physical_notes: "Good hardness for a collector mineral. Perfect cleavage in one direction. SG varies with composition."

appearance:
  baseline_colors:
    - gray
    - white
    - pale-green
    - pink (thulite)
    - blue-violet (tanzanite)
    - green-pink (anyolite)
  color_profiles:
    - name: gray-green-white
      colors: [gray, white, pale-green, yellowish]
      cause: "No significant chromophore; typical rock-forming zoisite."
      conditions: "Most metamorphic zoisite."
      variety_name: null
    - name: thulite-pink
      colors: [pink, rose, salmon]
      cause: "Mn²⁺ substituting for Ca or Al."
      conditions: "Mn-rich metamorphic assemblages; Norway."
      variety_name: thulite
    - name: tanzanite-blue-violet
      colors: [blue, violet, purple, blue-violet, blue-purple]
      cause: "V³⁺ in Al site; strongly trichroic — blue (c), violet (b), red-brown (a)."
      conditions: "Tanzanite variety from Merelani Hills, Tanzania; requires heat treatment to stabilize blue."
      variety_name: tanzanite
    - name: anyolite-green-pink
      colors: [bright-green, ruby-red patches, black hornblende inclusions]
      cause: "Green from Cr³⁺ or V in zoisite; ruby patches are corundum; black is hornblende."
      conditions: "Decorative massive material from Tanzania."
      variety_name: anyolite
  habits:
    - prismatic
    - columnar
    - massive
    - granular
  textures:
    - striated prisms
    - vitreous faces
    - pearly cleavage
  macro_patterns:
    - gray striped prisms
    - pink thulite masses (Norway)
    - green-pink-black anyolite (Tanzania)
  common_forms:
    - prismatic crystals (collector)
    - massive thulite (ornamental)
    - anyolite decorative rock
    - tanzanite crystals (gemstone)
  visual_notes: "Zoisite as a species is visually modest — gray or white prismatic crystals. Its varieties are spectacular: tanzanite is one of the most prized gemstones, thulite is a striking pink ornamental stone, and anyolite is a bizarre three-color decorative rock. The parent species is the quiet host of brilliant children."

optical_and_special_effects:
  fluorescence:
    shortwave_uv: "none typical"
    longwave_uv: "none typical"
    fluorescence_color: none
  tenebrescence: false
  phosphorescence: "none"
  special_effects:
