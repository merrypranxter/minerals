  vibe_notes: "Zoisite is a species with range — from dull gray metamorphic rock to tanzanite, one of the world's most coveted gems. It encapsulates geological transformation: the same mineral system expressing as mundane gray rock or blue-violet fire."

practical_notes:
  toxicity: "Non-toxic."
  handling_notes: "Handle normally. Tanzanite faceted gems: perfect cleavage makes them fragile — avoid thermal shock and physical impact."
  care_notes: "Clean with water and mild soap. No ultrasonic or steam for tanzanite (cleavage risk). Tanzanite color may be altered by heat."
  treatments_or_synthetics:
    - "Tanzanite is routinely heat-treated (400–500°C) to convert brownish V-bearing zoisite to pure blue-violet."
    - "Nearly all commercial tanzanite has been heat-treated; this is accepted and disclosed practice."
  common_confusions:
    - "Tanzanite vs. sapphire (test: trichroism, SG, locality)"
    - "Thulite vs. rhodonite (different chemistry; test with density)"
  market_notes: "Tanzanite is a major commercial gemstone. The Merelani deposit is finite and may be exhausted within decades — this drives premium pricing."

