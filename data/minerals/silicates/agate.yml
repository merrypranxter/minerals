    - texture library anchor
  vibe_notes: "Agate is a mineral calendar — each band a record of deposition. In cross-section it reads like geologic stratigraphy compressed into a hand-held nodule. The fortification pattern is one of the most compelling natural geometries."

practical_notes:
  toxicity: low
  handling_notes: "Durable and safe for everyday handling. Fine silica dust hazard when cutting or grinding; use respiratory protection."
  care_notes: "Generally stable. Avoid harsh acids. Dyed agates can fade with prolonged UV exposure."
  treatments_or_synthetics:
    - "Dyeing extremely common in trade — reds, greens, blues, blacks frequently artificial"
    - "Differential porosity between bands allows selective dye uptake for vivid color contrasts"
    - "Heat treatment can alter some colors"
  common_confusions:
    - jasper (opaque, no banding)
    - chalcedony (unbanded)
    - dyed howlite
    - synthetic resin imitations
  market_notes: "Very large global market. Brazilian agate is the world's dominant commercial source. Dyed agates are ubiquitous and often sold without disclosure. High-quality specimens from Botswana, Montana, and Germany command premium prices."

