  vibe_notes: "Dioptase is proof that the mineral world can outperform emeralds in pure color intensity. Small crystals, massive color impact. It is a mineral for people who want green at its most alive."

practical_notes:
  toxicity: "Copper-bearing mineral. Avoid ingesting dust. Wash hands after handling. Do not grind."
  handling_notes: "Fragile — perfect cleavage and brittle fracture. Hold matrix, not crystals. Do not use ultrasonic cleaners."
  care_notes: "Do not clean with acid (destroys copper minerals). Light dusting with soft brush. Avoid water if possible; brief rinse acceptable. Store in padded tray."
  treatments_or_synthetics:
    - "No synthetic dioptase on the market."
    - "No known treatments for dioptase specimens."
  common_confusions:
    - "Emerald (much harder, different crystal system)"
    - "Malachite (lower luster, never prismatic crystals like dioptase)"
    - "Shattuckite (similar locality, blue rather than green)"
    - "Chrome diopside (different chemistry, igneous not secondary)"
  market_notes: "Highly prized by collectors. Fine Tsumeb specimens command significant prices. Quality determined by crystal size, clarity, matrix quality, and color intensity."

