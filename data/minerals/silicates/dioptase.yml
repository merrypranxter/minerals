cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Described as a mineral species in 1797 by René Just Haüy."
    - "Named from Greek 'dia' (through) + 'opazein' (to see through) referring to the internal cleavage reflections."
    - "Highly prized collector mineral for its exceptional color."
    - "Sometimes faceted as a collector gemstone, though fragility limits use."
  cultural_associations:
    - "Associated with heart chakra energy in crystal healing traditions."
    - "Compared to emerald; sometimes called 'emerald of the copper world'."
  symbolism:
    - vivid life
    - copper-green
    - heart
    - healing
    - tropical abundance
  folklore_notes: "Dioptase has minimal historical cultural use — it is primarily a modern collector's mineral, prized for its extraordinary green. The name 'through + to see' refers to how light plays through the perfect cleavage surfaces of the crystals."

