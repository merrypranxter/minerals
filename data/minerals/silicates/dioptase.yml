chemical_profile:
  ideal_formula: "Cu6[Si6O18]·6H2O"
  simplified_formula: "CuSiO3·H2O"
  essential_elements: [Cu, Si, O, H]
  trace_elements_common: [Fe, Ca, Mg]
  structural_units:
    - "Si6O18 six-membered cyclosilicate rings"
    - "CuO6 octahedra (Cu²⁺ in Jahn-Teller distorted octahedral coordination)"
    - "hydrogen-bonded water molecules"
  atomic_structure_notes: "Cyclosilicate with six-membered Si6O18 rings stacked along the c-axis. Cu²⁺ ions occupy distorted octahedral sites (Jahn-Teller effect due to d⁹ configuration). Water molecules are incorporated into the structure and are essential; heating drives them off and destroys the crystal structure."
  chemistry_notes: "The intense emerald-green color arises from Cu²⁺ in distorted octahedral coordination with O and OH ligands — a d-d charge transfer producing unusually strong absorption in the red and yellow spectral region. The color is one of the most saturated greens in the mineral kingdom."

crystallography:
  crystal_system: trigonal
  crystal_class: "rhombohedral"
  space_group: "R3̄"
  unit_cell_notes: "a ≈ 14.566 Å, c ≈ 7.786 Å (hex setting)"
  twinning: "Rare."
  crystallography_notes: "Forms prismatic to short-prismatic crystals with rhombohedral terminations. Often occurs as drusy crusts of small brilliant crystals on matrix. Cleavage is perfect along {1011}, giving crystals a faceted internal light reflection."

physical_properties:
  mohs_hardness: 5
  specific_gravity: "3.28–3.35"
  luster: [vitreous]
  streak: "green"
  transparency: [transparent, translucent]
  cleavage:
    - "perfect {1011} rhombohedral"
  fracture: [conchoidal]
  tenacity: brittle
  physical_notes: "Fragile — perfect cleavage in three directions makes crystals easy to shatter. Do not clean ultrasonically. Handle matrix specimens with great care."

