  common_forms:
    - drusy crusts and matrix specimens
    - individual prismatic crystals
    - massive compact aggregates
  visual_notes: "Dioptase produces one of the most vivid, saturated greens in the mineral world — rivaling fine emerald in color intensity but with a different quality of light. The small transparent-to-translucent prismatic crystals are typically found in brilliant drusy clusters on ochre-brown iron oxide matrix (gossan). The color contrast is extraordinary."

