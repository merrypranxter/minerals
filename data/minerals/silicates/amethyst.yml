practical_notes:
  toxicity: "Non-toxic."
  handling_notes: "Color fades with prolonged UV exposure and heat above ~300°C. Avoid extended sunlight display. Safe for most jewelry use."
  care_notes: "Clean with warm soapy water. Ultrasonic generally safe. Avoid prolonged sunlight display. Do not steam-clean (heat risk). Store in dark when not displayed."
  treatments_or_synthetics:
    - "Heat treatment produces citrine from amethyst (commercial practice for citrine production)"
    - "Irradiation can deepen pale amethyst color (less common)"
    - "Synthetic amethyst (hydrothermal) widely produced — identified by inclusions and growth patterns"
    - "Glass simulants common in costume jewelry"
  common_confusions:
    - "Purple fluorite (softer — Mohs 4; cubic; different RI; cleavage)"
    - "Iolite (dichroic; biaxial; different RI)"
    - "Purple glass (different properties)"
    - "Kunzite (very strong pleochroism; biaxial; perfect cleavage)"
  market_notes: "Extremely abundant and affordable. Fine deep Zambian and deep Uruguayan material commands modest premium. 'Siberian' grade (deep with red flash) most prized. Mass market driven by Brazilian geodes. Synthetic widely produced but market not heavily affected (natural so cheap)."

