  visual_notes: "Aventurescence in sunstone appears as a glittering, spangling metallic flash — brighter and more dramatic than the soft glow of adularescence in moonstone. Oregon sunstone is the only known feldspar with native copper inclusions, giving it a uniquely warm, saturated color. The metallic sparkle in Norwegian sunstone has a coppery-gold quality."

optical_and_special_effects:
  fluorescence: ""
  phosphorescence: ""
  chatoyancy: "Rare cat's eye sunstone reported."
  asterism: "Rare 4-ray star sunstone reported in Oregon material."
  iridescence: "Aventurescence: metallic glitter and schiller from oriented hematite, goethite, or native copper platelets. More dramatic than moonstone adularescence — appears as individual flashing points or a broad metallic sheen depending on inclusion density and size."
  pleochroism: "Oregon sunstone shows moderate to strong pleochroism: colorless to pale yellow to deep orange-red depending on crystal orientation."
  optical_notes: "Aventurescence differs from adularescence (moonstone) and labradorescence (labradorite) in mechanism: it is reflection from individual metallic platelet surfaces, not thin-film interference. Oregon sunstone's pleochroism is notable and important for cutting orientation. The copper gives it an absorption spectrum distinct from hematite-bearing sunstone."

formation_and_occurrence:
  genesis:
    - magmatic
    - pegmatitic
  geologic_environments:
    - basaltic lava flows (Oregon sunstone — in basalt flows, not pegmatites)
    - pegmatites (Norwegian and Indian sunstone)
    - granitic pegmatites
  host_rocks:
    - basalt (Oregon)
    - pegmatite (Norway, India)
    - granite
  associated_minerals:
    - other feldspars
    - quartz
    - native copper (Oregon)
    - hematite
    - olivine (in basalt)
  locality_scope: localized
  notable_localities:
    - "Oregon, USA (Lake County — Ponderosa Mine and Glass Buttes; labradorite with native copper; official state gemstone of Oregon since 1987)"
    - "Norway (Tvedestrand, Aust-Agder — oligoclase with hematite; original European sunstone)"
    - "India (Rajasthan — oligoclase/labradorite with hematite/goethite; large commercial source)"
    - "Tanzania"
    - "Canada (Labrador — some sunstone adjacent to labradorite occurrences)"
    - "Australia"
  occurrence_notes: "Oregon sunstone occurs uniquely in basaltic lava flows of the Miocene age. The copper precipitated as native metal within the crystallizing feldspar. This formation in basalt (rather than pegmatite) is the primary geological distinction of Oregon sunstone."

cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Norwegian sunstone historically collected and used as ornamental stone"
    - "Oregon sunstone designated official state gemstone of Oregon in 1987"
    - "Viking sunstone (sólarsteinn): some researchers propose that Viking navigators used a transparent birefringent crystal — possibly calcite (Iceland spar) or cordierite — as a navigation tool; rarely associated with feldspar sunstone"
  cultural_associations:
    - "Associated with the sun, solar energy, and warmth across modern crystal traditions"
    - "Oregon sunstone: symbol of Pacific Northwest geology"
  symbolism:
    - solar-energy
    - vitality
    - warmth
    - abundance
  folklore_notes: "The term 'sólarsteinn' (sunstone) from Norse sagas refers to a navigational crystal, which has generated scholarly debate. Most evidence points to calcite (Iceland spar) or cordierite as the actual navigational stone, not feldspar sunstone — the overlap of the trade name with the saga reference is a modern confusion."

