  vibe_notes: "Sunstone has a grounded, warm, solar quality that contrasts with the cool lunar depth of moonstone. The aventurescent glitter reads as scattered light, like sunlight on moving water or the scatter of a copper fire. Oregon sunstone, with its native copper and rich saturated color, is among the most texturally and chromatically complex feldspars."

practical_notes:
  toxicity: low
  handling_notes: "Safe for handling. Two cleavage directions mean it can chip if struck. Moderate hardness (6–6.5) makes it vulnerable to scratching with daily wear."
  care_notes: "Do not use ultrasonic or steam cleaners. Clean with damp cloth. Avoid hard knocks. Remove before physical activity."
  treatments_or_synthetics:
    - "Glass with copper aventurine (goldstone/aventurine glass) is a common imitation widely confused with sunstone"
    - "Goldstone is man-made glass with copper particles — not a mineral"
    - "Some commercial 'sunstone' is dyed or treated material"
    - "Synthetic sunstone exists as lab-grown feldspar but is not widespread commercially"
  common_confusions:
    - goldstone (aventurine glass — man-made copper-glass imitation extremely common and widely mislabeled)
    - aventurine quartz (quartz-based aventurescence, different mechanism)
    - orange sapphire
    - hessonite garnet
  market_notes: "Oregon sunstone is the prestige variety; fine deep-red and bicolor stones command premium prices. The Ponderosa Mine offers public dig opportunities. Norwegian sunstone is less common commercially. Most inexpensive commercial sunstone is Indian oligoclase. Goldstone (glass) is pervasively sold as sunstone; buyers should verify."

