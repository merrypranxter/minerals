chemical_profile:
  ideal_formula: "Variable: (Na,Ca)(Al,Si)AlSi2O8 (oligoclase/labradorite) or KAlSi3O8 (orthoclase)"
  simplified_formula: "Variable by source"
  essential_elements: [Na, Ca, Al, Si, O]
  trace_elements_common: [Fe, Cu, K, Ba]
  structural_units:
    - "TO4 framework tetrahedra in 3D feldspar framework"
    - "metallic platelet inclusions (hematite, goethite, or native copper)"
  atomic_structure_notes: "Sunstone is defined by its inclusions, not a distinct feldspar composition. The optical effect (aventurescence) comes from oriented metallic platelets — hematite or goethite in oligoclase sunstone, or native copper in Oregon labradorite sunstone — oriented parallel to crystallographic planes in the feldspar host."
  chemistry_notes: "Oregon sunstone is a labradorite-composition plagioclase (An45–An68) with native copper inclusions. Norwegian sunstone is oligoclase with hematite platelets. Indian and other commercial sunstone is typically oligoclase with hematite or goethite inclusions. Copper-bearing Oregon sunstone is unique globally."

crystallography:
  crystal_system: triclinic
  crystal_class: "1-bar (plagioclase) or 2/m (orthoclase)"
  space_group: "P-1 (plagioclase) or C2/m (orthoclase)"
  unit_cell_notes: "Varies with parent feldspar species."
  twinning: "Polysynthetic albite and pericline twinning in plagioclase varieties."
  crystallography_notes: "The metallic inclusions responsible for aventurescence are aligned parallel to {001} or other crystallographic planes, which is why the schiller is directional."

physical_properties:
  mohs_hardness: "6–6.5"
  specific_gravity: "2.62–2.72"
  luster: [vitreous]
  streak: white
  transparency: [transparent, translucent]
  cleavage:
    - "perfect {001}"
    - "good {010}"
  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "Two cleavage directions typical of feldspars. Oregon sunstone ranges from colorless through yellow, orange, red, and deep copper-red/green. The more copper present, the deeper and more saturated the color and the stronger the aventurescence."

