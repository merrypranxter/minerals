chemical_profile:
  ideal_formula: "(Ca,Na)(Al,Si)4O8"
  simplified_formula: "(Ca,Na)(Al,Si)4O8"
  essential_elements: [Ca, Na, Al, Si, O]
  trace_elements_common: [K, Ba, Fe, Ti]
  structural_units:
    - "AlSi3O8 and CaAl2Si2O8 framework tetrahedra"
    - "corner-sharing TO4 tetrahedra in a 3D feldspar framework"
  atomic_structure_notes: "Framework silicate (tectosilicate). Labradorite is the intermediate member of the plagioclase solid-solution series between albite (NaAlSi3O8, An0) and anorthite (CaAl2Si2O8, An100), with composition An50–An70. The Al/Si ordering and Ca/Na distribution on specific sites define the structure. Lamellar intergrowths of Ca-rich and Na-rich feldspar domains on a nanometer scale are responsible for labradorescence."
  chemistry_notes: "Plagioclase series member. The labradorescence (schiller) effect arises from thin-film interference in alternating Ca-rich and Na-rich exsolution lamellae. Lamellar spacing of approximately 100–300 nm produces the interference colors observed."

crystallography:
  crystal_system: triclinic
  crystal_class: "1-bar (pinacoidal)"
  space_group: "P-1"
  unit_cell_notes: "a ≈ 8.17 Å, b ≈ 12.87 Å, c ≈ 7.11 Å; α ≈ 93.5°, β ≈ 116.6°, γ ≈ 90.5° (approximate; varies with composition)"
  twinning: "Polysynthetic twinning common (Carlsbad, Albite, and Pericline twin laws); lamellar twinning is related to exsolution and produces labradorescence."
  crystallography_notes: "Triclinic symmetry. Polysynthetic albite and pericline twinning visible microscopically and sometimes macroscopically. The exsolution lamellae responsible for labradorescence are crystallographically controlled."

physical_properties:
  mohs_hardness: "6–6.5"
  specific_gravity: "2.68–2.72"
  luster: [vitreous, pearly]
  streak: white
  transparency: [translucent, opaque, transparent]
  cleavage:
    - "perfect {001}"
    - "good {010}"
  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "Two cleavage directions typical of feldspars. Cleavage at nearly right angles (86° and 94°). Transparent gem-quality labradorite exists but is uncommon. Most specimens are translucent to opaque."

appearance:
  baseline_colors: [gray, dark-gray, black-gray, greenish-gray]
  color_profiles:
    - name: labradorescence-blue-green
      colors: [electric-blue, teal, peacock-blue, green]
      cause: "Thin-film interference from Ca-rich and Na-rich exsolution lamellae at ~100–300 nm spacing. Shorter lamellar spacing produces blue; longer spacing shifts toward green and gold."
      conditions: "Most common labradorescence colors; seen in standard gray labradorite."
      variety_name: null
    - name: labradorescence-gold-copper
      colors: [gold, copper-orange, amber]
      cause: "Longer-spacing exsolution lamellae shifting interference toward yellow-orange wavelengths."
      conditions: "Specific lamellar spacing; can coexist with blue-green in the same specimen."
      variety_name: null
    - name: spectrolite
      colors: [full-spectrum: blue, green, yellow, orange, red, violet — on near-black matrix]
      cause: "Full-range lamellar spacing distribution on a very dark ground mass, producing all visible colors."
      conditions: "Locality-specific to Ylämaa district, Finland. Requires the dark opaque ground color to display full spectrum."
      variety_name: spectrolite
    - name: transparent-gem
      colors: [colorless, yellow, orange, cognac, pale-green]
      cause: "Body color from iron or other trace impurities; transparent facetable material."
      conditions: "Rare; some sources in Ethiopia, Mexico (andesine controversy), Tanzania."
      variety_name: null
  habits:
    - massive
    - prismatic
    - tabular
    - lamellar
    - anhedral-granular
  textures:
    - smooth
    - pearly-cleavage-surfaces
    - lamellar
  macro_patterns:
    - labradorescent-flash
    - polysynthetic-twin-striations
    - cleavage-plane-shimmer
  common_forms:
    - massive polished slabs and cabochons
    - prismatic crystals in basalt
    - anorthosite rock slabs
    - tabular crystals in metamorphic rocks
    - tumbled stones
  visual_notes: "The labradorescence appears as a floating, depth-inhabiting iridescence that shifts with viewing angle and light direction. Unlike surface iridescence, it appears to come from within the stone. The dark gray to near-black base color intensifies the color display. Best specimens show full-spectrum color shift across a single face."

optical_and_special_effects:
  fluorescence: ""
  phosphorescence: ""
  chatoyancy: ""
  asterism: ""
  iridescence: "Labradorescence: intense thin-film interference iridescence showing blue, green, gold, copper, orange — and in spectrolite, the full visible spectrum — from exsolution lamellae oriented parallel to {010}. The effect is directional and changes with both viewing angle and light angle."
  pleochroism: "Weak in transparent material."
  optical_notes: "Labradorescence is caused by thin-film interference (Bragg reflection/constructive interference) from alternating Ca-rich (anorthite-component) and Na-rich (albite-component) exsolution lamellae, typically 100–300 nm thick, parallel to the {010} cleavage plane. The phenomenon is sometimes called schiller or adularescence in related feldspars, but labradorescence is the precise term for this plagioclase effect."

