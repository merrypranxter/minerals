  locality_scope: widespread
  notable_localities:
    - "Labrador, Canada (Paul's Island — type locality; first scientifically described 1770)"
    - "Madagascar (high labradorescence; major gem source)"
    - "Finland (Ylämaa district — spectrolite; near-black with full-spectrum labradorescence)"
    - "Ukraine (larvikite — a nepheline syenite with labradorite, used as architectural stone)"
    - "Russia (Kola Peninsula)"
    - "Mexico"
    - "United States (Oregon)"
    - "India"
  occurrence_notes: "Labradorite is an essential and very common mineral in mafic and intermediate igneous rocks worldwide. Gem-quality material with strong labradorescence is less common and associated with specific geological settings. The plagioclase in anorthosite massifs is often labradorite-composition."

cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "First described scientifically from Paul's Island, Labrador, Canada in 1770 by Moravian missionaries"
    - "Adopted as a gemstone and ornamental stone in the 18th–19th century"
    - "Finnish spectrolite quarried since the 1940s; national gemstone of Finland"
    - "Larvikite (Norwegian labradorite-bearing rock) used as architectural stone worldwide"
  cultural_associations:
    - "Inuit peoples of Labrador have stories of the Northern Lights being trapped in stone — labradorescence the cause"
    - "Associated with magic, transformation, and hidden knowledge in modern crystal traditions"
    - "National gemstone of Finland (spectrolite variety)"
  symbolism:
    - transformation
    - hidden-knowledge
    - northern-lights
    - prismatic-mystery
  folklore_notes: "Inuit legend describes the aurora borealis as frozen light trapped inside labradorite. Moravian missionaries encountering the stone in Labrador in 1770 were reportedly struck by the play of color. The Finnish spectrolite variety was not discovered until World War II when a German bomb crater revealed an extraordinary deposit."

