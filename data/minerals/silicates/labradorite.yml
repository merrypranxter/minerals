  vibe_notes: "Labradorite carries its color inside — it is not a surface phenomenon but a depth effect. The dark ground color against the shifting iridescence creates a sense of something luminous moving beneath a dark surface. Spectrolite, with its near-black matrix and full-spectrum display, is one of the most visually complex single mineral specimens on earth."

practical_notes:
  toxicity: low
  handling_notes: "Safe for handling. Cleavage in two directions means it can chip or cleave if dropped or struck. Avoid sharp impacts."
  care_notes: "Avoid ultrasonic cleaners (can shatter along cleavage planes). Clean with damp cloth. Avoid prolonged exposure to harsh chemicals."
  treatments_or_synthetics:
    - "Some transparent faceted 'andesine-labradorite' from China/Congo subject to copper-diffusion treatment controversy; treated material sold as natural"
    - "Surface coatings sometimes applied to enhance labradorescence on lower-quality material"
  common_confusions:
    - rainbow-moonstone (actually labradorite with adularescence-like effect; sold as moonstone in trade)
    - other feldspars
    - spectrolite vs standard labradorite (Finnish spectrolite is locality-specific and more valuable)
    - treated andesine-labradorite
  market_notes: "Madagascar provides most commercial gem-quality material. Spectrolite from Finland is premium. Rainbow moonstone (labradorite) is pervasive in the jewelry market. Strong full-spectrum labradorescence commands significant premiums."

