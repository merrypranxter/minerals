  occurrence_notes: "Aquamarine is the most widely distributed beryl variety — found in granitic pegmatites worldwide. Brazil is the dominant commercial producer. Large single crystals are more common in aquamarine than in any other beryl variety, as aquamarine grows in Be-rich pegmatite environments with fewer inclusions. Heat treatment to remove greenish tint is standard and universally accepted in the trade."

cultural_and_historical:
  birthstone_status:
    - "March birthstone (modern)"
    - "19th wedding anniversary"
  zodiac_associations:
    - "Pisces (March)"
    - "Scorpio (some traditions)"
    - "Aries"
  historical_uses:
    - "Sailor's talisman for protection at sea — Roman and Greek traditions"
    - "Glasses / magnifying lenses (beryl lenses used in medieval Europe)"
    - "Jewelry since antiquity"
    - "Carving and decorative arts (large crystals)"
  cultural_associations:
    - "Sailor's gemstone — believed to calm seas and protect against drowning"
    - "Mermaid's treasure in folklore"
    - "Roman belief: aquamarine from the sea-god's treasury"
    - "German word for spectacles ('Brille') possibly derived from 'Beryll'"
    - "Victorian revival as a fashion gem"
  symbolism:
    - the sea
    - safe voyages
    - clarity and calm
    - communication and truth
    - March and early spring
  folklore_notes: "Ancient mariners believed aquamarine was the sacred gemstone of mermaids, cast up from the sea floor. Carrying aquamarine on a sea voyage was thought to bring calm seas, prevent seasickness, and protect against drowning. In Roman tradition it was sacred to Neptune. The association with water, clarity, and truth persists in contemporary use. The 'Dom Pedro Aquamarine' (Smithsonian's National Gem Collection) — a 10,363 ct carved obelisk — is the largest faceted aquamarine in the world."

