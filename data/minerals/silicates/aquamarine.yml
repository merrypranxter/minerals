  vibe_notes: "Aquamarine is the color of shallow tropical sea over white sand — pale to deep blue-green, vitreous clear, the hexagonal form of ocean. The Dom Pedro obelisk in the Smithsonian is an 18-inch tower of the stuff. Sailors carried it for calm and protection. It still has that quality: cool, honest, clarifying."

practical_notes:
  toxicity: "Beryllium-bearing; dust from grinding hazardous. Finished gems safe."
  handling_notes: "Relatively durable and clean — good for jewelry. Less included than emerald. Heat treatment is standard and accepted."
  care_notes: "Clean with warm soapy water. Ultrasonic generally safe (no fractures to fill). Avoid strong acids and physical impact."
  treatments_or_synthetics:
    - "Heat treatment: standard and universally accepted; converts blue-green to pure blue"
    - "Irradiation (maxixe type): unstable; color fades in light — not standard"
    - "Synthetic aquamarine: uncommon commercially; identified by inclusions"
  common_confusions:
    - "Blue topaz (biaxial; different SG and RI; no pleochroism in same way)"
    - "Blue glass (inclusions, bubbles; different properties)"
    - "Sapphire (harder; higher SG; uniaxial)"
    - "Tanzanite (trichroic; much softer; different color profile)"
  market_notes: "Most affordable of the major colored gemstones. Santa Maria deep-blue is most valued but largely depleted at source. Large clean crystals command premium. Treatment (heat) universal and accepted. Wide commercial availability worldwide."

