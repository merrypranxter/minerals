    - "Marambaia and Nova Era, Minas Gerais, Brazil (major production)"
    - "Erongo, Namibia (fine crystals)"
    - "Nagar, Gilgit-Baltistan, Pakistan (excellent crystals)"
    - "Shigar, Gilgit-Baltistan, Pakistan"
