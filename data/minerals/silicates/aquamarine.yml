  other_ids: {}

chemical_profile:
  ideal_formula: "Be3Al2Si6O18 (with Fe2+/Fe3+)"
  simplified_formula: "Be3Al2Si6O18:Fe"
  essential_elements: [Be, Al, Si, O]
  trace_elements_common: [Fe, Na, Cs, Li]
  structural_units:
    - "Si6O18 six-membered cyclosilicate rings"
    - "BeO4 tetrahedra"
    - "AlO6 octahedra"
  atomic_structure_notes: "Cyclosilicate structure identical to all beryl. Fe2+ in channel sites (L sites) primarily responsible for blue color; Fe2+/Fe3+ charge transfer also contributes. Heated stones have Fe3+ reduced to Fe2+, producing cleaner blue."
  chemistry_notes: "Blue color from Fe2+ ions in the structural channel sites. Unheated aquamarine often has a greenish tint from Fe3+ mixing with Fe2+ — heat treatment converts Fe3+ to Fe2+, producing a purer blue. Deep pure-blue specimens (Santa Maria) are most valued. The deepest-blue 'Santa Maria' color (from Santa Maria de Itabira, Brazil) is a benchmark color grade."

crystallography:
  crystal_system: hexagonal
  crystal_system: hexagonal
  crystal_class: "6/mmm (dihexagonal dipyramidal)"
  space_group: "P6/mcc"
  unit_cell_notes: "a ≈ 9.21 Å, c ≈ 9.19 Å"
  twinning: "Rare"
  crystallography_notes: "Well-developed hexagonal prisms, often long, with flat basal terminations. Crystals commonly striated parallel to c-axis. Aquamarine can form spectacular large crystals in pegmatites — gem-quality crystals of many kilograms are known (Dom Pedro, 26 kg, carved obelisk in Smithsonian)."

physical_properties:
  mohs_hardness: "7.5–8"
  specific_gravity: "2.63–2.80"
  luster: [vitreous]
  streak: white
  transparency: [transparent, translucent]
  cleavage:
    - "imperfect basal {0001}"
  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "Good hardness and durability for jewelry use. Typically cleaner (fewer inclusions) than emerald. Large clean crystals are relatively common in pegmatites. Heat treatment (producing or deepening blue from greenish stones) is standard and undisclosed in trade."

appearance:
  baseline_colors:
    - pale-blue
    - blue-green
    - blue
  color_profiles:
    - name: Santa Maria Aquamarine
      colors: [deep-blue, vivid-blue, saturated medium-blue]
      cause: "Higher Fe2+ content; optimum Fe2+/Fe3+ ratio for deepest blue."
      conditions: "Santa Maria de Itabira, Minas Gerais, Brazil — benchmark color grade; also applied to matching stones from other origins."
      variety_name: null
    - name: Classic Aquamarine (Pale Blue)
      colors: [pale-blue, sky-blue, light-blue]
      cause: "Fe2+ at moderate concentration."
      conditions: "Most aquamarine on market; widespread."
      variety_name: null
    - name: Blue-Green Aquamarine
      colors: [blue-green, sea-green-blue, teal-blue]
      cause: "Mixed Fe2+ (blue) and Fe3+ (yellowish) contributions."
      conditions: "Unheated material; common in rough form; converted to pure blue by heat treatment."
      variety_name: null
    - name: Maxixe (Deep Blue — Unstable)
      colors: [deep-blue, intense-blue]
      cause: "Color centers from natural irradiation (not Fe); color fades in light"
      conditions: "Maxixe mine, Minas Gerais; also irradiated-treated material sold as maxixe-type"
      variety_name: maxixe
  habits:
    - prismatic hexagonal
    - tabular
    - massive
  textures:
    - glassy
    - clear to slightly included
    - striated prismatic faces
  macro_patterns:
    - long prismatic form
    - color zoning (rare)
    - clear vitreous interior
  common_forms:
    - long hexagonal prism crystals
    - faceted oval, emerald-cut, cushion gems
    - large carved objects
  visual_notes: "Aquamarine is the sea captured in hexagonal beryl — pale to deep blue with the clarity of tropical water. The Dom Pedro aquamarine (Smithsonian, carved by Bernd Munsteiner) is the largest faceted aquamarine in the world (10,363 ct). Long prismatic crystal form with striated faces is characteristic of large rough specimens."

optical_and_special_effects:
  fluorescence: "None typically"
  phosphorescence: ""
  chatoyancy: "Very rare cat's eye aquamarine"
  asterism: "Extremely rare"
  iridescence: ""
  pleochroism: "Dichroic: pale-blue or near-colorless / blue (moderate); orientation critical for color in faceting"
  optical_notes: "Uniaxial negative. RI approximately 1.567–1.590. Birefringence ~0.005–0.009. Lower RI than most colored gemstones. Characteristically clean — few inclusions compared to emerald."

