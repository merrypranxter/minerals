    - bicolor
    - watermelon
  common_forms:
    - long striated prisms with rounded-triangular cross-sections
    - parallel columnar aggregates
    - acicular radiating sprays
    - polished cabochons and faceted gems
  visual_notes: "The striated prism faces running parallel to the long axis (c-axis) are diagnostic in hand specimens. Cross-sections showing rounded triangular outline are highly characteristic. Watermelon tourmaline slices are immediately recognizable. Schorl is ubiquitous as jet-black prismatic crystals in pegmatites globally."

optical_and_special_effects:
  fluorescence: "Generally inert to weak; some pink/red elbaite may show weak orange or red under LW UV"
  phosphorescence: ""
  chatoyancy: "Cat's-eye tourmaline known; parallel tube inclusions or growth channels along c-axis"
  asterism: "Rare"
  iridescence: ""
  pleochroism: "Strong to very strong in most colored varieties. Dichroic. Indicolite: dark blue vs. pale blue/colorless along c vs. perpendicular. Rubellite: deep red vs. pale pink. Green varieties: dark green vs. yellow-green. Pleochroism is one of the strongest in the gem world for indicolite and rubellite."
  optical_notes: "Uniaxial negative. RI varies by composition: ~1.614–1.666 (range across species). Birefringence ~0.014–0.040. Strong pleochroism means gem cutters orient stones to show best color face-up. Paraíba tourmaline shows intense neon saturation visible even in low light."

