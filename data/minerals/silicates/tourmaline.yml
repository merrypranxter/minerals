  vibe_notes: "Tourmaline is the most compositionally diverse gem mineral group on Earth — it can be literally any color, making it a universal chromatic reference. Watermelon tourmaline cross-sections are one of the most visually iconic mineral forms. Paraíba's neon glow is among the most intense colors in the gem world."

practical_notes:
  toxicity: low
  handling_notes: "Durable; conchoidal fracture means edges chip. Handle faceted stones carefully. Acicular specimens are delicate."
  care_notes: "Safe for ultrasonic in most cases unless heavily included or fracture-filled. Warm soapy water suitable. Avoid prolonged heat (pyroelectric effect, though not damaging at normal temperatures)."
  treatments_or_synthetics:
    - "Heat treatment: used to improve color in some rubellite and brownish elbaite; not always detectable"
    - "Irradiation: used to produce pink from colorless or pale material; may fade"
    - "Synthetic tourmaline: not commercially significant"
    - "Coating: occasionally used on pale stones"
    - "Fracture filling: rare but known"
  common_confusions:
    - "Rubellite vs. ruby, red spinel"
    - "Indicolite vs. sapphire, aquamarine"
    - "Paraíba vs. neon apatite, synthetic spinel"
    - "Green tourmaline vs. emerald, tsavorite garnet"
    - "Schorl vs. black tourmaline vs. hornblende, aegirine"
  market_notes: "Paraíba tourmaline (Cu-bearing) commands extraordinary prices — top specimens far exceed diamond per carat. Rubellite, indicolite, and chrome tourmaline are premium collector gems. Schorl is inexpensive and abundant."

