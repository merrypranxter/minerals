    - "Elba Island, Italy (type elbaite, achroite)"
  occurrence_notes: "Tourmaline's requirement for boron means it is enriched in B-bearing magmatic systems, especially evolved granitic pegmatites. It is one of the last minerals to crystallize in pegmatitic sequences and can tolerate a wide range of hydrothermal temperatures. It is also a robust detrital mineral in sediments due to its hardness."

cultural_and_historical:
  birthstone_status:
    - "October birthstone (modern alternative alongside opal)"
    - "Rubellite and pink tourmaline recognized for October"
  zodiac_associations:
    - "Libra (October)"
    - "Scorpio"
  historical_uses:
    - "Dutch traders in the 18th century imported tourmaline from Ceylon (Sri Lanka) and noted that a charged crystal would attract and then repel ash from a pipe — earning the name 'aschentrekker' (ash drawer), reflecting its pyroelectric property"
    - "Empress Dowager Cixi of China was a major collector of pink tourmaline (rubellite) from California's San Diego County mines in the early 1900s"
    - "Used as a gemstone in India for centuries; pink and blue varieties from Sri Lanka known as 'rubies' and 'sapphires' historically"
  cultural_associations:
    - "Paraíba tourmaline is one of the most coveted gem discoveries of the 20th century, first found in 1989 by Heitor Dimas Barbosa after years of digging"
    - "Rainbow tourmaline slices used in modern mineral art and jewelry for color zoning display"
  symbolism:
    - creativity
    - spectrum
    - transformation
    - electric-energy
  folklore_notes: "Tourmaline was called the 'electric stone' after its pyroelectric properties were described by scientists in the 18th century. It was used to clean tobacco pipes by Dutch sailors because of its ash-attracting properties when heated."

