  locality_scope: widespread
  notable_localities:
    - "Minas Gerais, Brazil (elbaite, rubellite, indicolite, watermelon — world's premier locality)"
    - "Batalha, Paraíba, Brazil (type Paraíba tourmaline)"
    - "Ogun and Ebonyi states, Nigeria (Paraíba-type Cu-bearing tourmaline)"
    - "Mozambique (Paraíba-type, rubellite, indicolite)"
    - "Kabul and Nuristan, Afghanistan (rubellite, watermelon)"
    - "Anjanabonoina, Madagascar (elbaite, liddicoatite)"
