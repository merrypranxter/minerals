chemical_profile:
  ideal_formula: "XY3Z6(Si6O18)(BO3)3V3W"
  simplified_formula: "Complex Na/Ca boron cyclosilicate with variable Y and Z cations"
  essential_elements: [Si, B, O, Al]
  trace_elements_common: [Na, Ca, K, Fe, Mg, Li, Mn, Cr, V, Cu, Ti, F, OH]
  structural_units:
    - "Si6O18 six-membered rings of SiO4 tetrahedra (cyclosilicate)"
    - "BO3 triangular borate groups"
    - "YO6 and ZO6 octahedral chains parallel to c-axis"
  atomic_structure_notes: "Cyclosilicate (ring silicate). Six-membered Si6O18 rings are linked by BO3 triangles and chains of octahedra into a complex, non-centrosymmetric framework. The formula site X accommodates Na, Ca, K, or vacancy; Y accommodates Fe2+, Mg, Li, Al, Mn2+; Z is dominantly Al with minor Fe, Mg, Cr. The W site carries OH, F, or O at the base of the structure."
  chemistry_notes: "Boron is an essential element — tourmaline is one of very few silicates that requires B. The enormous compositional range across X, Y, Z, V, and W sites produces more IMA-approved species than any other mineral group (~40+ species). Cu2+ in the Y-site produces the coveted Paraíba neon-blue color. Mn produces pink (rubellite/elbaite). Fe2+ produces deep blue (indicolite) and Fe-rich schorl black."

crystallography:
  crystal_system: trigonal
  crystal_class: "3m (ditrigonal pyramidal)"
  space_group: "R3m"
  unit_cell_notes: "a ≈ 15.9–16.0 Å, c ≈ 7.1–7.2 Å depending on composition; Z = 3"
  twinning: "Rarely twinned; knee-shaped twins known but uncommon"
  crystallography_notes: "Trigonal symmetry means tourmaline crystals lack a center of symmetry — one end of a c-axis prism is morphologically and structurally different from the other (hemimorphic). This causes piezoelectric and pyroelectric properties. Prism faces are typically striated parallel to the c-axis — a hallmark identification feature. Cross-sections are characteristically rounded-triangular to pseudo-hexagonal."

physical_properties:
  mohs_hardness: "7–7.5"
  specific_gravity: "2.82–3.32"
  luster: [vitreous]
  streak: white
  transparency: [transparent, translucent, opaque]
  cleavage:
    - "very poor/indistinct prismatic"
  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "SG varies considerably with composition: Fe-rich schorl reaches ~3.2–3.3, while Li-Al-rich elbaite is ~3.0–3.1 and Mg-dominant dravite ~3.0. The broad hardness and SG ranges reflect compositional diversity across species. Pyroelectric and piezoelectric due to non-centrosymmetric structure."

appearance:
  baseline_colors: [black, colorless]
  color_profiles:
    - name: schorl
      colors: [black, dark-brown, opaque-black]
      cause: "High Fe2+ and Fe3+ content; Fe2+–Fe3+ intervalence charge transfer."
      conditions: "Most common tourmaline species; Fe-rich pegmatites and granites worldwide."
      variety_name: schorl
    - name: rubellite
      colors: [red, hot-pink, raspberry, crimson]
      cause: "Mn2+ and Mn3+ in the Y-site of elbaite."
      conditions: "Li-rich granitic pegmatites; Brazil (Minas Gerais), Madagascar, Nigeria, Afghanistan."
      variety_name: rubellite
    - name: indicolite
      colors: [blue, teal, blue-green, deep-blue]
      cause: "Fe2+ and Fe3+ in elbaite (Li-Al-rich end member) producing blue hues."
      conditions: "Gem-quality indicolite from Brazil, Nigeria, Mozambique."
      variety_name: indicolite
    - name: verdelite
      colors: [green, leaf-green, olive-green, yellow-green]
      cause: "Fe2+ and mixed Fe2+/Fe3+ in elbaite; Cr3+ in chrome tourmaline (dravite/uvite)."
      conditions: "Widespread in pegmatites; chrome tourmaline from Tanzania and Kenya is vivid Cr-green."
      variety_name: verdelite
    - name: paraiba-tourmaline
      colors: [neon-blue, electric-blue, mint-green, turquoise]
      cause: "Cu2+ (and Mn for violet tones) in the Y-site; extremely rare Cu-bearing elbaite."
      conditions: "Originally from Paraíba, Brazil (Batalha mine discovered 1989); also Nigeria and Mozambique."
      variety_name: paraiba-tourmaline
    - name: watermelon-tourmaline
      colors: [pink-core, green-rim, white-intermediate]
      cause: "Growth zoning: Mn-rich (pink) core crystallized before Fe-richer (green) outer zones."
      conditions: "Li-rich pegmatites; classic from Maine USA, Brazil, Afghanistan."
      variety_name: watermelon-tourmaline
    - name: dravite
      colors: [brown, yellow-brown, golden-brown, dark-brown]
      cause: "Mg-dominant Y-site composition; Fe minor."
      conditions: "Metamorphic rocks, marbles, schists; classic dravite from Dobrova, Slovenia (type locality)."
      variety_name: dravite
    - name: colorless-achroite
      colors: [colorless, pale-white]
      cause: "Very low Fe, Mn, and other chromophores in elbaite."
      conditions: "Rare; gem-quality achroite from Elba, Italy (type locality for elbaite)."
      variety_name: achroite
  habits:
    - prismatic
    - acicular
    - columnar
    - striated-prism
    - massive
    - radial
    - drusy
  textures:
