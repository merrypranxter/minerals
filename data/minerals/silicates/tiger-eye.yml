  locality_scope: localized
  notable_localities:
    - "South Africa (Northern Cape Province — Griquatown area; primary and largest source)"
    - "Western Australia (Hamersley Range area)"
    - "Namibia (pietersite)"
    - "China (pietersite; some tiger's eye)"
    - "India"
    - "United States (Arizona)"
  occurrence_notes: "Tiger's eye forms when crocidolite (blue asbestos) in banded iron formation sequences is replaced by silica-rich fluids. The replacement is pseudomorphic — silica fills the space of the amphibole fibers while iron oxidizes to goethite, preserving the parallel fibrous texture."

