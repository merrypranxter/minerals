practical_notes:
  toxicity: "SAFETY NOTE: Fully pseudomorphed tiger's eye specimens are generally considered safe for handling — the original crocidolite (blue asbestos) fibers are encased in silica. HOWEVER: cutting, grinding, sanding, or polishing dry tiger's eye can release hazardous silica dust and potentially residual fibrous material. Do NOT sand, polish, or cut without proper respiratory protection (P100 minimum). Lapidaries must use wet cutting and proper dust containment. The hazard is from the dust, not from holding polished specimens."
  handling_notes: "Polished finished specimens safe for everyday handling and wearing. Do not cut, sand, or grind without proper wet-cutting equipment and respiratory protection."
  care_notes: "Avoid prolonged water exposure (can affect silky sheen). Avoid harsh chemicals. Clean with soft damp cloth."
  treatments_or_synthetics:
    - "Some tiger's eye dyed red or blue to simulate hawk's eye or ox-eye forms"
    - "Heat treatment can alter color"
    - "Synthetic tiger's eye does not exist commercially at scale"
  common_confusions:
    - hawk-eye (blue variety)
    - pietersite (brecciated form)
    - other chatoyant minerals (chrysoberyl cat's eye is much rarer and more valuable)
    - aventurine feldspar (different mechanism)
  market_notes: "Extremely common in the gem and mineral market. South Africa is the overwhelming dominant source. Most commercial material is inexpensive. High-quality chatoyancy and clean color command modest premiums. Pietersite is more valuable than standard tiger's eye."

