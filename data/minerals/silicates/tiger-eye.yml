chemical_profile:
  ideal_formula: "SiO2 (pseudomorph after crocidolite)"
  simplified_formula: "SiO2"
  essential_elements: [Si, O]
  trace_elements_common: [Fe]
  structural_units:
    - "SiO4 tetrahedra linked into a 3D framework"
    - "parallel fibrous microcrystalline silica replacing amphibole fibers"
    - "residual goethite and iron oxide along fiber axes"
  atomic_structure_notes: "Tiger's eye is a pseudomorph: silica replaced the original crocidolite (riebeckite variety, a blue sodic amphibole) while preserving the fibrous structure. The parallel iron oxide fibers (mainly goethite) provide color and the chatoyant effect."
  chemistry_notes: "Bulk composition is predominantly SiO2. Residual iron as goethite (FeO(OH)) or hematite (Fe2O3) within the silica fiber matrix drives both color and optical effect. In hawk's eye (unoxidized form), original crocidolite iron is less altered."

crystallography:
  crystal_system: trigonal
  crystal_class: "32 trapezohedral (individual microcrystals)"
  space_group: "P3121 / P3221"
  unit_cell_notes: "Microcrystalline; the macroscopic fibrous texture is inherited from the crocidolite precursor, not a crystallographic feature of the quartz itself."
  twinning: ""
  crystallography_notes: "The fibrous appearance is a pseudomorphic replacement texture. Parallel silica fibers occupy the former crocidolite fiber positions, with iron oxide concentrated along fiber boundaries and axes."

physical_properties:
  mohs_hardness: "5.5–6"
  specific_gravity: "2.64–2.71"
  luster: [silky]
  streak: yellowish-brown
  transparency: [opaque]
  cleavage: []
  fracture: [fibrous, splintery]
  tenacity: brittle
  physical_notes: "Silky luster on polished surfaces is characteristic. Lower hardness than typical quartz reflects the fibrous, replacement origin. Fibrous texture gives specimens a directional feel — sheen changes with orientation."

appearance:
  baseline_colors: [golden-brown, amber-brown, yellow-brown]
  color_profiles:
    - name: tiger-eye-classic
      colors: [golden-yellow, amber, rich-brown, dark-brown]
      cause: "Goethite (iron oxyhydroxide) inclusions within parallel silica fibers, replacing oxidized crocidolite."
      conditions: "Oxidized pseudomorph; most common commercially available form."
      variety_name: tiger-eye
    - name: hawk-eye
      colors: [blue-gray, steel-blue, blue-green]
      cause: "Partial or unoxidized crocidolite fibers preserved or less fully replaced; blue color from original riebeckite amphibole."
      conditions: "Less oxidized form where blue crocidolite color partially persists."
      variety_name: hawk-eye
    - name: ox-eye
      colors: [red-brown, dark-red, brick-red]
      cause: "Further oxidation of goethite to hematite shifts color toward red-brown."
      conditions: "More strongly oxidized specimens."
      variety_name: ox-eye
    - name: pietersite
      colors: [swirling blue, gold, red; breccia-like patterns]
      cause: "Brecciated combination of tiger's eye, hawk's eye, and jasper fragments."
      conditions: "Brecciated and recemented material; Namibia and China."
      variety_name: pietersite
