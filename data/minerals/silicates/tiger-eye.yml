  visual_notes: "Chatoyancy (cat's eye effect) is the defining visual feature. The golden-brown silky shimmer moves across the surface as the viewing angle shifts. The parallel fiber orientation is always visible in cross-section."

optical_and_special_effects:
  fluorescence: ""
  phosphorescence: ""
  chatoyancy: "Strong; classic golden-brown cat's eye effect from parallel goethite/iron oxide fibers within the silica matrix. Effect is best in cabochon cut."
  asterism: ""
  iridescence: ""
  pleochroism: ""
  optical_notes: "Chatoyancy in tiger's eye is caused by light reflection from the oriented parallel fibers of silica with included iron oxide. The effect is most pronounced when the c-axis of the fibrous mass is oriented perpendicular to the line of sight. Hawk's eye shows the same chatoyant mechanism with a blue-gray base."

