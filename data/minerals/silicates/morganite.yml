  vibe_notes: "Morganite is the warm, quiet sister of emerald and aquamarine — the peachy pink end of beryl's spectrum. It lacks the drama of other beryls but has a consistent warmth and gentleness. The rose-gold era made it a design archetype."

practical_notes:
  toxicity: "Beryllium-bearing; dust from grinding hazardous. Finished gems safe."
  handling_notes: "Good hardness and durability. Heat treatment (to remove orange-peach cast) standard and undisclosed. Similar jewelry durability to aquamarine."
  care_notes: "Clean with warm soapy water. Ultrasonic generally safe. Avoid strong acids and heavy impacts."
  treatments_or_synthetics:
    - "Heat treatment: standard and accepted; removes orange/peach from irradiated-color centers, giving cleaner pink"
    - "Irradiation: sometimes used to produce or deepen orange-pink (less stable)"
    - "Synthetic morganite: uncommon commercially"
  common_confusions:
    - "Rose quartz (softer; lower RI; massive habit)"
    - "Pink topaz (biaxial; different SG and RI)"
    - "Kunzite (spodumene — biaxial; very strong pleochroism; cleaves perfectly)"
    - "Pink sapphire (much harder; uniaxial; different RI)"
    - "Pink tourmaline (biaxial; higher RI)"
  market_notes: "Increasingly popular. Large clean stones are available and relatively affordable compared to emerald. Madagascar is the primary source of premium material. Rose-gold setting trend drove significant market growth. Heat treatment universal and accepted."

