      variety_name: null
  habits:
    - short prismatic
    - tabular hexagonal
    - massive
  textures:
    - glassy
    - clear with vitreous luster
  macro_patterns:
    - short hexagonal prism form
    - sometimes bicolor (core/rim zones)
    - clear to slightly included
  common_forms:
    - tabular hexagonal crystals
    - faceted oval, cushion, round gems
  visual_notes: "Morganite's soft rose-peach color is inherently gentle and warm — less assertive than ruby, less cold than pink sapphire. Large clean crystals are available. The rose-gold + morganite combination became dominant in contemporary jewelry design in the 2010s."

optical_and_special_effects:
  fluorescence: "Weak to none"
  phosphorescence: ""
  chatoyancy: "Very rare cat's eye morganite"
  asterism: ""
  iridescence: ""
  pleochroism: "Dichroic: pink / pale-pink (weak to moderate)"
  optical_notes: "Uniaxial negative. RI approximately 1.570–1.600. Birefringence ~0.008. Typically clean and well-suited for faceting. Pleochroism mild."

formation_and_occurrence:
  genesis:
    - magmatic (pegmatitic)
    - hydrothermal
  geologic_environments:
    - Li-Cs-rich granitic pegmatites (primary environment)
    - complex pegmatites with lepidolite, tourmaline, spodumene
  host_rocks:
    - complex Li-Cs-rich granitic pegmatite
    - granite
  associated_minerals:
    - lepidolite
    - tourmaline (elbaite)
    - spodumene
    - topaz
    - columbite-tantalite
    - feldspar
    - quartz
    - goshenite
  locality_scope: uncommon
  notable_localities:
    - "Anjanabonoina, Fianarantsoa, Madagascar (world class — finest and largest)"
    - "Pala district (Pala Chief Mine), San Diego County, California, USA"
    - "Urucum and Golconda, Minas Gerais, Brazil"
    - "Pakistan (Gilgit-Baltistan)"
    - "Mozambique"
    - "Afghanistan (Kunar Province)"
    - "Minas Gerais, Brazil (various)"
  occurrence_notes: "Morganite is primarily a product of lithium-cesium-tantalum (LCT) granitic pegmatites. It requires Mn-rich fluids and a relatively evolved (late-stage) pegmatite environment. Madagascar's Anjanabonoina is the premier locality for gem-quality material. Named after financier J.P. Morgan in 1911 by George Frederick Kunz."

cultural_and_historical:
  birthstone_status: []
  zodiac_associations:
    - "Libra (some traditions)"
    - "Pisces"
  historical_uses:
    - "Named in 1911 by George Frederick Kunz (Tiffany & Co. head gemologist) for financier J.P. Morgan"
    - "J.P. Morgan donated major mineral collections to AMNH and Harvard"
    - "Gemstone use since naming; rose-gold combination popularized post-2010"
  cultural_associations:
    - "Named for J.P. Morgan — reflects early 20th-century patronage of mineralogy"
    - "Rose-gold + morganite aesthetic became 2010s jewelry trend"
    - "Often positioned as an alternative/complement to pink diamond and pink sapphire"
  symbolism:
    - love and tenderness
    - feminine warmth
    - compassion
    - rose-gold aesthetic
    - gentle strength
  folklore_notes: "Morganite is a relatively recently named gem variety (1911) compared to emerald and aquamarine. George Frederick Kunz named it for J.P. Morgan, one of the great mineral collectors of the Gilded Age — whose collections are now at the American Museum of Natural History and Harvard's Mineralogical Museum. The 'morganite + rose gold' combination became a defining aesthetic of 2010s jewelry design, particularly in engagement rings."

