chemical_profile:
  ideal_formula: "Be3Al2Si6O18 (with Mn2+/Mn3+)"
  simplified_formula: "Be3Al2Si6O18:Mn"
  essential_elements: [Be, Al, Si, O]
  trace_elements_common: [Mn, Cs, Li, Na, Fe]
  structural_units:
    - "Si6O18 six-membered cyclosilicate rings"
    - "BeO4 tetrahedra"
    - "AlO6 octahedra"
  atomic_structure_notes: "Cyclosilicate structure. Mn2+ and Mn3+ substituting for Al3+ in octahedral sites produce the pink-to-peach color. Cs is often elevated in morganite compared to other beryl varieties (reflecting Cs-rich pegmatite environments). Li may occupy channel sites."
  chemistry_notes: "Manganese is the primary chromophore. Mn2+ gives pink; Mn3+ gives deeper pink to purplish. Cesium-rich Cs-beryl (pezzottaite) is related but is a distinct species (Cs-dominant). Irradiation produces orange tones; heat treatment removes these to give cleaner pink. Fe contamination produces brownish-orange overcast."

crystallography:
  crystal_system: hexagonal
  crystal_class: "6/mmm (dihexagonal dipyramidal)"
  space_group: "P6/mcc"
  unit_cell_notes: "a ≈ 9.21 Å, c ≈ 9.19 Å"
  twinning: "Rare"
  crystallography_notes: "Typically short prismatic to tabular hexagonal crystals, reflecting the Cs-enriched pegmatite environment which produces broader, flatter crystal habits. Prismatic faces often striated. Crystals can be large in Cs-Li pegmatites."

physical_properties:
  mohs_hardness: "7.5–8"
  specific_gravity: "2.71–2.90"
  luster: [vitreous]
  streak: white
  transparency: [transparent, translucent]
  cleavage:
    - "imperfect basal {0001}"
  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "Higher SG than other beryls due to Cs enrichment in crystal structure. Good hardness and durability for jewelry use. Generally cleaner (fewer inclusions) than emerald."

