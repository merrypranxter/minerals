      conditions: "Classic nephrite from New Zealand (pounamu), Siberia, China."
      variety_name: spinach-jade
    - name: mutton-fat-jade
      colors: [creamy-white, waxy-white, off-white]
      cause: "Low Fe content; near-pure tremolite composition; fine texture diffuses light."
      conditions: "Hetian (Hotan) River pebbles, Xinjiang, China — the most prized nephrite in Chinese tradition."
      variety_name: mutton-fat-jade
    - name: celadon-jade
