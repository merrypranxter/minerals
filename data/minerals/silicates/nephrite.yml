chemical_profile:
  ideal_formula: "Ca2(Mg,Fe)5Si8O22(OH)2"
  simplified_formula: "Ca2(Mg,Fe)5Si8O22(OH)2"
  essential_elements: [Ca, Mg, Fe, Si, O, H]
  trace_elements_common: [Al, Mn, Cr, Ti, Na, K, F]
  structural_units:
    - "Si4O11 double chains of SiO4 tetrahedra (inosilicate)"
    - "Mg/Fe in M1, M2, M3 octahedral sites"
    - "Ca in M4 (large, 8-coordinate) site"
    - "OH at the O3 site"
  atomic_structure_notes: "Double-chain inosilicate (amphibole). Two single pyroxene-like chains are cross-linked to form a double chain with composition Si4O11. This broader ribbon accommodates larger cations (Ca) at the M4 site. Nephrite is not a single mineral but a solid solution between tremolite (Mg-dominant: Ca2Mg5Si8O22(OH)2) and actinolite (Fe-dominant: Ca2Fe5Si8O22(OH)2). The felt-like interlocking fibrous texture of nephrite provides its legendary toughness."
  chemistry_notes: "Color and properties vary along the tremolite–actinolite solid solution: pure tremolite is white to colorless; increasing Fe (actinolite component) produces progressively deeper green. The spinach-green of classic nephrite reflects intermediate-to-Fe-rich composition. Minor Cr can produce vivid green. White 'mutton-fat' nephrite is tremolite-dominant and highly prized in Chinese tradition."

crystallography:
  crystal_system: monoclinic
  crystal_class: "2/m (prismatic)"
  space_group: "C2/m"
  unit_cell_notes: "Tremolite: a ≈ 9.84 Å, b ≈ 18.05 Å, c ≈ 5.28 Å, β ≈ 104.7°; varies with Fe content"
  twinning: "Simple twinning on {100} known; rarely visible in massive nephrite"
  crystallography_notes: "As a gem material, nephrite is almost always a fine-grained to fibrous interlocking aggregate — individual crystals are rarely visible to the naked eye. Elongate fibres and blades cross-link in a felt-like microstructure that is directly responsible for nephrite's exceptional toughness, widely considered the toughest natural stone. Bladed and prismatic crystals with two cleavages at ~56° and ~124° (characteristic amphibole angle) are found in coarser metamorphic contexts."

physical_properties:
  mohs_hardness: "6–6.5"
  specific_gravity: "2.90–3.03"
  luster: [waxy, silky, greasy]
  streak: white
  transparency: [translucent, opaque]
  cleavage:
    - "perfect prismatic {110} at ~56° and ~124° (amphibole cleavage, two directions)"
  fracture: [splintery, uneven]
  tenacity: "very tough (exceptional; interlocking fibrous microstructure makes it among the toughest natural stones)"
  physical_notes: "Lower SG than jadeite (~2.90–3.03 vs. 3.24–3.43), useful for distinction. Mohs hardness slightly lower (6–6.5 vs. 6.5–7). The toughness of nephrite is proverbial — the interlocking fibrous texture means it resists fracture far better than most minerals of similar hardness. Polynesian and Native American cultures exploited this toughness for axe heads and tools."

