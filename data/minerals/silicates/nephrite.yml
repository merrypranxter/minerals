  vibe_notes: "Nephrite is the older jade — the stone that launched millennia of Chinese and Pacific jade culture before jadeite arrived. Its mutton-fat white and spinach green are among the most culturally loaded color-material combinations in human history. It is not the most beautiful stone, but it may be the most meaningful."

practical_notes:
  toxicity: low
  handling_notes: "Very tough and durable; suitable for carving, tools, and jewelry. Avoid strong acids that could attack carbonate-bearing matrix. Generally very stable."
  care_notes: "Clean with warm water and mild soap. Polish with soft cloth. Unlike jadeite, nephrite treatment is less common but wax coating is occasionally used on rough surfaces."
  treatments_or_synthetics:
    - "Wax or oil surface treatment to enhance color/luster on carved pieces; generally benign and traditional"
    - "Dye treatment to enhance green color; detectable by magnification (dye concentrations in fractures)"
    - "No polymer impregnation (less common than in jadeite trade)"
    - "Simulants include serpentine ('new jade'), green aventurine, chrysoprase, prehnite"
  common_confusions:
    - "Jadeite (higher SG ~3.3, more vitreous luster, higher RI)"
    - "Serpentine / bowenite ('new jade' — lower hardness, lower SG)"
    - "Aventurine quartz ('Indian jade' — sparkly inclusions)"
    - "Grossular garnet (massive green)"
    - "Prehnite"
    - "Green soapstone / steatite (much softer)"
  market_notes: "Top-quality Hetian white nephrite (mutton-fat jade) commands extraordinary prices in Chinese markets — large unblemished white pieces can exceed jadeite in value to collectors. New Zealand pounamu has protected status and cultural significance. Canadian nephrite is abundant and forms the basis of a large commercial market."

