    - cabochons and beads
    - tumbled pebbles
  visual_notes: "Nephrite's waxy sheen and subtle translucency are distinctive. White mutton-fat jade has a soft luminosity unlike any other stone. The green varieties can look similar to jadeite but typically show a more subdued, less intense green. The fibrous microstructure is visible under magnification as a tangled felt-like mass."

optical_and_special_effects:
  fluorescence: "Generally inert; some material shows very weak cream or green fluorescence under LW UV"
  phosphorescence: ""
  chatoyancy: "Rare; requires aligned fibrous structure"
  asterism: ""
  iridescence: ""
  pleochroism: "Minimal in massive aggregate material; individual crystals dichroic (colorless to pale green)"
  optical_notes: "RI approximately 1.600–1.627 (spot reading ~1.61 on refractometer). Distinguished from jadeite by lower RI and lower SG. The aggregate texture prevents measurement of birefringence in the usual way."

