      conditions: "Various localities including British Columbia, Canada."
      variety_name: null
    - name: black-nephrite
      colors: [black, dark-gray]
      cause: "Very high Fe content and/or carbonaceous inclusions."
      conditions: "Some Canadian and New Zealand material."
      variety_name: null
