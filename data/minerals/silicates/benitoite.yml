practical_notes:
  toxicity: "Non-toxic. No known hazards under normal handling."
  handling_notes: "Fragile faceted gems; do not expose to thermal shock. Matrix specimens: handle carefully; natrolite matrix can be delicate."
  care_notes: "Clean with water and mild soap. Avoid ultrasonic cleaners. Store wrapped, away from harder minerals."
  treatments_or_synthetics:
    - "No synthetic benitoite on the market."
    - "No known treatments for gem benitoite."
  common_confusions:
    - "Blue sapphire (much harder, 9 Mohs, no triangular crystal habit)"
    - "Tanzanite (trichroic, different crystal system, different origin)"
    - "Blue spinel (isometric, no pleochroism)"
  market_notes: "Extremely rare and valuable as a gem species. Fine faceted stones of 1+ ct are exceptional rarities. Matrix specimens from the type locality are highly collectible. The mine has had sporadic operation; availability is limited."

