  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Discovered in 1907 by James Couch, a prospector, in San Benito County, California."
    - "Initially misidentified as sapphire due to vivid blue color."
    - "Formally described as a new mineral species by George D. Louderback, 1907."
    - "California state gemstone since 1985."
    - "Collector gemstone; almost no commercial jewelry production due to extreme rarity."
  cultural_associations:
    - "Symbol of California mineral heritage."
    - "Prized by collectors as one of the rarest gem-quality minerals."
  symbolism:
