chemical_profile:
  ideal_formula: "BaTiSi3O9"
  simplified_formula: "BaTiSi3O9"
  essential_elements: [Ba, Ti, Si, O]
  trace_elements_common: [Fe, Mn, Nb]
  structural_units:
    - "Si3O9 three-membered cyclosilicate rings"
    - "TiO6 octahedra"
    - "BaO12 polyhedra"
  atomic_structure_notes: "Cyclosilicate (ring silicate) with three SiO4 tetrahedra forming isolated Si3O9 rings. TiO6 octahedra link the rings; Ba occupies 12-coordinated sites. The crystal structure belongs to space group P6̄c2."
  chemistry_notes: "Benitoite's composition is unusual — barium and titanium together in a cyclosilicate are rare. The vivid blue color may relate to charge-transfer processes in the Ti-bearing structure, though the exact mechanism is not fully established."

crystallography:
  crystal_system: hexagonal
  crystal_class: "ditrigonal dipyramidal"
  space_group: "P6̄c2"
  unit_cell_notes: "a ≈ 6.642 Å, c ≈ 9.759 Å; Z = 2"
  twinning: "Not commonly reported."
  crystallography_notes: "Forms characteristic triangular dipyramidal crystals — distinctly triangular cross-section with dipyramidal faces. This gives benitoite a uniquely angular, geometric look. Crystals rarely exceed 1–2 cm; most gem-quality stones are under 1 ct."

physical_properties:
  mohs_hardness: "6–6.5"
  specific_gravity: "3.65–3.68"
  luster: [vitreous]
  streak: white
  transparency: [transparent, translucent]
  cleavage:
    - "imperfect/poor {1011}"
  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "High SG for a gemstone silicate. Strong pleochroism (blue to colorless). Strong dispersion — notable fire. Very high refractive index for a gemstone (nω ≈ 1.757, nε ≈ 1.804)."

