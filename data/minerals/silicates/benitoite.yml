  locality_scope: extremely-limited
  notable_localities:
    - "Dallas Gem Mine (Benitoite Gem Mine), San Benito County, California, USA — essentially the only significant gem-quality locality worldwide"
    - "Ohmi, Niigata, Japan (rare)"
    - "Arkansas, USA (rare, colorless)"
    - "Belgium (rare)"
  occurrence_notes: "One of the rarest gemstones on Earth. The San Benito County, California locality is essentially the only source of gem-quality material. The mineral is found in natrolite veins within serpentinite — a highly unusual geological setting. Named for San Benito County. California's state gemstone since 1985."

