  visual_notes: "Benitoite has one of the most electrically vivid blues in the mineral kingdom — comparable in saturation to fine sapphire or tanzanite but with a distinctive geometric triangular crystal habit. Faceted stones exhibit exceptional fire (dispersion). Almost invariably found on white natrolite matrix, creating a dramatic blue-on-white contrast."

optical_and_special_effects:
  fluorescence:
    shortwave_uv: "intense blue-white to chalky-blue fluorescence — among the most spectacular SW UV responses of any mineral"
    longwave_uv: "weaker or none"
    fluorescence_color: blue-white
  tenebrescence: false
  phosphorescence: "brief blue-white afterglow possible"
  special_effects:
    - strong-dispersion
    - strong-pleochroism
    - exceptional-SW-UV-fluorescence
  optical_notes: "Strong pleochroism: blue to colorless (uniaxial negative). Strong dispersion (0.046) produces excellent fire in faceted gems — comparable to diamond. The intense chalky-blue SW UV fluorescence is a famous benitoite characteristic and a useful identification test."

formation_and_occurrence:
  genesis:
