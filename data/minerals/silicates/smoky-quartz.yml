chemical_profile:
  ideal_formula: "SiO2 (with Al3+ + radiation-induced hole color centers)"
  simplified_formula: "SiO2:Al (irradiated)"
  essential_elements: [Si, O]
  trace_elements_common: [Al, Fe, Ti, Na, Li, H]
  structural_units:
    - "SiO4 tetrahedra in 3D framework"
  atomic_structure_notes: "Trigonal quartz framework. Color from Al3+ substituting for Si4+ in tetrahedral sites, combined with natural gamma irradiation creating trapped-hole color centers (Al-O-Al or Al-O-Si electron hole centers). The color is stable at low temperatures but anneals (destroys) at ~300°C — used to produce amethyst or pale quartz from smoky by heating."
  chemistry_notes: "Color requires both aluminum impurity (very small amount — ~1 ppm Al) AND natural irradiation (alpha or gamma from radioactive minerals in host rock or from cosmic rays). Smoky quartz from granites and pegmatites near radioactive minerals (monazite, zircon, uraninite) is most common. Irradiation of clear quartz containing Al produces artificial smoky quartz (used in industry). 'Morion' is the very darkest, nearly opaque black variety."

crystallography:
  crystal_system: trigonal
  crystal_class: "32 (trapezohedral)"
  space_group: "P3121 / P3221"
  unit_cell_notes: ""
  twinning: "Brazil and Dauphiné law twinning common"
  crystallography_notes: "Identical prismatic hexagonal form to other quartz varieties. Large clear smoky quartz crystals are common — some of the largest quartz crystals known are smoky (multi-kilogram specimens from Alps, Brazil, Colorado). Terminations often complete and well-formed. Phantoms (growth zones) visible in some specimens."

physical_properties:
  mohs_hardness: 7
  specific_gravity: "2.65"
  luster: [vitreous]
  streak: white
  transparency: [transparent, translucent, opaque]
  cleavage: [none]
  fracture: [conchoidal]
  tenacity: brittle
  physical_notes: "Standard quartz properties. Large transparent crystals common. Color bleaches on heating above ~300°C. Cosmic-ray irradiation can produce smoky color in surface quartz over geologic time — some high-altitude smoky quartz is naturally irradiated by cosmic rays."

