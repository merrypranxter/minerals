  folklore_notes: "Cairngorm quartz from the Cairngorm Mountains of Scotland is an iconic national gemstone tradition — large brown-gray crystals were set in the handles of Highland dirks, kilt pins, and traditional brooches. Victorian mourning jewelry used dark stones including morion (black smoky quartz) alongside jet. In Celtic tradition, smoky quartz was a stone of the gods of the underworld. Chinese Daoist tradition associated smoky quartz with the yin principle."

