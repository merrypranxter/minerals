  occurrence_notes: "Smoky quartz is common worldwide wherever granitic rocks contain trace aluminum (universal) and natural radioactive minerals. Alpine fissure veins in the Swiss and Austrian Alps are famous for large, clear, well-formed smoky crystals deposited by hydrothermal solutions. The Cairngorm Mountains of Scotland historically supplied the Scottish Highland jewelry tradition. Colorado produces spectacular smoky crystals with amazonite feldspar."

