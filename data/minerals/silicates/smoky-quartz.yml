practical_notes:
  toxicity: "Non-toxic. Some radioactive-source material from high-radiation zones may have trace radioactivity but nowhere near hazardous for normal handling."
  handling_notes: "Durable standard quartz. Color stable in normal use. Avoid heating above 300°C (destroys color). Alpine vein crystals sometimes have delicate terminations worth protecting."
  care_notes: "Clean with warm soapy water. Ultrasonic safe. Avoid heat."
  treatments_or_synthetics:
    - "Irradiation: clear quartz artificially irradiated to produce smoky color — common; disclosed in professional settings"
    - "Heating: to remove or modify color (yields pale or colorless quartz)"
    - "Synthetic smoky quartz: produced industrially"
  common_confusions:
    - "Brown topaz (harder; biaxial; different SG)"
    - "Morion vs. black tourmaline (elongated crystals; different habit)"
    - "Brown fluorite (softer; cubic cleavage)"
    - "Obsidian (no crystals; lower hardness; different occurrence)"
  market_notes: "Inexpensive and widely available. Large faceted gems very affordable. Alpine specimens (Swiss, Colorado) command collector premium for quality. Most market material is from Brazil. Dark morion specimens rarer and slightly more prized."

