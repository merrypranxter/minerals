  locality_scope: worldwide
  notable_localities:
    - "Pike's Peak and Lake George, Colorado, USA (large dark smoky crystals with amazonite)"
    - "Swiss Alps (Grimsel, Zermatt — alpine fissure veins)"
    - "Cairngorm Mountains, Scotland (traditional source)"
    - "Minas Gerais, Brazil (large commercial specimens)"
    - "Virgen del Pilar mine, Catamarca, Argentina"
    - "Ural Mountains, Russia"
    - "Namibia"
