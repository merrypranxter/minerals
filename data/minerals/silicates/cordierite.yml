  vibe_notes: "Iolite is the blue that shifts — rotate it and it goes from deep blue to violet to yellow. The Viking compass legend gives it a navigational mystique. It's the gem for people who like their beauty functional and their minerals with a story."

practical_notes:
  toxicity: "Non-toxic."
  handling_notes: "Good hardness; handle normally in jewelry. Avoid hard impacts."
  care_notes: "Standard gem care. Water and mild soap."
  treatments_or_synthetics:
