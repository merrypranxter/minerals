    - garnet
    - quartz
    - spinel
  locality_scope: worldwide
  notable_localities:
    - "Oravi, Finland (iolite gems)"
    - "Lapland, Finland and Norway"
    - "Bodenmais, Bavaria, Germany"
    - "Kiranur, Tamil Nadu, India"
    - "Sri Lanka (alluvial iolite)"
    - "Wyoming, USA"
    - "Madagascar"
    - "Australia"
  occurrence_notes: "Widespread in pelitic metamorphic rocks globally. Gem-quality iolite is found in several localities. Famous as the 'Vikings' compass stone' — though the archaeological evidence for this use is debated."

cultural_and_historical:
  historical_uses:
    - "Named 'iolite' (gem name) from Greek 'ios' (violet) by R.J. Haüy."
    - "Named 'cordierite' after French geologist Pierre-Louis-Antoine Cordier."
    - "Used historically as a gem — 'water sapphire' was an old trade name."
    - "Claimed to be used by Vikings as a navigation aid (sun compass) — debated but intriguing hypothesis."
  cultural_associations:
    - "Viking navigation legend."
    - "'Water sapphire' as historic trade name."
  symbolism:
    - navigation
    - trichroic sight
    - blue-violet depth
    - Nordic mineral
  folklore_notes: "The 'Viking compass' lore makes iolite one of the more romantically interesting gems. The physics are real — iolite is strongly dichroic/trichroic — but whether Vikings actually used it is historically uncertain. It's a good story that scientists haven't fully disproven."

interpretive_vibe:
  mood_keywords:
