      variety_name: iolite
    - name: gray-green-rock
      colors: [gray, greenish-gray, pale-blue]
      cause: "Mixed Fe/Mg, inclusions, alteration."
      conditions: "Rock-forming cordierite in schist/gneiss."
      variety_name: null
  habits:
    - pseudo-hexagonal prisms
    - massive
    - granular
    - rounded grains
  textures:
    - vitreous
    - sometimes pinitized surface
  macro_patterns:
    - blue-violet grains in schist
    - pseudo-hex prisms
  common_forms:
    - faceted iolite gems
    - massive material
    - grains in metamorphic rock
  visual_notes: "Rock cordierite is often not visually impressive — altered, gray, greenish. Gem-quality iolite is a different story: a deep violet-blue mineral with strong trichroism showing blue, violet, and pale yellow. The trichroism is easily observable with a naked eye by rotating the stone — Vikings are said to have used iolite as a navigation tool due to this property."

optical_and_special_effects:
  fluorescence:
    shortwave_uv: "none"
    longwave_uv: "none"
    fluorescence_color: none
  tenebrescence: false
  phosphorescence: "none"
  special_effects:
    - strong-trichroism-iolite
  optical_notes: "Strong trichroism: blue-violet / pale-blue / pale-yellow (or colorless). Used historically as a 'sunstone' or 'Viking compass' — the trichroism of iolite allows determination of sun position in overcast skies by polarization. Biaxial."

formation_and_occurrence:
  genesis:
