    - "Blue sapphire (no trichroism, much harder, different SG)"
    - "Amethyst (no trichroism, very different SG and hardness)"
  market_notes: "Available and affordable. Not as heavily promoted as tanzanite or sapphire. Fine iolite is genuinely attractive."

