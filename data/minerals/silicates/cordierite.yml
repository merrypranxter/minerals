chemical_profile:
  ideal_formula: "Mg2Al4Si5O18"
  simplified_formula: "Mg2Al4Si5O18"
  essential_elements: [Mg, Al, Si, O]
  trace_elements_common: [Fe, Na, K, H2O, Li]
  structural_units:
    - "Si/Al framework with (Mg,Fe) in octahedral sites"
    - "channels along c-axis accommodating H₂O, CO₂, or other species"
  atomic_structure_notes: "Cyclosilicate (ring silicate) — actually a modified beryl-type structure with (Al,Si)₆O₁₈ six-membered rings but with additional Al linking. Structural channels parallel to c-axis accommodate H₂O and CO₂. This is why cordierite/iolite shows strong absorption features related to channel contents."
  chemistry_notes: "Cordierite-indialite is the series; cordierite is the low-T orthorhombic polymorph, indialite is the high-T hexagonal polymorph. Fe substitutes for Mg continuously; Fe-rich cordierite is darker blue. The blue-violet 'iolite' gem variety owes its color to Fe²⁺."

crystallography:
  crystal_system: orthorhombic
  crystal_class: "dipyramidal"
  space_group: "Cccm"
  unit_cell_notes: "a ≈ 17.07 Å, b ≈ 9.72 Å, c ≈ 9.35 Å"
  twinning: "Cyclic (pseudohexagonal) twins on {110} — creates pseudo-hexagonal sixling twins."
  crystallography_notes: "Forms prismatic to pseudo-hexagonal crystals from cyclic twinning. More commonly massive, granular. Gem iolite is usually massive or coarse granular."

physical_properties:
  mohs_hardness: "7–7.5"
  specific_gravity: "2.53–2.78"
  luster: [vitreous]
  streak: white
  transparency: [transparent, translucent, opaque]
  cleavage:
    - "poor {010}"
    - "poor {001}"
  fracture: [conchoidal, subconchoidal]
  tenacity: brittle
  physical_notes: "Good hardness for jewelry use. Strong trichroism (iolite) is the key optical feature. Lower SG than tanzanite (useful distinction). Dichroscope shows three distinct colors along three axes."

appearance:
  baseline_colors:
    - blue-violet
    - gray
    - greenish-gray
    - yellowish
    - colorless
  color_profiles:
    - name: iolite-blue-violet
      colors: [blue-violet, deep-blue, violet, purple-blue]
      cause: "Fe²⁺ in Mg octahedral site; d-d absorption producing blue-violet."
