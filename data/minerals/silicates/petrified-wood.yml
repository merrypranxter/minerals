  other_ids:
    note: "Not a mineral species; no Mindat mineral ID assigned"

chemical_profile:
  ideal_formula: "SiO2 (replacing original wood cellulose and lignin)"
  simplified_formula: "SiO2"
  essential_elements: [Si, O]
  trace_elements_common: [Fe, Mn, Cu, Cr, C, Al, Ca, Mg]
  structural_units:
    - "SiO4 tetrahedra in chalcedony (cryptocrystalline quartz) or macrocrystalline quartz framework"
    - "Original wood cell walls replaced molecule by molecule"
  atomic_structure_notes: "Not a mineral; a biogenic silicified fossil. The replacing silica is typically chalcedony (cryptocrystalline quartz), opal-CT, or macrocrystalline quartz. Silicification occurs when silica-rich groundwater percolates through buried wood, precipitating SiO2 while the organic material dissolves — permineralization preserves the macroscopic cell structure (rings, vessels, rays) in exquisite detail."
  chemistry_notes: "Color is entirely controlled by trace element impurities in the replacing silica: Fe2O3 (hematite) gives red/orange/brown; Fe(OH)3 (limonite/goethite) gives yellow; MnO2 gives black; chromium gives green; copper gives blue-green. The original wood provides no surviving chemical signal — only its structural ghost remains."

crystallography:
  crystal_system: trigonal
  crystal_class: "cryptocrystalline to macrocrystalline — not applicable at macro scale"
  space_group: ""
  unit_cell_notes: "Same as chalcedony/quartz at microscale"
  twinning: ""
  crystallography_notes: "At the microscopic scale, petrified wood consists of chalcedony (fibrous or granular microcrystalline quartz), sometimes with drusy macrocrystalline quartz in voids. At the macro scale, the wood grain, annual rings, bark texture, and cellular anatomy are often perfectly preserved. This structural duality — crystalline mineral at the micro scale, biological form at the macro scale — is its defining character."

physical_properties:
  mohs_hardness: "5.5–7 (varies with silicification completeness; chalcedony-replaced ≈ 6.5–7)"
  specific_gravity: "2.58–2.65 (chalcedony) to lower if incompletely silicified"
  luster: [waxy, vitreous, earthy]
  streak: white
  transparency: [opaque, translucent]
  cleavage: []
  fracture: [conchoidal, uneven, splintery]
  tenacity: brittle
  physical_notes: "Fully silicified specimens approach the hardness of chalcedony (~6.5–7) and are very durable. Partially replaced specimens may be softer and more porous. The preservation of wood structure sometimes creates planes of weakness along grain boundaries."

appearance:
  baseline_colors: [brown, tan, gray]
  color_profiles:
    - name: red-orange-petrified-wood
      colors: [red, orange, rust, brick-red]
      cause: "Fe2O3 (hematite) in the replacing chalcedony; oxidizing conditions during silicification."
      conditions: "Common in Triassic-age material (e.g., Arizona); oxidizing burial environments."
      variety_name: null
    - name: yellow-brown-petrified-wood
      colors: [yellow, brown, tan, caramel, honey]
      cause: "FeO(OH) goethite/limonite; partially hydrated iron oxides."
      conditions: "Widespread; most common color range."
      variety_name: null
    - name: black-petrified-wood
      colors: [black, dark-gray, charcoal]
      cause: "MnO2 (pyrolusite) or carbonaceous material preserved in low-oxygen conditions."
      conditions: "Anaerobic burial environments; some Eocene and Cretaceous localities."
      variety_name: null
    - name: gray-petrified-wood
      colors: [gray, silver-gray, ash]
      cause: "Low trace element content in pure silica replacement; minimal chromophores."
      conditions: "Clean silica-rich groundwaters; some Pacific Northwest material."
      variety_name: null
    - name: blue-green-petrified-wood
      colors: [blue-green, teal, pale-green]
      cause: "Cu or Cr in the replacing silica."
      conditions: "Rare; specific localities with Cu-mineralized groundwaters."
      variety_name: null
    - name: agatized-wood
      colors: [banded multicolor — red, white, brown, gray]
      cause: "Multiple silica precipitation events with varying trace element concentrations, producing banding analogous to agate."
      conditions: "Slow, multi-episode silicification in a fluctuating geochemical environment."
      variety_name: agatized-wood
  habits:
    - wood-log-form
    - cross-section-disc
    - branch-fragment
    - root-mass
    - bark-surface
  textures:
    - wood-grain
