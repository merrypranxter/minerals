    - banded-agate
    - color-zones-by-trace-elements
  common_forms:
    - complete or partial logs
    - sawn and polished cross-sections (showing rings)
    - tumbled pieces
    - polished slabs and bookends
    - erosion-exposed in desert pavements
  visual_notes: "The preserved wood grain and annual rings are the defining visual feature — the stone tells a biological story. Cross-sections are among the most visually striking mineral-art objects, showing perfect tree anatomy in glowing chalcedony. Color zonation often follows the original wood structure."

optical_and_special_effects:
  fluorescence: "Variable; some material fluoresces green or yellow under UV (chalcedony component)"
  phosphorescence: ""
  chatoyancy: "Rare; some fibrous chalcedony replacements show weak chatoyancy"
  asterism: ""
  iridescence: ""
  pleochroism: ""
  optical_notes: "Optically equivalent to chalcedony: RI ~1.53–1.54, uniaxial positive (fibrous chalcedony), birefringence low. The biological macro-structure is not an optical effect but a structural one."

formation_and_occurrence:
  genesis:
    - sedimentary
    - diagenetic
  geologic_environments:
    - silica-rich sedimentary basins
    - volcanic ash-rich fluvial and lacustrine deposits
    - floodplain and swamp deposits buried under ash falls
  host_rocks:
    - volcanic tuff
    - sandstone
    - mudstone
    - lacustrine sediment
  associated_minerals:
    - chalcedony
    - quartz
    - opal
    - jasper
    - calcite
    - barite
    - manganese-oxides
  locality_scope: widespread
  notable_localities:
    - "Petrified Forest National Park, Arizona, USA (Triassic Chinle Formation; Araucarioxylon arizonicum)"
    - "Blue Forest, Eden Valley, Wyoming, USA (Eocene; standing fossil stumps)"
    - "Ginkgo Petrified Forest, Washington State, USA (Miocene; Ginkgo and many species)"
    - "Escalante Petrified Forest, Utah, USA"
    - "Lesvos Petrified Forest, Greece (Miocene; UNESCO GeoPark)"
    - "Florissant Fossil Beds, Colorado, USA (Eocene stumps)"
    - "Naukluft, Namibia"
    - "Eastern Cape, South Africa (Glossopteris-era Permian logs)"
    - "Patagonia, Argentina (large logs)"
    - "Egypt (Petrified Forest near Cairo; 35-million-year-old logs)"
    - "Yellowstone National Park, Wyoming, USA (standing petrified forests on Specimen Ridge)"
  occurrence_notes: "Petrified wood forms best when wood is rapidly buried (reducing microbial decay) in silica-rich environments, particularly where volcanic ash is dissolving in groundwater or where hydrothermal silica is present. Silicification can occur over thousands to millions of years. Permineralization preserves cell walls while silica fills cell lumens; in complete replacement, all organic material is gone."

cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Indigenous peoples of the American Southwest used petrified wood for tools (scrapers, projectile points) due to its hardness and conchoidal fracture — treated identically to chert"
    - "Navajo, Hopi, and other Southwestern nations incorporated petrified wood into cultural practices; the Petrified Forest area was known and visited for thousands of years before European contact"
    - "Petrified Forest National Park (established 1906) was one of the first US federal land protections specifically for paleontological/geological resources, partly because collectors were removing massive quantities of material"
    - "Egyptian petrified forest near Cairo (Oligocene age) was known to ancient Egyptians"
    - "Lesvos, Greece: the petrified forest has been known since antiquity; Theophrastus may have referenced it"
  cultural_associations:
    - "Popular in mid-20th century American Southwest tourism and 'roadside geology' culture — petrified wood bookends, clocks, and tabletops"
    - "Symbol of geological deep time and the connection between biology and mineralogy"
  symbolism:
    - deep-time
    - transformation
    - patience
    - permanence
    - life-become-stone
  folklore_notes: "Many Indigenous traditions of the American Southwest regard petrified wood as sacred — the bones of ancient beings or the material remains of primordial forests. The Navajo creation narrative describes a primordial world with vast forests; the scattered logs of the Petrified Forest are explained in some accounts as the remains of a giant's arrow shafts."

