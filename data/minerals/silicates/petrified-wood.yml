  vibe_notes: "Petrified wood is the most legible deep-time object — a tree that became a stone, grain by grain, over millions of years, while preserving every ring and vessel. It is the bridge between biology and mineralogy, and one of the most emotionally resonant materials in the natural world."

practical_notes:
  toxicity: low
  handling_notes: "Durable once fully silicified; treat like chalcedony. Partially replaced specimens may be fragile along original grain planes."
  care_notes: "Clean with warm water and mild soap. Polished slabs are very stable. Avoid acids on calcite-containing matrix. Do not collect from protected sites (Petrified Forest NP — removal is illegal)."
  treatments_or_synthetics:
    - "Wax or resin impregnation of porous incompletely silicified material"
    - "Surface dyeing to enhance color (uncommon but known)"
    - "Reconstructed or artificial 'petrified wood' does not exist commercially at scale"
  common_confusions:
    - "Agate (lacks wood structure)"
    - "Jasper (lacks wood structure)"
    - "Carved wood-grain stone (will not show actual cell anatomy under magnification)"
    - "Opalized wood (opal replacement rather than chalcedony)"
  market_notes: "Common material; affordable in most forms. Exceptional specimens with vivid color, complete logs, or rare species preservation command premium prices. Sawn and polished cross-sections are widely sold as decorative items."

