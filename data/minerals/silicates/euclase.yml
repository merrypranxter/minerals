chemical_profile:
  ideal_formula: "BeAlSiO4(OH)"
  simplified_formula: "BeAlSiO4(OH)"
  essential_elements: [Be, Al, Si, O, H]
  trace_elements_common: [Fe, Cr]
  structural_units:
    - "isolated SiO4 tetrahedra (nesosilicate)"
    - "AlO4(OH) groups"
    - "BeO4 tetrahedra"
  atomic_structure_notes: "Monoclinic structure. Contains both beryllium and aluminum. The perfect cleavage (which gives the mineral its name) runs parallel to the b-axis. Similar to beryl in containing Be, but with OH and different structure."
  chemistry_notes: "One of the beryllium-bearing silicates. The name 'euclase' comes from Greek 'eu' (good, easy) + 'klasis' (fracture/cleavage) — for its perfect cleavage. Contains hydroxyl. Found in pegmatites and placer gravels. Fe-bearing varieties can be intensely blue-green."

crystallography:
  crystal_system: monoclinic
  crystal_class: "prismatic"
  space_group: "P21/a"
  unit_cell_notes: "a ≈ 4.762 Å, b ≈ 14.290 Å, c ≈ 4.618 Å, β ≈ 100.2°"
  twinning: "Rare."
  crystallography_notes: "Forms prismatic to tabular crystals with a characteristically modified termination. Often elongated along b-axis. The perfect cleavage {010} makes large cut gems rare."

physical_properties:
  mohs_hardness: "7.5"
  specific_gravity: "3.05–3.10"
  luster: [vitreous]
  streak: white
  transparency: [transparent]
  cleavage:
    - "perfect {010}"
  fracture: [conchoidal]
  tenacity: brittle
  physical_notes: "Good gem hardness but perfect cleavage limits practical use in jewelry (difficult to facet safely). Transparent crystals with vivid blue color are among the rarest of gemstones."

