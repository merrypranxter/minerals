  visual_notes: "Vivid blue euclase crystals from Zimbabwe, Brazil, or Austria are among the most beautiful of the rare gem minerals — a clear, vivid sky-blue with exceptional brilliance. The perfect cleavage makes faceted gems extraordinarily rare and valuable."

