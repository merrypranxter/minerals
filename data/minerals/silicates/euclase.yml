  vibe_notes: "Euclase is the gemologist's hidden treasure — vivid blue, high hardness, perfect cleavage that makes it nearly impossible to cut. For collectors it's a holy grail."

practical_notes:
  toxicity: "Beryllium-bearing mineral. Beryllium dust is highly toxic (causes chronic beryllium disease). Do NOT grind or cut without specialist facilities. As display specimens, risk is minimal."
  handling_notes: "Handle as display specimen normally. DO NOT grind or polish without understanding Be hazards."
  care_notes: "Standard display care. Perfect cleavage — do not impact."
  common_confusions:
    - "Aquamarine beryl (different crystal habit; no perfect cleavage)"
    - "Blue topaz (different crystal habit; harder)"
  market_notes: "Rare collector mineral. Fine vivid-blue faceted gems are extremely valuable and rare."

