chemical_profile:
  ideal_formula: "Ca(VO)(Si4O10)·4H2O"
  simplified_formula: "CaVO Si4O10 · 4H2O"
  essential_elements: [Ca, V, Si, O, H]
  trace_elements_common: []
  structural_units:
    - "Si4O10 phyllosilicate (sheet) units"
    - "VO5 square pyramidal vanadium group"
    - "water molecules in structure"
  atomic_structure_notes: "Phyllosilicate (sheet silicate). The VO group (vanadyl) connects the Si4O10 sheets. Vanadium is in the +4 oxidation state (V⁴⁺) as the vanadyl ion (VO²⁺). The crystal structure is orthorhombic with water molecules hydrogen-bonded in channels."
  chemistry_notes: "Cavansite is polymorphous with pentagonite (same formula, different structure). Both contain the vanadyl (VO²⁺) group, which is the chromophore responsible for the vivid blue color. One of the few vanadium-bearing minerals prized by collectors for aesthetics rather than ore value."

crystallography:
  crystal_system: orthorhombic
  crystal_class: "dipyramidal"
  space_group: "Pcmn"
  unit_cell_notes: "a ≈ 9.792 Å, b ≈ 13.644 Å, c ≈ 9.629 Å"
  twinning: "Not commonly reported."
  crystallography_notes: "Forms rosette-like spheroidal or fan-shaped aggregates of small bladed to acicular crystals. Individual crystals are typically small (<5 mm), prismatic or bladed. The rosette/ball habit clustered on white zeolite matrix is diagnostic."

