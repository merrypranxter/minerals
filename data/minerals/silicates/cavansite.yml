  vibe_notes: "Cavansite is the mineral that looks like it was designed. Electric blue spheres on white matrix — it doesn't look natural, it looks engineered. That's part of its appeal: nature as jewelry design."

practical_notes:
  toxicity: "Vanadium-bearing mineral. Vanadium dust should not be inhaled. Wash hands after handling. Do not generate dust."
  handling_notes: "Fragile rosette aggregates. Handle by the matrix. Do not touch crystal clusters directly. The connection of clusters to matrix can be fragile."
  care_notes: "Keep dry. Do not clean with acid. Light dusting only with soft brush. Store in padded tray."
  treatments_or_synthetics:
    - "No synthetic cavansite known."
    - "Specimens from Wagholi are genuine; confirm locality when purchasing."
  common_confusions:
    - "Chrysocolla (different habit, greener, amorphous)"
    - "Blue azurite (effervesces in acid, different crystal habit)"
    - "Linarite (different crystal habit, different localities)"
    - "Shattuckite (copper mineral, different chemistry)"
  market_notes: "Wagholi specimens widely available. Prices range from modest to significant depending on quality of rosettes and matrix. Pentagonite (polymorph) is much rarer and commands higher prices."

