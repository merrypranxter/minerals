  visual_notes: "Cavansite's signature presentation: bright peacock-blue rosette balls clustered on pale beige or white zeolite (stilbite, heulandite, apophyllite) matrix from the Deccan basalts of India. The color is exceptionally vivid for the crystal size. It looks like a science fiction mineral — electric blue spheres on cream matrix."

