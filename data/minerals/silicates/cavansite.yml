  occurrence_notes: "Essentially a single-locality mineral for collector purposes. The vast majority of cavansite specimens worldwide come from the Wagholi quarry near Pune, India, in the Deccan Traps basalts. First discovered in Oregon in 1967 but the Indian material defines the collector market. Polymorphous with pentagonite."

