  vibe_notes: "Apophyllite is a mineral of quiet elegance. Nothing flashy — just a perfect square glass prism with a silky pearlescent cap. The green variety adds just enough color to make it genuinely beautiful without being ostentatious."

practical_notes:
  toxicity: "Non-toxic. No known hazards."
  handling_notes: "Fragile perfect basal cleavage. Do not drop. Handle by matrix or sides, not by crystal tips."
  care_notes: "Clean with water and mild soap. Avoid acids. Store upright with the pearly cleavage face protected."
  treatments_or_synthetics:
    - "No synthetic apophyllite on collector market."
    - "No common treatments."
  common_confusions:
    - "Wulfenite (tabular yellow, much denser, different luster, brighter color)"
    - "Prehnite (green, different crystal habit, harder)"
    - "Calcite (effervesces in acid; different crystal forms)"
    - "Clear topaz (much harder, different habit)"
  market_notes: "Widely available and affordable. Green crystals on stilbite matrix from Pune are a staple of the mineral market. Pricing scales with crystal size, color intensity, and matrix quality."

