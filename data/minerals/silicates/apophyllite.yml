    - clean energy
    - zeolite serenity
  folklore_notes: "Apophyllite has modest folklore associations. Its appeal is primarily aesthetic and scientific — a mineral of glassy precision and pearly elegance. The green variety from India is among the most popular 'entry-level' collector minerals."

