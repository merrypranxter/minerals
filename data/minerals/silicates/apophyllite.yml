  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Named in 1806 by René Just Haüy from Greek 'apo' (away from) + 'phyllon' (leaf)."
    - "Classic example mineral for pearly luster in mineralogy instruction."
    - "Associated with zeolite mineral collecting; widely available collector mineral."
  cultural_associations:
    - "Associated with clarity and spirituality in crystal healing communities."
    - "Green apophyllite is associated with the heart chakra."
  symbolism:
