cultural_and_historical:
  historical_uses:
    - "Named from Greek 'phenax' (deceiver) — because it resembles quartz but is harder and denser."
    - "Collector gem mineral; no historical mainstream use."
    - "Faceted as a collector gemstone."
  folklore_notes: "The 'deceiver' name is its only cultural touch — phenakite passes for quartz or topaz easily."

