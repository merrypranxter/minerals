chemical_profile:
  ideal_formula: "Be2SiO4"
  simplified_formula: "Be2SiO4"
  essential_elements: [Be, Si, O]
  trace_elements_common: [Fe, Mg, Al]
  structural_units:
    - "isolated SiO4 tetrahedra (nesosilicate)"
    - "BeO4 tetrahedra linking SiO4 units"
  atomic_structure_notes: "Trigonal structure. All cations (Be and Si) are in tetrahedral coordination. The structure is related to willemite (Zn₂SiO₄) with Be substituting for Zn. Completely anhydrous; no water or OH in structure."
  chemistry_notes: "Pure beryllium orthosilicate. Typically colorless; rarely tinted pale yellow, pink, or brown from impurities. One of the hardest silicate minerals (hardness 7.5–8). Valuable gemstone when transparent. The name comes from Greek 'phenax' (deceiver) because it resembles quartz."

crystallography:
  crystal_system: trigonal
  crystal_class: "rhombohedral"
  space_group: "R3̄"
  unit_cell_notes: "a ≈ 12.472 Å, c ≈ 8.252 Å (hex setting)"
  twinning: "Contact and penetration twins on {1120} possible."
  crystallography_notes: "Forms prismatic rhombohedral crystals, often with multiple rhombohedral terminations. Also lenticular (lens-shaped) forms. Crystals can be large (cm-scale in some pegmatites)."

physical_properties:
  mohs_hardness: "7.5–8"
  specific_gravity: "2.96–3.00"
  luster: [vitreous]
  streak: white
  transparency: [transparent]
  cleavage:
