  vibe_notes: "Phenakite is the honest deceiver — nothing remarkable to look at, but harder than quartz, clearer than glass, and geologically significant. A gem for people who love precision over spectacle."

practical_notes:
  toxicity: "Beryllium-bearing mineral. Beryllium dust is toxic. Do NOT grind or cut without specialist facilities. Display specimens are safe to handle."
  handling_notes: "Normal for display. Critical: no grinding/cutting without Be-dust precautions."
  care_notes: "Standard. No special requirements for display."
  common_confusions:
    - "Quartz (lower hardness 7, different SG, no Be)"
    - "Topaz (different crystal system, different cleavage pattern)"
    - "Beryl (hexagonal, different formula)"
  market_notes: "Specialty collector mineral. Faceted gems are rare and prized."

