  vibe_notes: "Chalcedony reads as quiet, cool, and internally lit. The waxy surface has a specific tactile quality — smooth and almost skin-like. The blue form evokes fog, still water, and negative space."

practical_notes:
  toxicity: low
  handling_notes: "Durable and safe for handling. Fine silica dust hazard if grinding or cutting; use respiratory protection."
  care_notes: "Avoid harsh acids or strong alkalies. Porous specimens can absorb chemicals and stains. Ultrasonic cleaning safe for most specimens."
  treatments_or_synthetics:
    - "Dyeing very common in trade (especially black 'onyx', blue chalcedony)"
    - "Heat treatment of carnelian widespread to intensify color"
    - "Synthetic SiO2 materials exist but not common as chalcedony simulants"
  common_confusions:
    - agate (banded chalcedony)
    - opal
    - howlite (when dyed blue)
    - turquoise (blue-dyed chalcedony frequently sold as turquoise)
  market_notes: "Huge and diverse market. Carnelian, chrysoprase, onyx, and bloodstone are major trade categories. Dyed blue 'chalcedony' is pervasive. Some blue chalcedony from Namibia is among the most valuable."

