    - vein fillings
    - geode linings
    - polished cabochons
  visual_notes: "Characteristic waxy luster on polished surfaces. Translucent with a faint glow in thin sections. Smooth, ghost-like quality distinguishes it from coarse quartz."

optical_and_special_effects:
  fluorescence: "Variable; some specimens weakly fluorescent under UV."
  phosphorescence: ""
  chatoyancy: "Weak; fibrous varieties can show faint cat's eye in cabochon cut."
