chemical_profile:
  ideal_formula: "SiO2"
  simplified_formula: "SiO2"
  essential_elements: [Si, O]
  trace_elements_common: [Fe, Ni, Mn, Al, H]
  structural_units:
    - "SiO4 tetrahedra linked into a 3D framework"
    - "microcrystalline fibrous quartz aggregates"
  atomic_structure_notes: "Cryptocrystalline to microcrystalline silica; individual crystal fibers too small to resolve without electron microscopy."
  chemistry_notes: "Essentially pure SiO2 with trace impurities governing color. Composed of intergrown microcrystalline quartz and moganite in variable proportions."

crystallography:
  crystal_system: trigonal
  crystal_class: "32 trapezohedral (individual crystals)"
  space_group: "P3121 / P3221"
  unit_cell_notes: "Microcrystalline; unit cell as quartz but crystals are submicroscopic."
  twinning: ""
  crystallography_notes: "Masses of interlocking microfibers without macroscopic crystal faces. Fibrous chalcedony has fibers oriented perpendicular to growth surfaces."

physical_properties:
  mohs_hardness: "6.5–7"
  specific_gravity: "2.58–2.64"
  luster: [waxy, dull, silky]
  streak: white
  transparency: [translucent, opaque]
  cleavage: []
  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "Lacks distinct cleavage due to microcrystalline structure. Conchoidal fracture typical. More porous than coarse quartz; can absorb water and dyes."

appearance:
  baseline_colors: [white, gray, pale-blue]
  color_profiles:
    - name: chalcedony-blue
      colors: [blue-gray, pale-blue, lavender-gray]
      cause: "Rayleigh scattering of light through the microporous fibrous structure."
      conditions: "Pure or low-impurity chalcedony."
      variety_name: blue-chalcedony
    - name: carnelian
      colors: [orange-red, reddish-brown, amber-orange]
      cause: "Iron oxide (hematite/goethite) inclusions."
      conditions: "Iron-bearing chalcedony; color often heat-enhanced in the trade."
      variety_name: carnelian
    - name: chrysoprase
      colors: [apple-green, emerald-green, minty-green]
      cause: "Nickel (as nickeloan talc or willemseite) imparting green."
      conditions: "Nickel-bearing chalcedony from lateritic weathering zones."
      variety_name: chrysoprase
    - name: onyx
      colors: [black, black-and-white banded]
      cause: "Parallel straight bands; black from carbon or manganese inclusions."
      conditions: "Banded form with straight parallel layers; commonly dyed in trade."
      variety_name: onyx
    - name: bloodstone
      colors: [dark-green with red spots]
      cause: "Green from chlorite inclusions; red spots from iron oxide (hematite/jasper)."
      conditions: "Specific microinclusion pattern."
      variety_name: bloodstone
  habits:
    - massive
