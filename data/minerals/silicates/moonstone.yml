  vibe_notes: "Moonstone has one of the most evocative optical effects in mineralogy — the adularescence gives it a liquid, otherworldly quality as if light is floating just beneath the surface. The blue variety in particular has an electric, cold, lunar quality. It is the mineral most consistently associated with water, night, and the feminine across unconnected cultures."

practical_notes:
  toxicity: low
  handling_notes: "Safe for handling. Two cleavage directions and moderate hardness (6–6.5) mean it can chip or scratch with daily jewelry wear. Avoid knocking against hard surfaces."
  care_notes: "Do not use ultrasonic or steam cleaners (cleavage risk). Clean with damp cloth and mild soap. Remove before physical activity. Store cushioned to prevent scratching."
  treatments_or_synthetics:
    - "Rainbow moonstone (actually labradorite) is widely sold as moonstone — not treated, but taxonomically misleading"
    - "Synthetic orthoclase exists but is not commercially common as moonstone simulant"
    - "Blue color in some material may be surface-enhanced (coatings)"
    - "Glass imitations (opalescent glass) common at low price points"
  common_confusions:
    - rainbow-moonstone (actually labradorite — widespread trade confusion)
    - opal
    - opalite (glass)
    - chalcedony (blue)
    - selenite
  market_notes: "Fine blue moonstone from Sri Lanka has become increasingly rare and commands high prices. Most commercial moonstone is Indian peach/white or 'rainbow moonstone' (labradorite) from India and Madagascar. Trade naming confusion with rainbow moonstone (labradorite) is pervasive and not expected to be resolved commercially."

