  occurrence_notes: "Sri Lankan moonstone deposit supply is declining; finest blue moonstone from Meetiyagoda area has become increasingly scarce. Indian material dominates the commercial market but is often the labradorite 'rainbow moonstone' variety."

cultural_and_historical:
  birthstone_status:
    - "June birthstone (traditional; along with pearl and alexandrite)"
    - "Modern June birthstone (along with pearl and alexandrite)"
  zodiac_associations:
    - Cancer
    - Pisces
  historical_uses:
    - "Used in ancient Roman and Greek jewelry; Romans believed it contained the image of Diana, goddess of the moon"
    - "Revered in Hindu tradition as a sacred stone of the moon god Chandra"
    - "Art Nouveau jewelry movement (1890–1910) featured moonstone prominently — René Lalique designs"
    - "June birthstone designation formalized by the American National Retail Jewelers Association in 1912"
  cultural_associations:
    - "Deeply associated with the moon, lunar cycles, femininity, and water across many cultures"
    - "Roman myth: moonstone formed from solidified moonbeams"
    - "Hindu sacred stone; used in religious jewelry and ritual objects"
    - "Associated with love and fertility in many traditions"
    - "Art Nouveau era symbol of the Romantic and the mysterious"
  symbolism:
    - lunar-energy
    - femininity
    - intuition
    - cycles
    - mystery
    - fertility
  folklore_notes: "Pliny the Elder wrote that moonstone's appearance changed with the phases of the moon. Roman legend held that it was formed from moonlight solidified. In India, moonstone is considered a sacred stone and a dream stone — sleeping with it is said to bring beautiful visions. The Art Nouveau jewelers of the late 19th century elevated moonstone to iconic status in Western fine jewelry."

