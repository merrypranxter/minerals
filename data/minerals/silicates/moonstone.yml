chemical_profile:
  ideal_formula: "KAlSi3O8 (orthoclase) with intergrown NaAlSi3O8 (albite) lamellae"
  simplified_formula: "KAlSi3O8"
  essential_elements: [K, Al, Si, O]
  trace_elements_common: [Na, Fe, Ba, Ca]
  structural_units:
    - "AlSi3O8 framework tetrahedra"
    - "corner-sharing TO4 tetrahedra in a 3D feldspar framework"
    - "alternating orthoclase and albite exsolution lamellae"
  atomic_structure_notes: "Framework silicate (tectosilicate). Moonstone consists of intergrown orthoclase (KAlSi3O8) and albite (NaAlSi3O8) layers produced by exsolution during slow cooling. These alternating nanoscale lamellae (typically 10–300 nm thick) scatter and interfere with light to produce adularescence. Thinner lamellae produce blue adularescence; thicker lamellae produce white or peach glow."
  chemistry_notes: "Parent mineral is orthoclase (monoclinic K-feldspar) or the low-temperature polymorph adularia. Albite lamellae are exsolved from the original homogeneous K-feldspar during slow cooling. The finest Sri Lankan blue moonstone has very thin, evenly spaced lamellae."

crystallography:
  crystal_system: monoclinic
  crystal_class: "2/m prism"
  space_group: "C2/m"
  unit_cell_notes: "a ≈ 8.56 Å, b ≈ 13.00 Å, c ≈ 7.17 Å; β ≈ 116.0° (orthoclase; approximate)"
  twinning: "Carlsbad twinning common; fine-scale albite twinning in adularia."
  crystallography_notes: "Moonstone is cut as cabochon to maximize adularescence; the stone must be oriented with the exsolution lamellae parallel to the base of the cabochon. Incorrect orientation eliminates the adularescent effect entirely."

physical_properties:
  mohs_hardness: "6–6.5"
  specific_gravity: "2.56–2.62"
  luster: [vitreous, pearly]
  streak: white
  transparency: [transparent, translucent]
  cleavage:
    - "perfect {001}"
    - "good {010}"
  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "Two cleavage directions intersecting at near-right-angles, typical of feldspars. Mohs 6–6.5 makes moonstone susceptible to surface scratching with daily use. Transparency varies from near-transparent (finest Sri Lankan) to translucent (most commercial material)."

appearance:
  baseline_colors: [colorless, white, pale-gray]
  color_profiles:
    - name: blue-moonstone
      colors: [colorless to white body; blue floating glow]
      cause: "Thin albite exsolution lamellae (10–100 nm) produce Rayleigh/Tyndall scattering and constructive interference for blue wavelengths."
      conditions: "Finest quality moonstone from Sri Lanka; requires very thin, evenly distributed lamellae. Body must be near-colorless to transparent for the blue to appear."
      variety_name: blue-moonstone
    - name: white-moonstone
      colors: [white body; white to milky-white floating glow]
      cause: "Thicker lamellae scatter all visible wavelengths approximately equally, producing white adularescence."
      conditions: "Most common commercial moonstone; broader range of sources."
      variety_name: null
    - name: peach-moonstone
      colors: [peach, salmon, warm-beige body; peach to white glow]
      cause: "Iron impurities impart warm body color; adularescence still present."
      conditions: "India (Rajasthan) is major source of peach moonstone."
      variety_name: peach-moonstone
    - name: rainbow-moonstone
      colors: [colorless to white body; multicolor iridescence — blue, green, violet]
      cause: "Trade name for colorless to white labradorite showing adularescence-like labradorescence. Not orthoclase moonstone."
      conditions: "This material is actually labradorite (plagioclase feldspar), not orthoclase. The 'rainbow moonstone' trade name is widespread but mineralogically inaccurate."
      variety_name: rainbow-moonstone
    - name: gray-moonstone
      colors: [gray body; blue to white floating glow]
      cause: "Iron or other inclusions giving gray body color; adularescence retained."
      conditions: "India; common commercial material."
      variety_name: null
    - name: cat-eye-moonstone
      colors: [near-colorless to white; chatoyant line]
      cause: "Needle-like inclusions aligned with exsolution lamellae create chatoyancy in addition to adularescence."
      conditions: "Rare; Sri Lanka."
      variety_name: cat-eye-moonstone
  habits:
    - massive
    - prismatic
    - tabular
    - anhedral
  textures:
    - smooth
    - silky-pearly
    - glassy
  macro_patterns:
    - adularescent-glow
    - floating-blue-cloud
  common_forms:
    - polished cabochons
    - faceted gems (rare; mostly transparent material)
    - beads
    - carved cameos
    - tumbled stones
  visual_notes: "Adularescence appears as a floating, glowing light phenomenon that rolls or shifts as the stone is moved — unlike surface iridescence, it appears to emanate from within the stone. The finest blue moonstone from Sri Lanka has an electric, almost liquid blue light that rolls across the interior."

optical_and_special_effects:
  fluorescence: "Weak bluish or yellowish fluorescence in some specimens under longwave UV."
  phosphorescence: ""
  chatoyancy: "Rare; cat's eye moonstone exists with needle inclusions."
  asterism: "Very rare; 4-ray star moonstone reported."
  iridescence: "Adularescence: the defining optical phenomenon. A floating, billowing blue or white light glow from alternating orthoclase/albite exsolution lamellae. Caused by Rayleigh/Tyndall scattering and constructive thin-film interference. Blue adularescence (from thin lamellae) is most prized. Effect is direction-dependent and orientation-critical in cutting."
  pleochroism: ""
  optical_notes: "Adularescence is distinct from labradorescence (tiger-stripe directional flash in labradorite) and from aventurescence (metallic glitter from platelets). Adularescence is a soft, rolling, internal glow — sometimes described as 'billowing light trapped underwater.' The phenomenon was named after adularia, the low-temperature orthoclase polymorph."

