  vibe_notes: "Jadeite carries perhaps the heaviest cultural weight of any mineral on Earth — the civilizational stone of China and Mesoamerica simultaneously, formed in the crushing pressure of subduction zones and revered for millennia. Imperial jade's vivid semi-transparent green is one of the most coveted colors in human history."

practical_notes:
  toxicity: low
  handling_notes: "Tough and durable; safe to handle. Avoid sharp impacts that could chip carved surfaces or thin sections."
  care_notes: "Clean with warm water and mild soap; a soft brush for carvings. Avoid chemicals that could attack surface treatments. Genuine untreated jadeite is stable; B-jade (impregnated) is sensitive to cleaning chemicals."
  treatments_or_synthetics:
    - "A-jade: completely untreated; highest value; authenticated by absence of polymer or bleaching"
    - "B-jade: bleached with acid to remove brown Fe-staining, then impregnated with colorless polymer/wax to improve transparency; unstable over time, may yellow or crack"
    - "C-jade: dye-treated to add or enhance color; dyes may fade"
    - "B+C jade: both impregnated and dyed"
    - "Assembled doublets and triplets: thin jade over dyed cement or glass backing"
    - "FTIR spectroscopy and UV-Vis are standard gemmological detection methods"
  common_confusions:
    - "Nephrite (the other 'jade' — softer SG ~2.95, amphibole rather than pyroxene)"
    - "Serpentine ('new jade', 'Korean jade', 'Bowenite')"
    - "Aventurine quartz ('Indian jade')"
    - "Green quartzite ('Transvaal jade')"
    - "Chrysoprase ('Australian jade')"
    - "Prehnite, grossular garnet ('Tsavorite' when gem-quality)"
    - "Maw-sit-sit (a Cr-jadeite-rich rock, not pure jadeite)"
  market_notes: "Imperial jadeite is among the world's most valuable gem materials — top-quality translucent vivid-green pieces routinely exceed diamond prices per carat at Hong Kong auction. Myanmar controls the vast majority of supply; the trade is politically sensitive. Gemmological certification of treatment status (A/B/C jade) is essential."

