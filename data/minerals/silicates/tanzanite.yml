  vibe_notes: "Tanzanite is a gem of transformation — literally transformed by heat, symbolically transforming a remote Tanzanian hillside into one of the world's most important gem localities. The shifting color in different light is its defining experience: you never see quite the same stone twice."

practical_notes:
  toxicity: "Non-toxic."
  handling_notes: "Avoid thermal shock (steam, ultrasonic). Perfect cleavage means sharp blows can cleave the gem. Protect from hard knocks."
  care_notes: "Clean with warm water and mild soap. No ultrasonic or steam cleaning. Store padded and separate."
  treatments_or_synthetics:
    - "Nearly all commercial tanzanite is heat-treated (standard accepted treatment; must be disclosed)."
    - "No synthetic tanzanite currently in commercial production."
    - "Some simulants exist: blue sapphire, iolite, synthetic forsterite."
  common_confusions:
    - "Blue sapphire (no trichroism, harder, no cleavage issue, different RI)"
    - "Iolite (cordierite — similar trichroism; lower SG, lower RI)"
    - "Amethyst (purple quartz — very different hardness, SG, and trichroism)"
  market_notes: "Major commercial gemstone. Priced by color depth (intensity of blue-violet), clarity, and carat. Fine stones exceed $1,000/ct. Market has grown significantly since 1968."

