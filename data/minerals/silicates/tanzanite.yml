identifiers:
  ima_status: "variety (not separate IMA species; variety of zoisite)"
  mindat_id: 3903
  other_ids:
    trade_name: "tanzanite (coined by Tiffany & Co., 1968)"
    birthstone: "December (AGTA 2002)"

chemical_profile:
  ideal_formula: "Ca2Al3(SiO4)(Si2O7)O(OH)"
  simplified_formula: "Ca2Al3Si3O12(OH)"
  essential_elements: [Ca, Al, Si, O, H, V]
  trace_elements_common: [V, Cr, Fe, Mn]
  structural_units:
    - "sorosilicate framework of zoisite"
    - "V³⁺ in Al octahedral site (M1) — color chromophore"
  atomic_structure_notes: "Same as zoisite. V³⁺ substituting for Al³⁺ in one of the octahedral sites (M1) is the primary chromophore for the blue-violet color. This V³⁺ site also creates the strong trichroism — three different colors along three crystal axes."
  chemistry_notes: "Tanzanite is vanadium-rich zoisite. As-mined material is often brownish or greenish; heat treatment (400–500°C) converts Fe³⁺ to Fe²⁺ and creates the intense blue-violet by allowing V³⁺ to dominate. The vast majority of commercial tanzanite has been heat-treated."

crystallography:
  crystal_system: orthorhombic
  crystal_class: "dipyramidal"
  space_group: "Pnma"
  unit_cell_notes: "Same as zoisite"
  twinning: "Rare."
  crystallography_notes: "Prismatic crystals with striated prism faces. Trichroism is the defining optical feature: looking through different crystal axes shows three different colors — violet/blue (c-axis), blue (b-axis), burgundy/red-brown (a-axis)."

physical_properties:
  mohs_hardness: "6–7"
  specific_gravity: "3.35"
  luster: [vitreous]
  streak: white
  transparency: [transparent, translucent]
  cleavage:
    - "perfect {010}"
  fracture: [uneven, conchoidal]
  tenacity: brittle
  physical_notes: "Perfect cleavage in one direction makes tanzanite susceptible to breakage from sharp blows or thermal shock. Good gem hardness but not exceptional."

appearance:
  baseline_colors:
    - blue-violet
    - violet
    - purple-blue
    - deep-blue
  color_profiles:
    - name: classic-blue-violet
      colors: [blue-violet, indigo-violet, sapphire-blue, purple-blue]
      cause: "V³⁺ in zoisite octahedral site; heat treatment optimizes ratio."
      conditions: "Heat-treated (nearly all commercial tanzanite)."
      variety_name: null
    - name: natural-brownish-or-greenish
      colors: [brownish, greenish-brown, olive-green]
      cause: "Untreated; Fe³⁺ contribution creates green-brown."
      conditions: "As-mined, before heat treatment."
      variety_name: null
  habits:
    - prismatic crystals (in matrix)
    - faceted gemstones
    - massive
  textures:
    - vitreous transparent
    - trichroic color shift
  macro_patterns:
    - blue-violet prismatic crystals in schist/gneiss matrix
    - in situ Merelani miners' specimens
  common_forms:
    - faceted gemstones (primary market form)
    - matrix crystals (collector)
  visual_notes: "Tanzanite at its best has an otherworldly quality — a blue that shifts toward violet or purple depending on the viewing angle, with a depth that rivals sapphire. The strong trichroism means turning the stone in light reveals blues, violets, and burgundy. No other gem shows quite this combination. The single-locality origin adds rarity and provenance significance."

optical_and_special_effects:
  fluorescence:
    shortwave_uv: "none to weak"
    longwave_uv: "none"
    fluorescence_color: none
  tenebrescence: false
  phosphorescence: "none"
  special_effects:
    - exceptional-trichroism
  optical_notes: "Among the strongest trichroisms of any gemstone: violet/blue (c), blue (b), red-brown (a). Viewed through different axes, the color changes dramatically. Biaxial. RI: nα 1.691–1.700, nβ 1.693–1.702, nγ 1.700–1.706."

formation_and_occurrence:
  genesis:
    - metamorphic (calc-silicate)
    - hydrothermal alteration
  geologic_environments:
    - Merelani Hills metamorphic complex (graphitic gneiss with calc-silicate lenses)
    - contact metamorphic zones
  host_rocks:
    - graphitic gneiss
    - calc-silicate lens
  associated_minerals:
    - graphite
    - diopside
    - calcite
    - hornblende
    - actinolite
    - corundum (nearby in region)
  locality_scope: single
  notable_localities:
    - "Merelani Hills, Arusha Region, Tanzania — the ONLY significant gemstone locality in the world"
  occurrence_notes: "Effectively a single-locality gemstone. The entire commercial tanzanite supply comes from the Merelani Hills of northern Tanzania, near Mount Kilimanjaro. The deposit is finite; production rates and depth present long-term supply concerns."

cultural_and_historical:
  birthstone_status:
    - "December birthstone (added by AGTA in 2002)"
  zodiac_associations: []
  historical_uses:
    - "First described geologically in 1967. Discovered by either a Maasai tribesman or a local taita man (accounts vary)."
    - "Manuel de Souza identified the gem and filed mining claims."
    - "Tiffany & Co. purchased stones and named the variety 'tanzanite' in 1968."
    - "Tiffany launched tanzanite as a luxury gemstone and promoted it heavily."
  cultural_associations:
    - "One of the world's most famous single-locality gemstones."
    - "Strongly associated with Tanzanian identity and pride."
    - "Symbol of rarity and luxury in the post-1970 jewelry market."
    - "Maasai gift: tanzanite is given to mothers of newborn children as a blessing stone."
  symbolism:
    - rarity
    - transformation
    - deep blue
    - Tanzania
    - modern luxury
    - Maasai blessing
  folklore_notes: "Tanzania's most famous mineral export. Tanzanite carries the Maasai tradition of giving it to new mothers — blue stones symbolizing health and life in Maasai culture. Tiffany's marketing turned a local discovery into a global luxury gemstone within one decade."

