  vibe_notes: "Chalcocite is not glamorous. It's the underground engine — the dark gray mass that built the Bronze Age and still drives the copper industry. In aesthetic terms, it's the understated heavy foundation beneath every vivid copper secondary mineral."

practical_notes:
  toxicity: "Copper-bearing sulfide. Avoid generating dust or fumes. Wash hands after handling. Sulfide dust can potentially produce H₂S if exposed to acid."
  handling_notes: "Handle normally as a display specimen. Do not acid-clean sulfide minerals casually."
  care_notes: "Store dry. Avoid prolonged damp storage. Do not acid clean."
  treatments_or_synthetics:
    - "No synthetic chalcocite on the collector market."
    - "May be confused with massive bornite or chalcopyrite in poorly labeled specimens."
  common_confusions:
    - "Bornite (iridescent blue-purple tarnish; different streak)"
    - "Galena (cubic cleavage; lead-gray; heavier)"
    - "Argentite/acanthite (silver content; different localities)"
    - "Covellite (deep indigo blue; different color)"
  market_notes: "Mainly of economic/educational interest. Crystal specimens from historic localities are collected. Massive ore is common and inexpensive."

