  occurrence_notes: "One of the world's most economically important copper minerals. The secondary sulfide enrichment zone ('chalcocite blanket') in porphyry copper deposits is a critical economic target. Many major copper mines worldwide process chalcocite ore."

cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "One of the most important copper ores since ancient times."
    - "Historic name 'copper glance' for the metallic luster."
    - "'Redruthite' for Redruth, Cornwall locality."
    - "Copper smelted from chalcocite was the basis for the Bronze Age alloys."
    - "Named 'chalcocite' from Greek 'chalkos' (copper) by Wilhelm Haidinger, 1845."
  cultural_associations:
    - "The foundation of the copper ore economy — used continuously since ~3000 BCE."
    - "Supergene chalcocite enrichment was critical to the commercial viability of many major copper deposits."
  symbolism:
    - industrial copper
    - economic ore
    - metallic foundation
    - dark wealth
  folklore_notes: "Chalcocite's cultural significance is economic rather than aesthetic. It's the dark, dense foundation beneath the colorful secondary copper mineral world — providing the copper that made the Bronze Age, the Industrial Revolution, and modern electronics possible."

