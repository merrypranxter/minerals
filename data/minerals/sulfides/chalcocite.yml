chemical_profile:
  ideal_formula: "Cu2S"
  simplified_formula: "Cu2S"
  essential_elements: [Cu, S]
  trace_elements_common: [Ag, Fe, Co, Ni]
  structural_units:
    - "Cu₂S monoclinic structure (low-T form)"
    - "CuS₃ triangular coordination groups"
    - "S²⁻ in hexagonal closest packing"
  atomic_structure_notes: "Low-temperature (<103°C) monoclinic polymorph of Cu₂S. Above 103°C converts to high-chalcocite (hexagonal). Both Cu atoms in the monoclinic structure are in distinctly different environments. Rich copper content makes it one of the most important copper ores."
  chemistry_notes: "At 79.8% Cu by weight, chalcocite is the highest-copper-content sulfide mineral and one of the most economically important copper ores. It forms by supergene enrichment (secondary sulfide enrichment) in the zone below the water table in copper deposits — where ascending copper-rich solutions reprecipitate copper at the expense of primary pyrite."

crystallography:
  crystal_system: monoclinic
  crystal_class: "prismatic"
  space_group: "P21/c"
  unit_cell_notes: "a ≈ 15.246 Å, b ≈ 11.884 Å, c ≈ 13.494 Å, β ≈ 116.35°"
  twinning: "Cyclic (pseudohexagonal) sixling twins common — creating pseudo-hexagonal shapes."
  crystallography_notes: "Tabular to prismatic crystals, often with pseudo-hexagonal outline from cyclic twinning. Also massive, granular. Well-formed crystals are less common than massive form. Dark steel-gray to black metallic."

physical_properties:
  mohs_hardness: "2.5–3"
  specific_gravity: "5.5–5.8"
  luster: [metallic]
  streak: "dark gray, nearly black"
  transparency: [opaque]
  cleavage:
    - "poor/imperfect {110}"
  fracture: [conchoidal]
  tenacity: "slightly sectile"
  physical_notes: "Dense for a sulfide. Slightly sectile (can be cut with a knife, like lead minerals). Dark gray-black metallic appearance. Often tarnishes darker on surface."

