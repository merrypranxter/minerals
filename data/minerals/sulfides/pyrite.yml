  occurrence_notes: "Pyrite is the most abundant sulfide mineral — virtually ubiquitous in reducing sedimentary environments, hydrothermal systems, and ore deposits. Of enormous economic importance as an indicator mineral and host for invisible gold (Carlin-type deposits). Navajún, Spain produces some of the most perfect natural cubic crystals of any mineral species — perfect geometric cubes with minimal imperfections."

cultural_and_historical:
  birthstone_status: []
  zodiac_associations:
    - "Leo (some traditions)"
  historical_uses:
    - "Fire-starting (iron pyrite struck against flint)"
    - "Source of sulfur dioxide for wine preservation (ancient)"
    - "Production of sulfuric acid"
    - "Gold ore processing (Carlin-type invisible gold)"
    - "'Fool's gold' — cause of countless mining frauds and prospecting mistakes"
    - "Marcellus Shale energy extraction"
    - "Jewelry and inlay (pre-Columbian Peru, Aztec)"
    - "Victorian 'cut steel' jewelry — pyrite as substitute"
  cultural_associations:
    - "'Fool's gold' — ubiquitous cultural metaphor for deceptive appearance"
    - "Inca and pre-Columbian use of pyrite mirrors for divination (alongside obsidian)"
    - "Named from Greek 'pyr' (fire) — fire-starting use"
    - "Carlin Trend discovery (1965, Nevada) — invisible gold in pyrite revolutionized mining"
    - "Captain Martin Frobisher's 1576 expedition: brought 200 tons of pyrite from Baffin Island mistaken for gold"
  symbolism:
    - deceptive appearances
    - fool's gold / false wealth
    - fire from stone
    - abundance and earth's treasure
    - industrial power
  folklore_notes: "Pyrite has been 'fool's gold' since antiquity — its brass-yellow metallic luster has deceived prospectors, miners, and explorers throughout history. Captain Martin Frobisher returned from his 1576 Arctic expedition with 200 tonnes of 'ore' that turned out to be pyrite — the English Crown had funded the expedition for nothing. Spanish conquistadors in the Americas repeatedly confused pyrite with gold. In pre-Columbian Peru, pyrite was polished into flat circular mirrors for divination, alongside obsidian. The name comes from Greek 'pyr' (fire) because sparks fly when it is struck against iron or flint."

