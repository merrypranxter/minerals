practical_notes:
  toxicity: "Pyrite oxidation in air and moisture produces sulfuric acid ('pyrite disease' or pyrite decay in museum specimens). Arsenal-bearing pyrite can release arsenic. Do not inhale pyrite dust. Handle normally; wash hands after."
  handling_notes: "Some specimens are unstable and decay over time — especially framboidal and fine-grained pyrite in clay/shale matrix. Stable massive and crystalline specimens are fine. 'Pyrite disease' (chemical degradation releasing sulfuric acid) is a museum conservation issue for certain matrix specimens."
  care_notes: "Store in low humidity to slow oxidation. Do not expose to moisture over long periods. Clean with dry cloth. Do not use water on unstable matrix specimens."
  treatments_or_synthetics:
    - "No gem treatments relevant"
    - "Some pyrite specimens coated with lacquer for preservation"
  common_confusions:
    - "Gold (much softer; malleable; golden streak; no striations; different density feel)"
    - "Chalcopyrite (brass-yellow but iridescent; lower hardness; different streak)"
    - "Marcasite (same formula but orthorhombic; different habit and stability)"
    - "Arsenopyrite (similar luster but paler; distinct silver-white tint)"
  market_notes: "Abundant and affordable. Navajún cubic crystals command collector premiums for perfect examples. Iron cross twins are prized specimens. Pyrite suns (Illinois) are popular and moderately priced. Generally inexpensive for common material."

