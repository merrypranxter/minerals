chemical_profile:
  ideal_formula: "FeS2"
  simplified_formula: "FeS2"
  essential_elements: [Fe, S]
  trace_elements_common: [As, Co, Ni, Cu, Au, Sb, Te, Bi, Se]
  structural_units:
    - "Fe coordinated by 6 S atoms"
    - "S2 dumbbell pairs (persulfide S2(2-) units)"
  atomic_structure_notes: "Isometric structure with Fe in octahedral sites and S2 pairs oriented along <111> directions. The S2 dumbbell pairs (not individual S2- ions) are the unique structural feature distinguishing pyrite from marcasite (same composition, different structure). The d-electron band gap in pyrite is responsible for its semiconductor properties."
  chemistry_notes: "Pyrite readily incorporates Au (often in solid solution — 'invisible gold' or submicroscopic inclusions), making it an important ore of gold. As and Co substitution common. Oxidizes readily in moist air (sulfuric acid + iron oxide) — 'acid mine drainage' problem. Famous for 'fool's gold' confusion with native gold."

crystallography:
  crystal_system: isometric
  crystal_class: "2/m 3̄ (diploidal)"
  space_group: "Pa3̄"
  unit_cell_notes: "a ≈ 5.42 Å; Z = 4"
  twinning: "Iron cross twins (two interpenetrating pyritohedra at 90°) — diagnostic and spectacular"
  crystallography_notes: "Classic habit is the cube with striated faces (striations from pyritohedral oscillation). Pyritohedron (12-faced form with pentagonal faces) is distinctive and common. Octahedral and combinational forms also occur. Iron cross twins are among mineralogy's most recognizable specimens. 'Pyrite suns' or 'dollar pyrite' — flat discoidal masses in coal — are a unique habit."

physical_properties:
  mohs_hardness: "6–6.5"
  specific_gravity: "4.90–5.20"
  luster: [metallic, splendent]
  streak: greenish-black
  transparency: [opaque]
  cleavage:
    - "poor cubic {100}"
  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "Harder than gold (Au Mohs 2.5–3) — scratching with fingernail or coin distinguishes pyrite from gold immediately. Greenish-black streak vs. gold's golden streak is definitive. Much harder and more brittle than gold — gold is malleable, pyrite is brittle. High SG. Distinctive brassy-yellow color without the warmth of true gold."

