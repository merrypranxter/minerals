  atomic_structure_notes: "Rhombohedral structure (R3̄m) with layered sheets of Bi atoms. Strongest diamagnetic metal at room temperature."
  chemistry_notes: "Native bismuth is relatively rare in nature; most bismuth is recovered as a byproduct of lead and copper refining. Pure bismuth is a brittle white-gray metal with a distinct pinkish cast."

