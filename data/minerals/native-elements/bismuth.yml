  unit_cell_notes: "a ≈ 4.546 Å, c ≈ 11.862 Å (hex setting); Z = 6"
  twinning: "Polysynthetic twinning on {0112} planes occasionally reported."
  crystallography_notes: "Natural crystals are rare — typically form massive, granular, or reticulated masses. Well-formed stepped/hopper crystals are almost exclusively laboratory-grown. Bismuth has the lowest thermal conductivity of all metals except mercury."

