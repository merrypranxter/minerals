  vibe_notes: "Bismuth occupies a unique aesthetic niche: the lab-grown hopper crystal is probably the most photographed 'mineral' that isn't technically a natural mineral specimen. It represents the intersection of science, craft, and visual spectacle."

practical_notes:
  toxicity: "Bismuth metal is considered relatively non-toxic. Bismuth compounds (bismuth subsalicylate) are used medicinally. Much safer than lead, mercury, or arsenic. Avoid ingestion of any metal dust."
  handling_notes: "Natural specimens are soft and brittle. Lab-grown hopper crystals are fragile. Handle with care. Do not drop."
  care_notes: "Natural specimens: store dry; minimal cleaning needed. Lab-grown hoppers: fragile oxide coating scratches easily; do not clean with abrasives."
  treatments_or_synthetics:
    - "Lab-grown hopper crystals are the dominant market form — manufactured by melting and slow cooling bismuth metal."
    - "These are technically synthetic/man-made materials, not natural mineral specimens."
    - "Natural bismuth specimens are genuine but typically undramatic masses or granular aggregates."
  common_confusions:
    - "Lab hopper crystals vs. natural specimens — most 'bismuth crystals' sold are lab-grown."
    - "Tin or lead (similar metallic appearance on massive natural specimens)."
  market_notes: "Lab-grown iridescent hopper crystals are widely sold in gift shops and online as 'bismuth crystals.' Genuine natural bismuth mineral specimens are available from specialty mineral dealers. Natural specimens are less showy but scientifically authentic."

