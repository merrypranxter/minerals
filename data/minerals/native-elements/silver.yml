  folklore_notes: "Silver has been mined since at least 3000 BCE in Anatolia. The Laurion mines near Athens funded Athenian naval power. Kongsberg, Norway produced extraordinary arborescent silver specimens prized by collectors since the 17th century. In mythology, silver is the metal of the moon — opposite gold's solar nature. Silver bullets are a recurring folkloric remedy against supernatural evil."

