practical_notes:
  toxicity: "metallic silver is non-toxic; silver compounds and soluble salts can be toxic; chronic ingestion of colloidal silver causes argyria (permanent blue-gray skin discoloration)"
  handling_notes: "Handle with clean dry hands or cotton gloves. Tarnishes from skin oils and sulfur compounds. Soft and easily scratched."
  care_notes: "Store in anti-tarnish bags or with silica gel. Clean tarnish with appropriate silver polish or dilute ammonia solution. Avoid rubber contact (accelerates tarnish)."
  treatments_or_synthetics:
    - "rhodium plating to prevent tarnish on jewelry silver"
    - "sterling silver (92.5% Ag) is the most common commercial alloy"
    - "fine silver (99.9% Ag) also common for bullion and some jewelry"
  common_confusions:
    - "arsenic (similar color, rarer native element)"
    - "platinum (heavier, more resistant to tarnish)"
    - "argentite/acanthite (silver sulfide ore — softer, darker)"
    - "white metals (tin, lead) superficially similar when tarnished"
  market_notes: "Globally traded precious metal; spot price lower than gold per troy ounce. Collector specimens from Kongsberg and Cobalt highly valued. Industrial demand in electronics and photography significant."

