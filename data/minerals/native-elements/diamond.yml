    - "cutting and grinding tools (diamond abrasives, saws, drills)"
    - "industrial abrasive (grinding wheels, polishing)"
    - "windows and optics for high-pressure experimental cells"
    - heat spreaders in electronics
    - scalpel blades (medical)
    - diamond anvil cells (high-pressure research)
  cultural_associations:
    - "engagement ring tradition (De Beers 'A Diamond is Forever' campaign, 1947)"
    - "ultimate luxury gemstone globally"
    - "Hope Diamond (Smithsonian Institution)"
    - "Koh-i-Noor (British Crown Jewels — contested provenance)"
    - "Cullinan Diamond fragments in British Crown Jewels"
    - "blood and conflict diamonds (ethical sourcing concerns)"
    - "Golconda diamonds (Indian sultanic tradition)"
  symbolism:
    - eternal love and commitment
    - "invincibility and strength (Sanskrit: vajra)"
    - clarity and truth
    - wealth and status
    - perfection and completeness
    - April's promise
  folklore_notes: "Diamond's name comes from Greek 'adamas' (unconquerable). Ancient Indians recognized diamond's hardness millennia before European contact. Hindu mythology associates vajra (diamond thunderbolt) with Indra's weapon. Medieval Europeans believed diamonds were tears of gods or splinters of stars. The De Beers 'A Diamond is Forever' (1947) is considered the most successful advertising slogan in history — it created the modern engagement ring tradition in Western culture. Lab-grown diamonds (chemically identical to natural) have disrupted the market since the 2010s."

