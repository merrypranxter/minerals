practical_notes:
  toxicity: "non-toxic in mineral and gemstone form; diamond dust (very fine particles) is a serious inhalation hazard; not a concern for handled specimens or jewelry"
  handling_notes: "Extremely hard but brittle — avoid impacts and dropping on hard surfaces (perfect octahedral cleavage can cause chips at girdle of faceted stones). Use padded surfaces for gemological handling."
  care_notes: "Clean jewelry with warm soapy water and soft brush; ultrasonic cleaners generally safe for pure diamonds (avoid if inclusions are present). Store separate from other gemstones — diamond will scratch all other gem materials."
  treatments_or_synthetics:
    - "HPHT color enhancement treatment of natural yellow-brown diamonds to colorless or fancy colors"
    - "laser drilling and fracture filling of natural inclusions"
    - "irradiation and annealing for color enhancement"
    - "CVD (Chemical Vapor Deposition) lab-grown diamond — chemically identical, requires specialized testing to distinguish"
    - "HPHT lab-grown diamond — also chemically identical to natural"
    - "diamond simulants (moissanite, cubic zirconia, white sapphire) are NOT diamond"
  common_confusions:
    - "cubic zirconia (zirconium oxide — softer, heavier, no cleavage)"
    - "moissanite (silicon carbide — double refraction, higher dispersion; now synthetic)"
    - "white topaz (softer, different SG)"
    - "white sapphire (softer, lower dispersion)"
    - "lab-grown diamond (chemically identical — requires spectroscopic testing)"
  market_notes: "Most valuable gemstone market globally. Graded by 4Cs: cut, color, clarity, carat. Colorless D–F / IF–VS1 most prized traditionally. Fancy colored diamonds — especially blue, red, and pink — reach highest per-carat auction prices. Lab-grown diamonds have caused major price disruption in melee and lower-grade natural markets since 2018. Kimberley Process certification addresses conflict diamond concerns."

