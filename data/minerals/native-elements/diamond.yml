chemical_profile:
  ideal_formula: "C"
  simplified_formula: "C"
  essential_elements: [C]
  trace_elements_common: [N, B, H, Si]
  structural_units:
    - "sp3-hybridized carbon in tetrahedral framework — each C bonded to 4 C neighbors"
  atomic_structure_notes: "All carbon atoms tetrahedrally bonded in a rigid 3D covalent network (diamond cubic structure). No delocalized electrons — hence transparency and electrical insulation (contrast with graphite)."
  chemistry_notes: "Nitrogen is most common impurity — creates yellow color (Type Ia/Ib). Boron impurity creates blue color (Type IIb). Type IIa diamonds are near-pure carbon with exceptional transparency. Brown color from plastic deformation and vacancy clusters."

crystallography:
  crystal_system: isometric
  crystal_class: hexoctahedral
  space_group: "Fd3̄m"
  unit_cell_notes: ""
  twinning: "Macles (spinel-law twins producing flat triangular crystals) common in alluvial diamonds."
  crystallography_notes: "Octahedral habit most common. Cubic and dodecahedral forms also occur. Alluvial stones typically rounded and frosted. Trigon etch pits on octahedral faces are diagnostic. Perfect octahedral cleavage in four directions is a critical property despite extreme hardness."

physical_properties:
  mohs_hardness: 10
  specific_gravity: "3.50–3.53"
  luster: [adamantine, greasy]
  streak: "none (too hard to leave a streak)"
  transparency: [transparent, translucent, opaque]
  cleavage: ["perfect octahedral {111} — four directions"]
  fracture: [conchoidal, stepped]
  tenacity: "brittle (despite extreme hardness)"
  physical_notes: "Hardest known natural mineral (Mohs 10). Highest thermal conductivity of any natural material. Despite extreme hardness, has perfect octahedral cleavage — can be cleaved or broken with a single skilled blow. High refractive index and dispersion produce characteristic 'fire' (spectral color flashes)."

appearance:
  baseline_colors:
    - colorless
    - yellow
    - brown
    - gray
    - black (carbonado)
  color_profiles:
    - name: Colorless (D–F on GIA scale)
      colors: [water-clear, icy-white]
      cause: "structural purity; absence of nitrogen and other chromophores"
      conditions: "Type IIa — nitrogen-free or negligible"
      variety_name: null
    - name: Cape Yellow / Fancy Yellow
      colors: [pale-yellow, canary-yellow, deep-yellow]
      cause: "nitrogen impurities substituting for carbon (Type Ia / Type Ib)"
      conditions: "N substitution in crystal lattice; Cape series refers to historical South African yellows"
      variety_name: "Cape (pale); Fancy Yellow (vivid)"
    - name: Brown Diamond
      colors: [champagne, cognac, brown]
      cause: "plastic deformation and vacancy clusters along crystal planes"
      conditions: "most common natural fancy color; now marketed as 'chocolate' or 'cognac'"
      variety_name: "Champagne Diamond, Chocolate Diamond"
    - name: Blue Diamond
      colors: [light-blue, steel-blue, vivid-blue]
      cause: "boron impurities (Type IIb)"
      conditions: "extremely rare; semiconducting electrical behavior"
      variety_name: Fancy Blue Diamond
    - name: Pink / Red Diamond
      colors: [light-pink, rose, deep-pink, red]
      cause: "structural defects / plastic deformation (precise mechanism still debated)"
      conditions: "Argyle Mine, Australia was historically dominant source; now closed"
      variety_name: "Argyle Pink, Fancy Pink, Red Diamond"
    - name: Green Diamond
      colors: [pale-green, vivid-green]
      cause: "natural radiation exposure (alpha particle irradiation of crystal lattice)"
      conditions: "typically affects surface layer only; cutting often removes color"
      variety_name: Fancy Green Diamond
    - name: Black Diamond (Carbonado)
      colors: [black, dark-gray]
      cause: "polycrystalline aggregate with inclusions of graphite, amorphous carbon, and sulfides"
      conditions: "distinct from single-crystal diamond; possibly extraterrestrial origin debated"
      variety_name: Carbonado
  habits:
    - octahedral (most common)
    - cubic
    - dodecahedral
    - macles (twinned flat triangular crystals)
    - rounded and frosted (alluvial)
  textures:
    - smooth adamantine luster on fresh crystal faces
    - frosted or etched on alluvial grains
    - trigon etch pits on octahedral faces
  macro_patterns:
    - octahedral geometry
    - trigon surface etch features
    - macle twinning
  common_forms:
    - octahedral crystals
    - rounded alluvial stones
    - macle twins
    - cubic crystals
  visual_notes: "Unmistakable adamantine luster and exceptional brilliance in cut stones. Rough diamonds often appear greasy or frosted. Dispersion produces fire — flashes of spectral color — unmatched by any other colorless gemstone except moissanite."

optical_and_special_effects:
  fluorescence: "blue fluorescence common (~25–35% of gem diamonds) under shortwave UV; some fluoresce yellow, orange, or green; many inert"
  phosphorescence: "some diamonds phosphoresce after UV exposure"
  chatoyancy: ""
  asterism: ""
  iridescence: ""
  pleochroism: "none (isometric)"
  optical_notes: "Highest refractive index of any colorless natural gemstone (~2.417). Very high dispersion (0.044) produces fire. Totally internally reflective — basis of brilliant cut design. Thermally cold to touch due to extreme thermal conductivity."

formation_and_occurrence:
  genesis:
    - mantle origin (150–200+ km depth, extreme P-T conditions)
    - transported to surface via kimberlite or lamproite pipe eruptions
    - placer (alluvial, coastal, marine secondary)
    - meteoritic impact (rare — associated with lonsdaleite)
    - superdeep (subducted slab origin, >660 km)
  geologic_environments:
    - kimberlite pipes and diatremes
    - lamproite pipes
    - alluvial and eluvial placer deposits
    - marine placer deposits (Namibian coast)
    - impact craters (minor)
  host_rocks:
    - kimberlite (blue ground)
    - lamproite
    - gravel and conglomerate (placer)
    - Precambrian cratons globally
  associated_minerals:
    - olivine
    - pyroxene (diopside, enstatite)
    - pyrope garnet
    - ilmenite
    - chromite
    - magnetite
    - phlogopite
    - calcite
    - gold (in placer)
  locality_scope: worldwide
  notable_localities:
    - "Kimberley, Northern Cape, South Africa (kimberlite type locality)"
    - "Cullinan Mine, South Africa (world's largest gem diamond, 3106 ct)"
    - "Argyle Mine, Western Australia (world's finest pink diamonds — now closed)"
    - "Jwaneng and Orapa, Botswana (highest volume producers)"
    - "Mwadui, Tanzania"
    - "Mirny and Jubilee pipes, Yakutia, Russia"
    - "Golconda, India (historic — source of Hope, Koh-i-Noor, Regent diamonds)"
    - "Mbuji-Mayi, DR Congo (industrial diamonds)"
    - "Marange, Zimbabwe"
    - "Namibian coast (marine alluvial)"
    - "Crater of Diamonds State Park, Arkansas, USA (only public diamond mine)"
  occurrence_notes: "Diamonds form in the mantle at depths >150 km and are transported to the surface in kimberlite and lamproite eruptions. Secondary placer deposits form downcurrent of eroded primary pipes. Superdeep diamonds from >660 km provide unique windows into the deep Earth."

cultural_and_historical:
  birthstone_status:
    - "April birthstone (modern and traditional)"
    - "60th and 75th wedding anniversaries"
  zodiac_associations:
    - "Aries (April)"
    - "Libra (some traditions)"
  historical_uses:
