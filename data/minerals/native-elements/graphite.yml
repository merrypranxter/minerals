  vibe_notes: "Graphite is diamond's humble alter ego — same element, opposite outcome. Where diamond captures and refracts, graphite absorbs and slides. It is carbon in its most pragmatic, terrestrial form."

practical_notes:
  toxicity: "generally non-toxic; inhalation of graphite dust in industrial settings can cause graphitosis (pneumoconiosis); not hazardous as a handled specimen; fine graphite powder is combustible in bulk"
  handling_notes: "Leaves black marks on hands and surfaces easily. Greasy texture is diagnostic. Avoid over-handling crystalline specimens as soft flakes detach readily."
  care_notes: "Store in sealed container to prevent graphite dust transfer and staining. Clean with soft dry brush. Avoid moisture in storage."
  treatments_or_synthetics:
    - "synthetic graphite produced by Acheson process (high-temperature graphitization of petroleum coke)"
    - "graphene (single atomic layer of graphite) is a derived industrial and research material"
    - "artificial graphite electrodes widely used in industry and batteries"
  common_confusions:
    - "molybdenite (similar habit, color, and feel — but heavier SG ~4.7, and greenish streak)"
    - "stibnite (silvery metallic, higher luster, different habit)"
    - "ilmenite (harder, no greasy feel)"
    - "coal (not a mineral species — no crystal structure)"
  market_notes: "Industrial graphite is a significant commodity (battery, steel, lubricant industries). Natural crystalline specimen graphite from Madagascar and Sri Lanka collected by mineral enthusiasts. Prices modest relative to gemstone minerals."

