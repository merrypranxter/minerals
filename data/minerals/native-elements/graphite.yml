  occurrence_notes: "Forms by metamorphic recrystallization of organic carbon in sedimentary protoliths. The Borrowdale deposit was exceptional in producing massive pure graphite directly workable as a writing material — all other significant deposits are disseminated or foliated."

cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "pencils ('lead pencils' — graphite in clay matrix, since 16th century)"
    - "dry lubricant (machinery, locks)"
    - "electrodes in batteries and electrolysis"
    - "crucibles for high-temperature metalwork"
    - "nuclear reactors (neutron moderator)"
    - carbon brushes in electric motors
    - brake linings and clutch pads
    - paint and protective coatings
    - ancestor material for graphene research
  cultural_associations:
    - "Borrowdale discovery (1560s) transformed writing technology"
    - pencil as tool of literacy and art
    - industrial revolution lubricant
    - nuclear age moderator
  symbolism:
    - darkness and hidden form
    - carbon's humble guise
    - the unrecognized twin of diamond
    - utility over glamour
  folklore_notes: "Graphite was initially called 'plumbago' (black lead) when discovered in Borrowdale in the 1560s — mistaken for a form of lead. The Borrowdale deposit was so pure and massive it could be sawn into sticks directly for writing, and so valuable that miners were searched leaving the mines. Graphite and diamond are chemically identical (both pure carbon) but could not be more different in structure, hardness, and appearance."

