chemical_profile:
  ideal_formula: "C"
  simplified_formula: "C"
  essential_elements: [C]
  trace_elements_common: [Fe, Si, Al, Ca, Mg]
  structural_units:
    - "sp2-hybridized carbon sheets (graphene layers) stacked in ABAB sequence"
  atomic_structure_notes: "Layered hexagonal structure with strong covalent bonding within sheets and weak van der Waals forces between sheets. Delocalized pi electrons within layers account for metallic luster and electrical conductivity."
  chemistry_notes: "Carbon polymorph stable at surface conditions. Chemically identical to diamond but structurally completely different. Impurities (Fe, Si, Al) common in natural specimens. Layer structure gives extreme anisotropy in physical properties."

crystallography:
  crystal_system: hexagonal
  crystal_class: "dihexagonal-dipyramidal (6/mmm)"
  space_group: "P63/mmc"
  unit_cell_notes: ""
  twinning: ""
  crystallography_notes: "Typically forms foliated, platy, or scaly aggregates rather than well-terminated crystals. Large hexagonal plates known from Sri Lanka and Madagascar. Perfect basal cleavage is the dominant structural expression."

physical_properties:
  mohs_hardness: "1–2"
  specific_gravity: "2.09–2.23"
  luster: [metallic, earthy]
  streak: "black to dark gray (greasy)"
  transparency: [opaque]
  cleavage: ["perfect basal {0001}"]
  fracture: ["flexible but inelastic flakes"]
  tenacity: "flexible, inelastic; lamellar, sectile"
  physical_notes: "Extremely soft and greasy feel. Perfect basal cleavage produces thin flexible flakes. Conducts electricity due to delocalized electrons in graphene planes. Excellent solid lubricant. Writes on paper — pencil 'lead' is graphite, not lead metal."

