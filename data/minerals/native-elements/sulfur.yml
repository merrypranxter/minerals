  folklore_notes: "Sulfur (brimstone) is one of the oldest known mineral substances — referenced in ancient Vedic texts, Homeric epics, and the Bible. The biblical 'fire and brimstone' likely references volcanic sulfur. Alchemy designated sulfur as one of the three primes representing the soul. Kawah Ijen, Indonesia, continues artisanal sulfur mining under conditions of extraordinary volcanic intensity — miners carry glowing blue-flaming sulfur on their backs through sulfurous fog."

