practical_notes:
  toxicity: "low direct toxicity from mineral contact; sulfur dust is combustible and explosive in air; burning sulfur produces SO2 (severe respiratory irritant and toxic gas); prolonged exposure to SO2/H2S in volcanic environments is dangerous"
  handling_notes: "Do not heat specimens — risk of thermal shock cracking and production of toxic SO2 gas. Handle brittle crystals carefully. Avoid creating dust. Store away from heat sources."
  care_notes: "Store away from heat and direct sunlight (above 96°C alters crystal structure to monoclinic). Clean with soft dry brush only — avoid water and acids. Do not steam clean."
  treatments_or_synthetics:
    - "industrial sulfur produced by Frasch process (hot water injection into underground deposits)"
    - "by-product sulfur recovered from petroleum refining (Claus process)"
  common_confusions:
    - "orpiment (arsenic trisulfide — similar yellow, but higher luster, different streak)"
    - "wulfenite (tabular, orange-yellow, but denser and different crystal habits)"
    - "yellow fluorite (harder, cubic, different crystal habit)"
    - "yellow calcite (effervesces in HCl, different crystal habits)"
  market_notes: "Fine crystallized specimens from Sicily (Agrigento/Caltanissetta) highly prized by collectors. Volcanic specimens from Ijen and Vulcano also collected. Industrial sulfur is a major commodity chemical."

