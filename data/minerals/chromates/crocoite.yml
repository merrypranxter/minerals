  visual_notes: "Crocoite is an orange-red so intense it looks artificial. The elongated, often hollow prismatic crystals seem to glow from within. Against white matrix they look like flame-colored daggers. Dundas, Tasmania has produced some of the most celebrated mineral specimens in the entire world — multi-centimeter crystals in glowing orange-red."

