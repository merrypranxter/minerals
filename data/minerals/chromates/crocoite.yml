  locality_scope: very-limited
  notable_localities:
    - "Dundas, Zeehan, Tasmania, Australia — finest specimens in the world; world-class locality"
    - "Callenberg, Saxony, Germany (type area — first described material)"
    - "Beresov, Urals, Russia (first major finds; 18th century)"
    - "Goyabeira Mine, Congonhas, Brazil"
    - "Yava, Ural region, Russia"
    - "Imilchil, Morocco (rare)"
  occurrence_notes: "Extremely rare locality-specific mineral. Requires co-occurrence of lead mineralization (galena) and chromium source (typically chromite/serpentinite). The Dundas district of Tasmania is the premier world source — specimens from there are considered among the world's finest mineral specimens overall."

cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Discovered in the Ural Mountains, Russia (Beresov mines) in the early 18th century."
    - "Lead chromate used as a pigment (chrome orange, chrome red) — though this was primarily synthetic PbCrO₄."
    - "Named from Greek 'krokos' (saffron) by Ferdinand Glocker, 1831 — referring to the saffron-orange color."
    - "Louis Nicolas Vauquelin used crocoite ore to discover the element chromium in 1797."
  cultural_associations:
    - "The discovery of the element chromium (1797) is directly linked to crocoite analysis."
    - "Chromium is named after the Greek word for color ('chroma') because of the vivid colors of chromium compounds."
    - "Historical synthetic chrome orange pigment in 19th century painting (though highly toxic)."
  symbolism:
    - flame-orange
    - discovery
    - toxic beauty
    - chromium birth
    - Tasmanian treasure
  folklore_notes: "Crocoite is connected to one of the great moments in chemical history — the discovery of chromium by Vauquelin in 1797 from Russian crocoite samples. The element chromium (and its color 'chroma') owes its name and discovery to this mineral."

