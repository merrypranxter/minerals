chemical_profile:
  ideal_formula: "PbCrO4"
  simplified_formula: "PbCrO4"
  essential_elements: [Pb, Cr, O]
  trace_elements_common: [As, P, V, Mo]
  structural_units:
    - "chromate (CrO4)²⁻ tetrahedra"
    - "Pb²⁺ in 9-coordination"
  atomic_structure_notes: "Monoclinic structure (monazite-type) with Pb²⁺ in 9-coordination and CrO₄²⁻ tetrahedra. The chromate group is the chromophore for the brilliant orange-red color — charge transfer within the CrO₄²⁻ unit absorbs blue-green light, transmitting orange-red."
  chemistry_notes: "Crocoite is a lead chromate — it requires both lead (from galena alteration) and chromate (from chromite or other Cr source in the host rock). This specific geochemical requirement explains its rarity. The brilliant orange-red color from chromate is one of the most vivid in mineralogy."

crystallography:
  crystal_system: monoclinic
  crystal_class: "prismatic"
  space_group: "P21/n"
  unit_cell_notes: "a ≈ 7.110 Å, b ≈ 7.415 Å, c ≈ 6.803 Å, β ≈ 102.5°"
  twinning: "Contact twins on {100}."
  crystallography_notes: "Forms brilliant prismatic crystals, often elongated, with striated prism faces. Crystals can be large (multi-cm at Dundas, Tasmania). Typically hollow or cavernous internally — the crystals often grow as skeletal or hollow prisms."

