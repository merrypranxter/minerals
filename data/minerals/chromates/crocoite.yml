  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "Exceptionally dense for a non-metallic mineral — dense lead content. Soft and fragile. Often hollow or skeletal crystals. Adamantine orange-red luster is unmistakable."

