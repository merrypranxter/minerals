  vibe_notes: "Crocoite is fire in crystal form. The elongated hollow orange prisms look like frozen flames or saffron-dipped glass rods. It is simultaneously one of the most beautiful and most toxic minerals in any collection. A Dundas specimen is one of the art objects of mineralogy."

practical_notes:
  toxicity: "LEAD AND CHROMIUM MINERAL. High hazard. Both Pb and Cr(VI) (chromate) are toxic. Chromate is a known carcinogen. Avoid generating ANY dust. Wash hands immediately after handling. Keep away from children. Do not store near food or beverages. Label clearly."
  handling_notes: "Handle as a display specimen only. Do not break, scratch, or grind. Chromate dust is carcinogenic. Display in enclosed case."
  care_notes: "Do not clean with acid (dissolves). Minimal intervention. Store in labeled sealed container. Consider enclosed display case for fragile crystals."
  treatments_or_synthetics:
    - "No synthetic crocoite on the collector market."
    - "Synthetic lead chromate (chrome orange pigment) is distinct — does not form collector crystals."
  common_confusions:
    - "Wulfenite (orange-yellow tabular crystals; molybdate; different crystal habit)"
    - "Vanadinite (hexagonal; orange-red; different chemistry and crystal habit)"
    - "Realgar (arsenic sulfide; orange-red; different luster, lighter)"
  market_notes: "Highly coveted collector mineral. Dundas material is among the most expensive mineral specimens available per gram. World-class specimens fetch thousands to tens of thousands of dollars. Even modest specimens carry premium."

