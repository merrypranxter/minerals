  other_ids: {}

chemical_profile:
  ideal_formula: "Zn2(AsO4)(OH)"
  simplified_formula: "Zn2AsO4OH"
  essential_elements: [Zn, As, O, H]
  trace_elements_common: [Cu, Co, Mn, Fe]
  structural_units:
    - "arsenate (AsO4)³⁻ tetrahedra"
    - "Zn in octahedral and tetrahedral coordination"
    - "OH groups linking structural units"
  atomic_structure_notes: "Orthorhombic structure isotypic with olivenite. Zn occupies two distinct crystallographic sites. Trace Cu substitution for Zn produces the vivid green cuproadamite variety; Mn substitution produces manganoadamite."
  chemistry_notes: "End-member adamite is colorless to pale yellow (pure Zn), but Cu-bearing cuproadamite is vivid green and Mn-bearing specimens are violet. The color range from Cu substitution is one reason adamite specimens vary dramatically by locality."

crystallography:
  crystal_system: orthorhombic
  crystal_class: "dipyramidal"
  space_group: "Pnnm"
  unit_cell_notes: "a ≈ 8.306 Å, b ≈ 8.524 Å, c ≈ 6.043 Å"
  twinning: "Common twinning on {011}."
  crystallography_notes: "Forms elongated prismatic crystals, often wedge-shaped or chisel-like, and drusy aggregates. Crystals are typically small (mm-scale). Radial or fan-shaped aggregates on matrix are common."

physical_properties:
  mohs_hardness: "3.5"
  specific_gravity: "4.32–4.48"
  luster: [vitreous, adamantine]
  streak: white
  transparency: [transparent, translucent]
  cleavage:
    - "good {101}"
  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "Relatively high SG for an arsenate. Vitreous to adamantine luster. Well-formed crystals can be transparent and gem-like."

appearance:
  baseline_colors:
    - colorless
    - white
    - pale-yellow
    - yellow-green
    - vivid-green
    - violet
  color_profiles:
    - name: pure-adamite-colorless-yellow
      colors: [colorless, pale-yellow, white]
      cause: "No chromophore; pure Zn end-member."
      conditions: "Zn-dominant, Cu-free specimens."
      variety_name: null
    - name: cuproadamite-green
      colors: [vivid-green, yellow-green, apple-green, lime-green]
      cause: "Cu²⁺ substituting for Zn in tetrahedral/octahedral sites."
      conditions: "Cu-bearing specimens; most common aesthetic form."
      variety_name: cuproadamite
    - name: manganoadamite-violet
      colors: [violet, purple, mauve]
      cause: "Mn substituting for Zn."
      conditions: "Mn-rich localities; less common."
      variety_name: manganoadamite
    - name: yellow-fluorescent
      colors: [yellow, pale-yellow, yellow-green]
      cause: "Possible trace impurities; also classic under SW UV."
      conditions: "Some Mapimí specimens are intensely yellow-green fluorescent."
      variety_name: null
  habits:
    - prismatic
    - wedge-shaped
    - drusy aggregates
    - radial fans
    - crusts
  textures:
    - vitreous
    - transparent drusy
    - fan-spread crystal arrays
  macro_patterns:
    - yellow-green drusy crust on brown gossan
    - green fan-shaped crystal sprays
    - vivid color on dark matrix
  common_forms:
    - drusy crusts on limonite/gossan
    - fan-shaped aggregates
    - individual prismatic crystals
  visual_notes: "Mapimí, Mexico produces some of the most spectacular adamite specimens globally — intense yellow-green to vivid green drusy crystals on dark brown gossan, creating a gem-like presentation. Fluorescent specimens glow brilliantly under UV. The combination of high luster, vivid color, and radiating crystal form is outstanding."

optical_and_special_effects:
  fluorescence:
    shortwave_uv: "strong yellow-green fluorescence — one of the most vivid UV fluorescences in the mineral kingdom"
    longwave_uv: "variable; usually weaker"
    fluorescence_color: yellow-green
  tenebrescence: false
  phosphorescence: "brief yellow-green afterglow possible"
  special_effects:
    - exceptional-SW-UV-fluorescence
  optical_notes: "The intense yellow-green shortwave UV fluorescence of many Mapimí specimens is among the most striking UV responses in the collector mineral world. Not all specimens fluoresce — Cu content affects fluorescence."

