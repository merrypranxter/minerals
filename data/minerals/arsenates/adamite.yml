practical_notes:
  toxicity: "ARSENIC-BEARING MINERAL. Moderate to high hazard. Do not ingest or inhale dust. Wash hands thoroughly after handling. Keep away from children. Do not grind."
  handling_notes: "Handle as a display specimen. Avoid breaking (creates arsenic-containing dust). Wash hands after every handling session."
  care_notes: "Do not clean with acid. Do not apply water to delicate crystalline aggregates. Store in labeled container with hazard indication."
  treatments_or_synthetics:
    - "No synthetic adamite on the collector market."
  common_confusions:
    - "Legrandite (very similar; also yellow-green, also Mapimí; different chemistry — phosphate not arsenate)"
    - "Olivenite (Cu-dominant olivenite-group member; brown-olive-green)"
    - "Conichalcite (different chemistry; often similar green)"
  market_notes: "Highly sought after, particularly Mapimí fluorescent material. Prices scaled to fluorescence intensity, crystal size, and color."

