cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Named from Greek 'erythros' (red) by J.D. Dana, 1868."
    - "Historical field indicator for cobalt ore ('cobalt bloom')."
    - "The cobalt from such deposits was the source of the blue pigment 'smalt' (cobalt glass) and eventually cobalt blue."
    - "No direct industrial use of erythrite itself."
  cultural_associations:
    - "Cobalt blue glass and smalt — derived from cobalt ore identified by erythrite bloom — colored medieval church windows and Delftware."
    - "The connection to cobalt blue pigment links erythrite indirectly to the history of European blue art."
  symbolism:
    - vivid warning pink
    - cobalt ore signal
    - toxic bloom
    - magenta intensity
  folklore_notes: "Erythrite's primary historical role was as a prospecting indicator — the pink bloom on rocks was a sign to dig for cobalt ore. The cobalt-cobalt arsenide mining at Schneeberg and Cobalt (Ontario) was historically significant for producing the cobalt used in blue glass and pigments."

