  visual_notes: "Erythrite is one of the most vivid pinks in the entire mineral world — a hot-pink to raspberry-crimson that makes specimens instantly identifiable. Even trace amounts of erythrite as surface 'bloom' on cobalt-bearing ores create an unmistakable visual signal. Full crystal specimens are rare but spectacular."

