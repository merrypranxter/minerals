chemical_profile:
  ideal_formula: "Co3(AsO4)2·8H2O"
  simplified_formula: "Co3(AsO4)2·8H2O"
  essential_elements: [Co, As, O, H]
  trace_elements_common: [Ni, Fe, Ca]
  structural_units:
    - "arsenate (AsO4)³⁻ tetrahedra"
    - "Co²⁺ in octahedral coordination with H2O"
    - "structural water in layered channels"
  atomic_structure_notes: "Monoclinic structure (vivianite-type). Cobalt occupies two octahedral sites. The layered structure accommodates water molecules. The vivid color comes from Co²⁺ in octahedral coordination with oxygen and water ligands."
  chemistry_notes: "A fully hydrated cobalt arsenate. Forms a complete series with annabergite (Ni end-member) and partial series with vivianite (Fe end-member). The vivid crimson-magenta-pink color is one of the most intense in the mineral kingdom. 'Cobalt bloom' — the vivid pink-crimson surface stain on cobalt-bearing rocks — is one of the most reliable field indicators for cobalt ore."

crystallography:
  crystal_system: monoclinic
  crystal_class: "prismatic"
  space_group: "C2/m"
  unit_cell_notes: "a ≈ 10.195 Å, b ≈ 13.381 Å, c ≈ 4.756 Å, β ≈ 105.1°"
  twinning: "Not commonly reported."
  crystallography_notes: "Forms thin prismatic to acicular crystals in fan-shaped or stellate aggregates; also globular, reniform, and encrusting masses. Crystals are typically small and soft. The vivid color makes even small amounts visually unmistakable."

physical_properties:
  mohs_hardness: "1.5–2.5"
  specific_gravity: "3.06–3.18"
  luster: [adamantine, pearly, vitreous]
  streak: "pink to pale red"
  transparency: [transparent, translucent]
  cleavage:
    - "perfect {010}"
  fracture: [uneven]
  tenacity: brittle
  physical_notes: "Very soft. Prismatic crystals are flexible but not elastic. High luster for such a soft mineral. Perfect {010} cleavage yields pearly cleavage faces."

