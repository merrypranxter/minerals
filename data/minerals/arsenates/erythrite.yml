  vibe_notes: "Erythrite has possibly the most aggressive pink in the mineral kingdom. It doesn't whisper — it screams. On a dark rock matrix, cobalt bloom erythrite looks like someone spilled Day-Glo magenta paint over a chunk of ancient cobalt ore."

practical_notes:
  toxicity: "COBALT AND ARSENIC-BEARING MINERAL. High hazard. Cobalt and arsenic are both toxic. Avoid generating dust. Do not ingest. Wash hands thoroughly after handling. Keep away from children."
  handling_notes: "Handle as display specimen. Do not grind or break. The powder form ('cobalt bloom' encrustation) is particularly loose and should not be disturbed."
  care_notes: "Do not clean with acid. Store in labeled container. Handle with care to avoid disturbing loose encrustation."
  treatments_or_synthetics:
    - "No synthetic erythrite on the collector market."
  common_confusions:
    - "Annabergite (Ni-analogue — apple green rather than pink-red; similar habit)"
    - "Vivianite (Fe-analogue — blue-green, not pink)"
    - "Roselite (similar cobalt arsenate; different formula)"
  market_notes: "Highly desired collector mineral for its extraordinary color. Fine crystal specimens from Schneeberg and Bou Azzer are prized. Even modest specimens are visually striking."

