practical_notes:
  toxicity: low
  handling_notes: "Dense and brittle. Powdery ochre forms may stain hands and surfaces red-brown. Specular plates can have sharp edges."
  care_notes: "Very stable; resistant to acids compared to carbonates. No special handling needed."
  treatments_or_synthetics:
    - "Synthetic hematite produced commercially"
    - "'Hematite' jewelry beads are often synthetic or compressed powder"
    - "Magnetic hematite is actually synthetic magnetite or ferrite, not true hematite"
  common_confusions:
    - "Magnetite (black, strongly magnetic; hematite is not or only weakly magnetic)"
    - "Goethite (brown streak vs red streak)"
    - "Ilmenite (FeTiO3; similar appearance but different streak)"
    - "Cassiterite (similar color but higher SG)"
  market_notes: "Iron-rose specimens from Elba and Brazil command high prices as collectors pieces. 'Magnetic hematite' sold in the gem trade is almost always synthetic. Bulk hematite is major industrial commodity."

