cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Red ochre pigment; used by humans for at least 300,000 years (oldest known pigment)"
    - "Cave paintings (Lascaux, Altamira)"
    - "Body and ritual paint in many ancient cultures"
    - "Iron ore; primary feedstock for steel production"
    - "Polishing stone (bloodstone, rouge)"
    - "Jewelry and beads"
  cultural_associations:
    - "Ancient Egypt: 'blood of Isis'; protective amulets"
    - "Roman gladiators wore hematite for protection"
    - "Indigenous cultures: red ochre in ceremony and burial"
  symbolism:
    - blood
    - earth
    - protection
    - grounding
    - strength
  folklore_notes: "Name from Greek 'haima' (blood) for the red streak and powder. Ancient amulets believed to stop bleeding. Ochre use predates all other known pigments."

