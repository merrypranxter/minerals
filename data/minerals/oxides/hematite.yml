chemical_profile:
  ideal_formula: "Fe2O3"
  simplified_formula: "Fe2O3"
  essential_elements: [Fe, O]
  trace_elements_common: [Ti, Al, Mn, Mg]
  structural_units:
    - "FeO6 octahedra sharing faces along the c-axis; corundum-type structure"
  atomic_structure_notes: "Isostructural with corundum (Al2O3). Fe3+ occupies 2/3 of octahedral sites in a hexagonal close-packed oxygen framework."
  chemistry_notes: "Pure ferric iron oxide. The red-brown color of soils and many rocks worldwide reflects trace hematite. Used as pigment (ochre) since prehistoric times."

crystallography:
  crystal_system: trigonal
  crystal_class: "3 2/m hexagonal scalenohedral"
  space_group: "R-3c"
  unit_cell_notes: ""
  twinning: "Penetration twins on {0001} giving iron roses; contact twins possible."
  crystallography_notes: "Well-formed crystals tabular to platy. Specular variety forms bright mirror-like plates. Botryoidal forms (kidney ore) show no visible crystallinity at hand-specimen scale."

physical_properties:
  mohs_hardness: "5.5–6.5"
  specific_gravity: "4.9–5.3"
  luster: [metallic, dull, earthy]
  streak: "red to red-brown (diagnostic)"
  transparency: [opaque]
  cleavage: ["none; parting on {0001} and {10-11}"]
  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "Red-brown streak is highly diagnostic even when specimen appears black and metallic. Specular hematite is mirror-bright. Earthy red varieties (ochre) are soft-feeling but still test at 5.5–6.5 on Mohs scale when compact."

appearance:
  baseline_colors: [red-brown, black, silver-gray]
  color_profiles:
    - name: earthy-red
      colors: [red, red-brown, orange-red]
      cause: "Fine-grained hematite; surface scattering of light."
      conditions: "Earthy or powdery forms; soils; ochre."
      variety_name: null
    - name: specular
      colors: [silver-gray, black, mirror-silver]
      cause: "Large platy crystals with near-perfect basal cleavage planes reflecting light."
      conditions: "Metamorphic or hydrothermal; well-crystallized plates."
      variety_name: specular-hematite
    - name: kidney-ore
      colors: [red-brown, black]
      cause: "Botryoidal surface morphology; fine-grained interior."
      conditions: "Hydrothermal or sedimentary precipitation."
      variety_name: kidney-ore
    - name: iron-rose
      colors: [silver-gray, red-brown]
      cause: "Penetration twin aggregates forming rosette shapes."
      conditions: "Alpine-type fissure veins; hydrothermal."
      variety_name: iron-rose
  habits:
    - tabular
