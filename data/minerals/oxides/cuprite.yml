    - velvety red fiber mats
    - dark red granular masses
  common_forms:
    - cubic and octahedral crystals
    - chalcotrichite fiber masses
    - massive granular aggregates
  visual_notes: "Well-formed cuprite crystals have an extraordinary adamantine luster — transparent deep red, almost like synthetic ruby in appearance. Chalcotrichite creates brilliant scarlet-to-crimson velvety masses that catch light as a micro-fiber carpet. Both forms with green malachite or native copper make spectacular matrix specimens."

optical_and_special_effects:
  fluorescence:
