  occurrence_notes: "Found in oxidized zones of copper deposits worldwide. Typically forms above the water table by oxidation of chalcocite and other primary copper sulfides. Often associated with native copper, malachite, and azurite."

cultural_and_historical:
  birthstone_status: []
  zodiac_associations: []
  historical_uses:
    - "Important copper ore historically, particularly before chalcopyrite processing."
    - "French locality Chessy, Rhône gave the old name 'chessylite' (now applied to azurite from that locality)."
    - "Used as a pigment in some historical contexts (red)."
  cultural_associations:
    - "Associated with copper energy, vitality, and passion in crystal healing."
  symbolism:
    - vitality
    - copper-red
    - blood-energy
    - passion
  folklore_notes: "Cuprite has minimal cultural folklore beyond its role as a copper ore. Its striking ruby-red color has attracted collectors and mineralogists, but it lacks the ancient cultural history of gold, lapis, or malachite."

