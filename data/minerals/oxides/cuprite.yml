chemical_profile:
  ideal_formula: "Cu2O"
  simplified_formula: "Cu2O"
  essential_elements: [Cu, O]
  trace_elements_common: [Fe]
  structural_units:
    - "Cu-O linear coordination chains"
    - "Cu₂O anticrystal-like network with Cu in 2-coordination"
  atomic_structure_notes: "Simple cubic structure (Pn3̄m). Each O is surrounded by a tetrahedron of 4 Cu; each Cu is linearly bonded to 2 O atoms. This unusual linear 2-coordination of copper is the structural basis for the exceptionally high density and optical properties."
  chemistry_notes: "Cuprite is a cuprous oxide (Cu⁺, not Cu²⁺). The deep red color comes from optical absorption in the cuprous state. Second to native copper as a source of copper in oxidized deposits. Chalcotrichite is the hairlike (acicular) variety of cuprite."

crystallography:
  crystal_system: isometric
  crystal_class: "hexoctahedral"
  space_group: "Pn3̄m"
  unit_cell_notes: "a ≈ 4.27 Å; Z = 2"
  twinning: "Penetration twins on {111} (spinel law)."
  crystallography_notes: "Forms octahedral, cubic, and dodecahedral crystals, sometimes in combination. Chalcotrichite variety forms elongated capillary ('hairlike') crystals that create velvety or fibrous masses. Both forms can be brilliant red with adamantine to submetallic luster."

physical_properties:
  mohs_hardness: "3.5–4"
  specific_gravity: "5.85–6.15"
  luster: [adamantine, submetallic]
  streak: brownish-red
  transparency: [transparent, translucent, opaque]
  cleavage:
    - "imperfect {111}"
  fracture: [conchoidal, uneven]
  tenacity: brittle
  physical_notes: "Very dense for an oxide. Adamantine luster in well-formed crystals — can resemble a dark ruby. Chalcotrichite variety has hairlike habit and appears velvety red."

