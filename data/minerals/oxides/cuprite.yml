  vibe_notes: "Cuprite is the darkest, densest, most adamantine red in the copper mineral family. It smolders rather than blazes. Against the bright green of malachite or native copper skin, cuprite's ruby-red creates one of mineralogy's most dramatic color contrasts."

practical_notes:
  toxicity: "Copper-bearing mineral. Avoid dust inhalation and ingestion. Wash hands after handling."
  handling_notes: "Fragile crystals; chalcotrichite fibers are extremely delicate. Handle by matrix only. Do not use ultrasonic cleaners."
  care_notes: "Avoid acids (destroys copper oxide minerals). Keep dry. Light dusting only."
  treatments_or_synthetics:
    - "No synthetic cuprite on the collector market."
    - "No common treatments."
  common_confusions:
    - "Ruby (much harder, different crystal system, much lighter SG)"
    - "Garnet (higher SG but different crystal system, non-metallic luster)"
    - "Hematite (gray streak, different luster)"
    - "Zincite (orange-red, different crystal habit)"
  market_notes: "Collector mineral. Well-formed octahedral crystals and chalcotrichite specimens are desirable. Prices scale with crystal quality and associated minerals."

