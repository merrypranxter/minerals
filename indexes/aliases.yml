  chrysoprase: chalcedony
  chrysopraise: chalcedony
  onyx: chalcedony
  sard: chalcedony
  sardonyx: chalcedony
  bloodstone: chalcedony
  heliotrope: chalcedony
  blue chalcedony: chalcedony
  blue lace agate: agate

  # ─── AGATE VARIETIES ──────────────────────────────────────────────────────
