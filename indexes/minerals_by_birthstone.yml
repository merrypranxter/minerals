# Minerals by Birthstone
# Index mapping birthstone months and traditions to minerals.

january:
  traditional: [garnet]
  modern: [garnet]
  minerals_in_db: []

february:
  traditional: [amethyst]
  modern: [amethyst]
  minerals_in_db: []

march:
  traditional: [bloodstone, aquamarine]
  modern: [aquamarine]
  minerals_in_db:
    - chalcedony            # bloodstone is a variety of chalcedony

april:
  traditional: [diamond]
  modern: [diamond]
  minerals_in_db:
    - diamond

may:
  traditional: [emerald]
  modern: [emerald]
  minerals_in_db: []

june:
  traditional: [pearl, moonstone]
  modern: [pearl, moonstone, alexandrite]
  minerals_in_db:
    - moonstone

july:
  traditional: [ruby]
  modern: [ruby]
  minerals_in_db: []

august:
  traditional: [sardonyx, peridot]
  modern: [peridot, spinel]
  minerals_in_db: []

september:
  traditional: [sapphire]
  modern: [sapphire]
  minerals_in_db: []

october:
  traditional: [opal, tourmaline]
  modern: [opal, tourmaline]
  minerals_in_db: []

november:
  traditional: [topaz, citrine]
  modern: [topaz, citrine]
  minerals_in_db: []

december:
  traditional: [turquoise, zircon]
  modern: [tanzanite, zircon, turquoise]
  minerals_in_db: []
